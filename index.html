yaos":{"0":{"name":"初六","text":"初六は一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、役に立たない人間が世に受け入れられない事を表す。初六は陰爻で最下位\\nにある。水風井の卦にあっては、陽爻の登る事をもって吉とするので、これは役に\\n立たない古井戸である。井戸のそこの泥、ほとんど水のない井戸で、鳥も寄りつか\\nない。この様な役に立たない人は、まったく世に用いられる事はない。凶。"},"1":{"name":"九二","text":"九二は井戸の底に湧き出る水であるが、上卦に応がなく下の初六に親しむ。そこで、\\n湧き出た水は上に登らずほんの少し底に溜まる程度である。これでは鮒がやっと生\\nきられる程度であり、人の役には立たない。賢人と言えども世に出る事は出来ない。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、正しい徳を持つ賢者が、世に用いられずに嘆く事を表す。九三は、下卦の\\n最上位で井戸の底の泥はなく澄んだ水である。すくえば飲める水でありながら、上\\n卦に遠い理由だけで用いられない。王に見る目があれば十分に働く事が出来、共に\\n福を受ける事ができるはずである。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力の弱い者が、周囲に大きな影響を及ぼす事が出来なくても自らをしっか\\nり修めて災いのない事を表す。六四は上卦の爻であるが、陰爻で力は弱く湧き出る\\n水も十分には登らない。井戸の内壁を修理して水は溜まるが、広く人々に与える事\\nは出来ない。しかし、それでも自分自身をりっぱに修めているので災いはない。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、有徳の君子が、十分に人々の役に立つ事を表す。九五は上卦にあって中正\\n（陽爻陽位）で陽剛であるので積極的に他に与える事が出来る。井戸の水は十分に\\n湧き上がり冷たい水をいつでも飲む事が出来る。この様に、陽剛の徳のある人であ\\nれば、周囲を潤して吉。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、人を裏切らない君子の徳が、広く人々に与えられてもつきる事がない事を\\n表す。上六は、水風井の最上位にあって最も水量の豊かな井戸である。この井戸は\\n覆いを付ける必要もないほど水が湧き上がり、分け隔てなく与えられる。この様に、\\n人々を裏切る事なく、尽きる事のない徳を施せば、君子として大善で吉。"}}},"29":{"number":29,"name":"坎為水","reading":"ｽｲ","overall":"黒々とした水が渦を巻く困難の重なる状況の中にあって、心の中に誠心を持つ。\\nよほどの信念を持って、次々に待ち受ける困難を乗り越えないと、激流に身を流さ\\nれてしまう。\\n坎為水は、下から”陰陽陰陰陽陰”。これは、険阻の重なる状態を示す。坎は、\\n陥を示すので困難に陥り、容易に抜け出せない状況である。この様な場合は、強い\\n信念を持って、不退転の決意で臨まなければならない。水が穴に流れ込んでも、い\\nつかその穴を満たしてあふれでるように、誠心を失わなければ前進して尊ぶべき結\\n果を招く事ができる。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力の無い者が、二重の困難の中に陥った状況を表す。この様な状況では、\\n困難を抜け出す事は、困難である。凶。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、険阻の中にあって剛なるものを表す。九二は、内卦の中を得ており陽爻で\\n剛。従って困難の中にあっても、信念を持って求めれば、若干の得るところがある。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、前と後ろの困難に挟まれ、動きがとれない状況を表す。六三は、内卦の一\\n番上にあり内卦と外卦の間に位置する。二つの険阻に挟まれているので、動けば陥\\nる。この様な、状況にあっては、動かずじっと我慢することである。行動は、凶。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、君の側近が、正式に定められた方法とは別に、個人的に君子を啓蒙するこ\\nとを表す。本来、君子と臣の間には、厳しい礼節がなければならないが、困難で危\\n険な時に当たり、親しく交際する必要がある。柔順な臣が、剛なる君子と親しみ規\\n則に縛られない方法で、君子を明知に導く。"},"4":{"name":"九五","text":"九五は、君子の位で中正、剛徳。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、困難の極点を表す。上六は、柔弱の身で、困難の極点、最も深い危険の上\\nに位置している。これは、論外の位置であり、困難から抜け出す事は非常に困難で\\nある。３年間は、抜け出す事が出来ない。凶。"}}},"39":{"number":39,"name":"水山蹇","reading":"ｹﾝ","overall":"足萎え。前進は困難である。平地は歩くことが出来ても山道を進むことは出来な\\nい。困難を知り、留まることは賢明である。力の強い人に助けを求めれば、吉運と\\nなる。時間を無駄にせず、事を起こす準備に専念すべきである。盗難、水害、詐欺\\nに注意。\\n水山蹇は、下から”陰陰陽　陰陽陰”。これは、前方の険を見て留まり、自らの\\n不足を省みて、貴人の助けを西南に求める事を表す。外卦は険、内卦は止まる。険\\nを見て止まる意味である。この様なときは、無駄に動かずに、貴人の助けを求める\\nべきである。また、動けない時間も使い方次第では偉大なものになる。","yaos":{"0":{"name":"初六","text":"初六は陰柔にして水山蹇の最下位にある。前方の危険を乗り越える力はとてもない。\\nこの様なときは無理をせずに、時を待つのがよい。そうすれば、後に名誉を得る事\\nができる。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、忠なる者が、君子の苦難を救おうと必死になる事を表す。六二は上卦の九\\n五に正しく応じている。しかし、九五は険の中央にはまっており、困難の中にある。\\n六二の苦心は自分のためではなくこの君子のためにある。たとえ成功しなくても、\\n結果を考えずに忠義を尽くすべきである。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、上に有力な応援者のないものが、自分の場所を見いだし周囲に喜ばれて安\\n泰を得る事を表す。九三は下卦の最上位で上に進もうとするが、上に応ずる上六は\\n陰柔の身で力が弱く頼りにはならない。下には二つの陰爻が九三に親しもうとして\\nいる。九三としては、進む事は出来ないが、下に帰って安泰な場所を見いだす事が\\n出来る。"},"3":{"name":"六四","text":"六四は既に上卦の一部であり、険の中にいるので進む事が出来ない。しかし、下の\\n九三と共に正を得ている。従って、この九三と手をつなぎ世の困難を救うべく立ち\\n上がる。一人では進む事は困難である。同志を募るべき。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛徳の君子が困難の中で援助者を得、険から抜け出す事を表す。九五は尊\\n位で中正の徳を持つ者である。険の中央にいても必ず六二が救援に駆けつける。\\nこの様に、剛徳、中庸の徳を身につければ、困難の中にあっても、必ず助けが現れ\\nる。しかし、まだ困難の中にいるので吉とは言えない。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、困難の極まったところにいる者が、貴人の助けにあって逃れる事が出来る\\n事を表す。吉。上六は水山蹇の極点であり、上に登ろうとしても行き詰まりである。\\n一人では進む事は出来ない。しかし、九五に会って助けを請えば、すでに険の終わ\\nるところであるからここから抜け出す事が出来る。故に吉。"}}},"8":{"number":8,"name":"水地比","reading":"ﾋ","overall":"実り豊かな田畑。戦争が終わって、平和な時代の田園風景。和気あいあいと親し\\nむ時である。一方、平和な中にも競争し、他と比べあう生存競争は依然として続い\\nている。男は多くの女をうまく治めることができるが、女の立場から言うと一人の\\n男を奪い合う形で、先手をとる必要がある。結婚では、水が地に染み込むようにう\\nまくいく。\\n水地比は、下から”陰陰陰　陰陽陰”これは、人と親しみ助け合うことを示して\\nいる。今まで、猜疑心を持ち疎遠であった人も、相手側から近寄って来る。しかし、\\n本人に徳がなければせっかくの吉も、凶に転じてしまう。まず、自身が猜疑心を持\\nちぐずぐずしていたら、親しむことはできず凶。親しむべき相手を見つけたら、直\\nちに接近すべき。遅れてはいけない。水地比には、親しむ意味のほかに比べるとい\\nう意味もあり、助け合う中にも競争があることを示しているので、実力を蓄え余裕\\nをもって行動すべきである。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、親しむ卦の最初にあって、真心がすべてを決める事を表す。初六は、水地\\n比の最下位、親しむ卦の始めである。親しむためには始めに真心がなくてはいけな\\nい。始めに溢れるばかりの真心があれば、意外な好運を得るであろう。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、君子と正しく応ずる者が、自分から決断して仕える事を表す。六二は下卦\\nにあって中正（中央で、陰爻陰位）であり、かつ上卦の九五に正しく応じている。\\n九五も中正であり、正しく相親しむ事ができる。従って、六二はこの君子たる人物\\nを然るべき相手と見て仕える事を決断する。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、近くに親しむべき人がいないために悪人とばかり近付く事を表す。六三は、\\n上にも下にも陰ばかりに囲まれて、上六も応じない。応ずべき相手がいないのでし\\nかたなく悪人とばかり親しむ。大凶。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、自分と親しむべき相手を上位に見つけ吉を得る事を表す。六四は、本来初\\n六と応ずべきであるが、いずれも陰で応ずる事は出来ない。そこで上の九五と親し\\nもうとする。六四は陰爻陰位で九五は陽爻陽位。どちらも正を得ており正しい親し\\nみ方である。従って、悪友との関係を断ち切って、上位の賢人と親しむ事が出来れ\\nば大いに吉。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、君子が広い度量で人と親しみ、民衆からも警戒されずに吉運を得る事を表\\nす。君子は、狩をするときに三方のみを囲み自分から遠ざかる者を逃がしてやる。\\nこの様に、去る者は追わずに人と親しむならば、民衆はその広い心に感じ、警戒心\\nを捨てる。吉。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、自分に徳のない者が人と親しもうとしても、誰も付いて行かない事を表す。\\n凶。上六は、陰柔の身で水地比の最上位にいる。剛徳がないので頭のない者と親し\\nむようなものである。親しもうにも始めがなく、終わろうにも始めが良くなければ\\n何も得られない。だれも付いて行こうとしないので凶である。"}}},"26":{"number":26,"name":"山天大畜","reading":"ﾀｲﾁｸ","overall":"蓄積。大きな物を大きな力が押し留める。大きな組織で働く人に吉。物心共に、\\n大きな蓄えができ、冒険をしても成功する。どんな困難にも、粘り勝ちできる。穀\\n物で満たされている倉庫。経験を生かし、じっくりと腰をすえて豊かな気持ちで目\\n標を捕らえている。正式の順を追った結婚であれば吉。\\n山天大畜は下から”陽陽陽　陰陰陽”。これは、賢者が君子に厚く用いられ、君\\n子の行いが天に通じる事を表す。君子は賢者の知恵を大いに蓄え、大いに前進する。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛なる者が前進しようとして止められる事を表す。初九は六四に応じてい\\nるので、六四によって止められる。行けば危うい。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を表す。\\nこれは、中庸の徳を持つ者が、自分から思いとどまり進まない事を表す。九二はこ\\nれに応ずる六五に止められる。しかし、これは中庸の徳を持つ者が、自らの正しい\\n判断で留まったのであり災いはない。進まない方がよい。"},"2":{"name":"九三","text":"九三は止まる卦の極点にあって進む事が出来る。敵の上九を追いかけるように前進\\nできる。しかし、九三は陽爻陽位で剛に過ぎる。気負って深入りする事は危険であ\\nる。従って、敵を追いかけつつも自兵を訓練し守りを固めるべきである。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、悪を力の弱い内に未然に防ぐ事を表す。六四は、まだ角の出ていない子牛\\nに例えられる。角の出ていない内に横木を当てて警戒をするようなものである。\\nこの様にすれば、大善にして吉。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”様”に変わる可能性を示す。\\nこれは、柔順の徳を持つ君子が、民衆の暮らしを豊かにする事で犯罪をなくすこと\\nを表す。六五は九二を止める者であるが、九二は初九ほど簡単には止められない。\\n牙のあるいのこを留めるようなものであるが、柔順の徳を持つ六五は無理をせずに\\n時期を見てこれを去勢する。そうすれば、牙があっても人を突く事はなくなる。吉。"},"5":{"name":"上九","text":"上九は、一番上の”様”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、止まる所のない自在の大通りを表す。上九は止まるの卦の極点にあって、\\n下卦の三陽爻を留めようともしない。宙に浮かぶ天の道のように自在に四方八方に\\nつながっている。願い事は叶う。"}}},"41":{"number":41,"name":"山沢損","reading":"ｿﾝ","overall":"税金。損失があるが、これは納得ずくのものであり、社会全体を健全に発展させ\\nるためのものである。気を引き締め倹約すれば吉。周囲に喜ばれる投資等は成功す\\nる。\\n山沢損は、下から”陽陽陰　陰陰陽”。これは、時の動きに従い過ぎたものから\\n減らし、足りないものへ増す事を表す。また、過ぎた形式を略し、真心を持って神\\nを祭る事を吉とする。実質を重視すべきである。人欲を損して、天理に増す。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、下位のものが上位のものの不足を助けることを表す。初九は陽爻であるの\\nで余りあるが、これに応ずる六四は陰爻で不足している。そこで、自分の力相応に\\n考えて、適度に上を増す必要がある。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中庸の徳を持つものが、いたずらに他人に施す事をせずに自分を守る事を\\n表す。九二は六五に応じているが、他人の献身に頼っているものには与えようとせ\\nず、そのことがかえってその者の為になる。損せずして益す。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、前進する場合、気が多くては失うものがあるので目的を絞らなくてはいけ\\nない事を表す。六三は乾から一陽爻を損した爻に当たる。三人で進めば一人を失う\\nが、一人で行けば気の合う友人が得られる。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、肉体的、あるいは精神的な病を減らす事が出来る事を表す。六四は、陰爻\\nで小人。精神的な病人である。早期に初九の援助を受けて治療すれば病を減らし治\\nす事もできる。"},"4":{"name":"六五","text":"六五は陰爻で、柔順虚心。このような君子に対しては、庶民の方から自分を損し君\\n子を増そうと言う思いが生まれる。大吉。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、上にある者が下から取る事をせずに逆にましてやる事を表す。上九は、損\\n卦の極点にあって益に変ずべきところである。しかも剛爻で力が強く、この力で下\\nから取るような場合には災いがある。逆に余りあるものを下に増してやれば天下は\\n服従し立派に治まる。"}}},"22":{"number":22,"name":"山火賁","reading":"ﾋ","overall":"装飾。人は社会の中での役割を果たしていくために、それぞれ飾りを持っている\\nが、これは必要なものである。分を守れば願いは叶う。装飾にこるよりも、内容の\\n充実に気を付けるべきである。山の端に沈もうとしている夕日。沈み行く美しさで\\nあるから、遠くまでの見通しはきかない。\\n山火賁は、下から”陽陰陽　陰陰陽”。これは、人が集まるための飾りであり、\\n自然の文様、人間の文様を表す。願いは少し叶う。しょせんは実質に対する飾りで\\nあるから、多くを望む事は出来ない。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽爻でありながら最下位に甘んじて美しく生きる事を表す。初九は、最下\\n位にへりくだり美しく飾る。道ならぬ富貴よりも正しい貧しさを選択する者である。\\n馬車に乗るよりも、気持ち良く歩いて行くのを好む人間である。この様に、生きる\\nべきである。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、身近な上位者に従って行動する事を表す。六二は中正の陰爻であるが、上\\n卦に応がない。すぐ上に九三があるが、これも上に応がなくこの二爻は共に動く事\\nになる。主人のいないものが先輩に従って動く事である。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、周囲を道ならぬ者に飾られながらも、本来の正道を守りぬき吉を得る事を\\n表す。九三は、上下を六二や六四の陰爻で飾られている。しかし、いずれも正しい\\n相手ではない。従ってこのような一時的な状況に溺れずに、正道を固守しなくては\\nいけない。そうすれば吉を得る出あろう。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、一時的な妨害で、身を飾るものが得られない者が、節操を貫きついに災い\\nを逃れる事を表す。六四は、下卦初九に正しく応じているので、そちらに向かおう\\nとするが九三の妨害に会って行く事が出来ない。これは、六四が紛らわしい位置に\\nいたためである。節操を貫けばついには災いは去る。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を表す。\\nこれは、実質を重んじる君子が、粗末に過ぎる礼を行うが、奢るよりは良くついに\\n吉を得る事を表す。六五は中を得ており、実質を重んじて山火賁の本質を得ている。\\n陰柔なる者は質素に過ぎてけちである。しかし、奢って飾るよりは、質素に過ぎる\\n方が倹約で良い事である。ついには吉を得るであろう。"},"5":{"name":"上九","text":"上九は、山火賁の極点で行き詰まり。飾りの虚しさを知った局外者であり、悠然と\\nしている。この様であれば、吉である。"}}},"27":{"number":27,"name":"山雷頤","reading":"ｲ","overall":"養う。日ごろ養っているものの内容を問われる。外に養うもの、自らの内に養う\\nもの、いずれも大切である。これらが正しければ吉。ファイトがあれば自立するの\\nに良い時期である。上顎と下顎。消化器系の健康に注意。\\n山雷頤は、下から”陽陰陰　陰陰陽”。これは、聖人が賢を養って万民におよぼ\\nし、雷が鳴り響いて全山に草木の養われる事を表す。日頃何によって生計を立てて\\nいるか、自らの内に何を養っているかによって、それが正しければ吉を得る。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を表す。\\nこれは、自分の中に尊い知恵を持ちながらも社会の底辺にあって上位の小人の持ち\\n物に心を動かされる様子を表す。初九は陽剛で知恵の亀（占いに用いる尊い亀）を\\n持つ。社会の底辺にありながらも泰然としていられるはずである。しかし、ついに\\n上位の小人の物的な豊かさに心動かされ物欲しげな態度を示す。貴ぶに足りない人\\n物である。自分の知恵を働かせないで、他人の持ち物を羨ましがれば凶。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、一人で生きる事のできない者が、自分と応じていない者に向かい凶運に会\\nうことを表す。六二は、陰柔で一人では生きられない。近くの初九に向かうが、自\\n分よりも下位の者であり養ってはもらえない。しかし、残る陽爻は上九のみであり\\nこれも六二へは応じていない。助けてくれる人は誰もいないが、無理に求めれば凶。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、食べるためにはどの様なことも辞さない道を外れた人間を表す。六三は、\\n下卦、動くの卦の最上位にあって不正。不正なる働きの甚だしい者である。山雷頤\\nの卦にあって、養うためには平気で不正を働くので、目的が正しくても凶を得る。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、強力な上位者が民衆に広く施すために下位の者に養う事を要求する事を表\\nす。六四と初九は共に正であり正しく応じている。従って、六四が初九に養われる\\nのは正当な事であるが、初九を驕慢にする事を避けるために、六四はにらみを利か\\nせ、また民衆に施すためには絶え間なく要求する必要がある。この様に、天下を豊\\nかにするためになら、下位の有力者から取り立てて良い。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力のない君子が民衆を養うために有力者に頼る事を表す。六五は君位にあ\\nりながら陰柔で不正。民衆を養う力はない。そこで、上位の陽爻である上九に頼ろ\\nうとする。これは、正当な態度とは言えないが、民衆を養おうと言う動機は正しい\\nので、柔順な態度で上九に任せる事が出来れば吉。他人の力に頼って成功するであ\\nろう。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が老陽”で、”陰”に変わる可能性を示す。\\nこれは、本来位のない者が、他人に代わって大任を引き受け、危険を乗り切る事を\\n表す。上九は、六五の君子より天下を潤すべく委任された者である。本来は俗世間\\nの外にある者であるが、剛爻で最上位にあり力は十分持っている。そこで、縦横無\\n人にその手腕を奮う事が出来る。危険を考え、良く警戒慎めば冒険をしても吉運を\\n得て成功する。"}}},"18":{"number":18,"name":"山風蠱","reading":"ｺ","overall":"皿の上の蛆。破綻。内部の腐敗。油断からの混乱。根本的な修理、治療に多くの\\n努力を要す。愛情問題は複雑で悩みが多い。\\n山風蠱は、下から”陰陽陽　陰陰陽”。これは、安心して人に任せて於いたため\\nに物事が腐敗し、事を起こさなければならなくなる時を表す。崩壊の後には再建が\\n始まるのは自然の理である。従って大川を渡る事に吉運がある。冒険をするのにふ\\nさわしい時である。自分の気持ちを心機一転して、以前の失敗を繰り返さないよう\\nに頑張るべきである。上の者が止まり、下の者が従うばかりであれば腐敗が起こる。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を表す。\\nこれは、父親の過失をその子どもが建て直す事を表す。初六は事の始まりであり、\\n前任者の失敗による崩壊がまだ軽い事を示している。従って、良い助力者が得られ\\nれば建て直す事も可能である。ただし、崩壊しかけたものを建て直すのであるから、\\nやはり危険である。この危険を十分に自覚してことを為すべきである。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を表す。\\nこれは、剛なる子が母親の過失を建て直す事を表す。九二は、下卦の中を得ており\\n剛爻である。立派に母親の失敗の後を建て直す事が出来る。しかし、余りに剛に過\\nぎると母親に対して真っ向から批判をする事になり親子の間に溝が出来てしまう。\\nそこで、頑なに正義をふりかざしたりせずにゆったりと構える事が必要である。中\\n庸を守れば吉。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を表す。\\nこれは、剛に過ぎる子どもが、父の失敗の後を建て直す事を表す。九三は剛爻でし\\nかも下卦の最上位にある。剛に過ぎるので、父親の失敗を真っ向から非難する事に\\nなり易い。しかし、九三は下卦従うの卦の一部であるから柔順の徳も有する。従っ\\nて、穏やかに事を為せば最後には吉。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を表す。\\nこれは、寛容柔弱に過ぎる子どもが父の後を受けて事をなそうとするが、崩壊を止\\nめられないことを表す。六四は、陰爻陰位で柔弱に過ぎる。この様な子どもが父の\\n後を受け継いでも、父親の過失を正す事も出来ずに寛容に見過ごしてしまう。既に\\n始まっている崩壊を止めようもない。進もうとしても進めず凶。"},"4":{"name":"六五","text":"六五は上卦の尊位で柔順の徳を持つ。これに下卦の剛爻である九二が正しく応じて\\nいる。このように、自身は柔順でありながら剛なる後ろだてがあれば父親の後を受\\nけて名誉を得るであろう。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を表す。\\nこれは、剛なる隠者が自分の道を守りぬき、王侯に仕えない事を表す。上九は、山\\n風蠱の卦にあって、俗世間の外に位置する。最上位の剛爻であり、その隠者として\\nの境涯は高貴である。この様に、自分の道を守り誰にも仕えなければ吉。"}}},"4":{"number":4,"name":"山水蒙","reading":"ﾓｳ","overall":"啓蒙。幼く愚かなもの。幼い者が、誠心誠意教えを請う時は、導くに吉。師が幼\\nい者を求めるのではなく、愚かなる者が師を求めるのである。教えられる者の方に\\n誠意がなければ無用のことである。学問、教育に吉。暗い家に住む子供。最初は暗\\nいが徐々に明るさを得る事。手探りの状況であるから、身辺を整理して身軽になっ\\nておくべきである。\\n山水蒙は、下から”陰陽陰　陰陰陽”。これは、内に向かって危険なものを持つ\\n者が、外に向かって止まる事、すなわち幼い愚かな者を表す。愚かな者に教えを授\\nけるとき、何度も重ねて聞き返すのは非礼であり、占いではその神聖さを汚す事に\\nなる。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陽”で、”陽”に変わる可能性を示す。\\nこれは、啓蒙の始めの段階にあっては、まず悪いところをきつく正し、その後導く\\n事を表す。初六は、最下位の陰爻で力なく最も暗いものである。この様な者を啓蒙\\nするためには、まずきつく懲戒し、ことの是非を教える。しかし、いつまでも厳し\\nいばかりでは反抗されて恥をかく事になる。次には戒めを解き、進歩を見るのがよ\\nい。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、色々な性質を持つ蒙昧なものを啓蒙する立場のものが、臨機応変に対処す\\nる事を表す。九二は六五に正しく応じているので、蒙昧な妻（六五）を正しく抱擁\\nする者、あるいは息子が親に代わって家を取り仕切る事をも表している。この様で\\nあれば、吉運を得る事が出来る。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、金に目が眩み男に付いて行くような女であるから、娶ってはならない事を\\n表す。六三は、陰柔で中を外れている。しかも不正。この様な女は、慎みのない女\\nを娶れば良いはずはない。娶るべきではない。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔弱なる者が、助けが得られずに苦しむ事を表す。六四は、陰柔でこれに\\n応ずべき初六も陰爻であり頼りにはならない。頼りにすべき九二や上九の陽爻に最\\nも遠い所に位置している。この様であれば恥ずべきであり、凶。"},"4":{"name":"六五","text":"六五は、上卦の中で尊位でありながら、自らの柔弱蒙昧なことを悟り剛なる九二に\\nへりくだって教えを乞う者である。この様であれば、吉である。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛に過ぎる者が蒙昧な者を攻撃する事を表す。上九は、剛爻で最高位にあ\\nる。剛に過ぎる者で、蒙昧な者を教育するためにこれを打ち破ろうとする。この様\\nであれば、かえって悪い結果を招く。外からの悪の誘いは防ぐだけで、攻撃は不要\\nである。自分が純真であれば、教育はうまくいくものである。"}}},"52":{"number":52,"name":"艮為山","reading":"ｻﾝ","overall":"停止。進もうとしても動きが取れない状態。心の乱れを無くし無心で行動すれば\\n凶運を免れる。他人の目を気にしないことである。同じ出来事が重なるので、要注\\n意。連なる山々。強力者が得られず、自分の方から進んで行けない事情があるので、\\n高尚な精神と不動の信念をを持って、こつこつと努力するべきである。\\n艮為山は、下から”陰陰陽　陰陰陽”。これは、にらみ合う、悩む、硬い、等の\\n意味。形は山が二つ重なったもの。動きがとれない状態を示すが、自ら止まるべき\\n所に止まる、賢明なる君子の姿でもある。静止するときも、動くときも、心を止め\\nることにより惑わされなければ、凶運を避けることができる。ただし、一歩間違え\\nると、逃避的な考え方に陥り易い。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陽”で、”陽”に変わる可能性を示す。\\nこれは、柔弱なる者が、留まるべき所に未然に留まる事を表す。初六は、止まる卦\\nの最初であり、陰爻で力がなく始めに止まる。進んで行く事は出来ないが、止まる\\nべき時であるから未然に止まれば災いはない。しかし、心弱い陰爻であるので、こ\\nの止まる徳を持続する事が難しい。永続的に正しさを守りきる事が出来れば吉。"},"1":{"name":"六二","text":"六二は、中正（下卦の中で、陰爻陰位）であるのでその正しさを主張するが、柔爻\\nで力がない。下卦の主たる爻は九三であるが、これは剛爻で中を外れている。六二\\nの主張は九三には聞き入れられずに、六二は不愉快ながらもこれに従わなくてはな\\nらない。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛に過ぎる者が、周囲の人間に離反され危うい事を表す。九三は身体で言\\nえば腰に当たり、剛爻剛位で中を外れ、四陰爻の中央を分断するように横たわる。\\nこの様であれば周囲の者は動きが取れず九三を憎むようになる。真に不安な状態で\\nある。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔順なる者が自分の動きを調整し、止まるべき時に止まる事を表す。六四\\nは身体で言えば胴の部分で心が宿っている。そこで、自分の動きを調整して盲動し\\nない。この様に、静かにしていれば吉。"},"4":{"name":"六五","text":"六五は、身体で言えば顎に当たる。正を得ていないので災いを招きそうであるが、\\n中を得ており言う事に秩序がある。言語を慎めば、災いを逃れる事が出来る。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、乱れ易い事の終わりにあって、最後まで手厚く吉運を得る事を表す。上九\\nは、止まるの卦にあってその究極である。学問等、最後には乱れ易いが、上九は止\\n善に厚く止まる者であり、最もめでたい。"}}},"23":{"number":23,"name":"山地剥","reading":"ﾊｸ","overall":"崩れつつある山。剥奪、剥離、侵食。内部の崩壊。砂上の楼閣。多くの女に惑わ\\nされる男。一人の男を追い求める多くの女。結婚するには、よほどの用心と調査が\\n必要である。\\n山地剥は、下から”陰陰陰　陰陰陽”。これは、剥離、侵食され尽きようとして\\nいる様を示す。小人の勢いが増し、君子の困窮する様。時期に従い、能力を隠し積\\n極的な行動は慎むべきである。九月の卦。剥離された山がそびえる事なく地に密着\\nしており、地（民衆）を厚くして山（社会の上層）を安泰にすべきである。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、正しい者が邪悪な者に滅ぼされようとしている事を表す。正しき者は凶。\\n寝台の足まで侵食され、身の置き所を失いつつある。災いは近付きつつあるので、\\nよほどの警戒が必要である。凶。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、侵食が寝台の胴の部分にまで及んでいる事を表す。邪悪な者はますます正\\nしい者を滅ぼしつつある。しかし、陰の仲間は今の所それほど多くはない。災いは、\\n身近に迫っている。危うい。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、邪悪な仲間の中にあって、一人君子を助け、正道を守る事を表す。六三は、\\n山地剥の卦にあって、ただひとつ上に応がある。そこで、上下の陰と交わりを絶っ\\nてひとり上九の陽爻と結ばれる者である。この様に悪友を絶って君子に近付けば吉。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、侵食が寝台を越えわが身の皮膚に及んでいる事を表す。六四は既に上卦で\\nあり、危険は逼迫している。もはや、正邪の議論よりも迫り来る危険を避ける事が\\n先決である。直ちに凶。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、小人の頭目が小人達を率いて君子に従う事を表す。六五は、陰爻でありな\\nがら君位にある。后に当たる者で、以下の側室（小人）を束ねる役を持ち、上九の\\n君子に仕える。小人の頭目と言えども、彼らを率いて君子に従えば利あらざるなし。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、山地剥の極点に於いて乱を鎮めるべく君子が民衆に祭り上げられる事を表\\nす。上九は、剥離の極まりであり、ただひとつ残された陽も消えようとしている。\\nしかし、陰が極まれば新たに陽が生まれる。民衆は乱が静まるのを望んでおり、上\\n九はこれに答える者である。もし、問う者が君子なら、民衆に喜ばれ吉を得る。し\\nかし、小人ならばついに身の置き所なく、凶。"}}},"11":{"number":11,"name":"地天泰","reading":"ﾀｲ","overall":"安定。泰平、安泰、和合。願い事は叶う。君子が立場を得、吉運。ひとつの理想\\nである。泰然として調和の取れた様子。結婚は良縁。\\n地天泰は、下から”陽陽陽　陰陰陰”。これは、天が下に降り地が上に登ろうと\\nして融合する事を表す。家臣と君子の気持ちが交流し通ずる事。外に小人、内に君\\n子があり、君子の勢力が宮廷内で伸びゆく様。従って、大善。正月。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛徳の君子が野にあって朋友と共に立身を志す事を表す。初九は、剛爻で\\n最下位にある。上位を目指して登り進む者であるが、下卦の三爻は共に陽爻で仲間\\nと手をつないで進もうとする。剛徳のある者であれば吉。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、寛容、果断、友情に厚く、私情に惑わされない君子を表す。九二は陽爻で\\n陰位にある。従って、内に剛なる徳を有し外に柔軟である事を示している。また、\\n六五と正しく応じており、遠くの友人を忘れない。さらに、公務を行うに当たって\\nは私情に惑わされない。この様であれば、大善にして吉。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、太平なるときが過ぎ、困難の時代が来ようとしている事を表す。九三は下\\n卦の中を過ぎ、泰平なるときの最盛期である。しかし、何事も極点を極めれば衰退\\n期を迎えなければならない。これは、天の理である。徳を積む者は心配する必要は\\nない。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、今まで飛び上がっていた小人が、心を一つにして飛び降る事を表す。六四\\nは既に泰の時代を過ぎている。いつまでも飛んでいる訳には行かない。そこで下に\\n降るが、その時仲間を連れて行く。この仲間は、金銭ではなく志しで結ばれている\\nので、約束を守り集まった者である。小人が結束するので、正道を妨害されないよ\\nうに気を付けるべきである。"},"4":{"name":"六五","text":"六五は、上から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、君子が自分の末娘を有能な家臣に嫁がせる事を表す。六五は、陰爻で尊位\\nにおり、下の九二に正しく応じている。柔順なる者が、己を虚しくして下の実力者\\nに任せれば吉運を招く事ができる。"},"5":{"name":"上六","text":"上六は、泰が極まり否の時代の始まりである。城は崩れ、堀に帰る。武力の行使は\\n滅亡を早めるであろう。君子の座にあっても、積極的な行動は慎み周囲国元の助言\\nを入れるべき時である。正道を守っても身の安全を確保するのがやっとであり、恥\\nをかくであろう。"}}},"19":{"number":19,"name":"地沢臨","reading":"ﾘﾝ","overall":"臨戦。迫力をもって臨み、成果をあげる。大いなる望みが叶う。多くのものが悦\\nび従うであろう。しかし、８月には陰りが見える。従って、作戦の変更が必要であ\\nる。移り行く季節と運気、それに対する臨機応変な対処が必要である。時代遅れに\\n注意。\\n地沢臨は、下から”陽陽陰　陰陰陰”。これは、君子が権威をもって民衆に向か\\nい、民衆が輝く君子を仰ぎ見る事を表す。陽が陰を圧迫しつつ成長している。願い\\nは叶う。十一月。君子が大地の徳を持って、民衆を抱擁する。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛徳のある者が、力を用いずに徳によって相手を感動させ従わせる事を表\\nす。初九は剛爻で正、正しい上に六四と応じている。陰なる者と応じているために\\nこれを感動させる事ができる。正しい上に、吉運も招く事が出来、結果も良い。"},"1":{"name":"九二","text":"九二は、下卦の中であり、六五に応じている。不正ではあるが、近くに迫る陰柔の\\n者を感動させ従わせるためには剛に過ぎるくらいがよい。前進して、大吉。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、民衆に甘い餌を持って望む、不徳の臣を表す。六三は、陰柔で不正（陰爻\\n陽位）。しかも下卦（喜ぶ）の主たる爻である。甘い喜びによって民衆を動かさん\\nとする不徳の者である。しかし、自らその危うさを悟っており、危険を感じ、慎重\\nさを忘れない。従って、不徳ではあるが、災いを逃れる事ができる。"},"3":{"name":"六四","text":"六四は陰爻陰位で正を得ている。正しい徳を持つ大臣である。また、下卦の初九と\\n正しく応じており、柔順に賢者の意見に耳を傾ける。この様に、正しさを守り、有\\n能な部下に委託する事ができれば吉運を得る事ができる。"},"4":{"name":"六五","text":"六五は、柔順にして中庸の徳を持つ君子であり、下卦の九二と応じている。いずれ\\nも中庸の徳を持つので良く協力する事ができる。この様に、自分が動かず、有能で\\n正しい部下に仕事を任せれば好運を掴む事ができる。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、最上位の者が、下に手厚く吉運を得る事を表す。上六は、地沢臨の極点に\\nあり、最上位であるので民衆に望む立場にある。正しく応じてはいないが、初九、\\n九二の二陽爻を手厚く待っている。この様であれば、上にある者として、正しい態\\n度である。吉。"}}},"36":{"number":36,"name":"地火明夷","reading":"ﾒｲｲ","overall":"傷ついた太陽。前進すれば大いに傷つくであろう。太陽は地下に没している。\\n自分の英知才能を隠し、暴君に対しても従順に仕えれば、開運できる。嫉妬に注意。\\n睡眠を十分に取り、明け方前の長い時間をじっとこらえて体力の充実をはかるはか\\nべき。\\n地火明夷は、下から”陽陰陽　陰陰陰”。これは、暴君に仕える有徳の家臣が、\\n困難を覚悟して苦しみに耐え、正しさを守る事を表す。君子たる者、あまり細々と\\nしたところまで気が付いてしまうと寛容の徳を傷つける。茫洋として民衆に対する\\nのがよい。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛徳の者が世に受け入れられず、彷徨し、義を貫く事を表す。初九は、明\\nの始め。傷つくが、それほど深くはない。その国を離れ、また飛び立つ事ができる。\\nしかし、ゆがんだ世の中では、この者を受け入れる所はない。受け入れられなくて\\nも、媚びへつらうべきではなく、自分の義を貫くべきである。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、左足を傷ついた者が、駿足の名馬に助けられる事を表す。六二は、初六よ\\nり一歩進んでおり、地火明夷の時に当たってより深く傷つく。しかし、柔順の徳を\\n持ち、中を得ている。従って、素早く処置に掛かれば吉運を呼び戻す事もできる。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛徳の君子が、満を待して軍を挙げ、暗君を討つ事を表す。九三は、剛爻\\n剛位で最も明なる者。しかし、上には三つの陰爻に抑えられ、上六の暗君と応じて\\nいる。始めはその明知を隠してはいたが、ついに軍を挙げ、この暗君を討つ。急い\\nではならない。革命は非常事態であり、小さな事でも占ってこの卦を得た場合は慎\\n重にことを構えるべきである。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、暗君の心を得た者が、自分の家の庭に隠れたりせずに宮廷におもむき、身\\nの安全を得る事を表す。六四は柔順の徳を持つ者であり、暗君に近接している。\\n危険なようであるが、暗君の気持ちを得る事が出来、内側に入り込む事ができる。\\nこの様なときは、自宅の庭などに隠れている事はかえって危険である。門を出て、\\n宮廷内に隠れている方が安全なのである。"},"4":{"name":"六五","text":"六五は、暗黒の中心にあり、上六の暗君に近接している。この様に、暗黒の時代に\\nあっても、自分の正しさを失うべきではない。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、本来四方を明るく照らすべき最上位の者が、徳を失い、ついには革命に命\\nを落とす事を表す。上六は地火明夷の最上位で、暗黒の極まり。真に徳の暗い者で\\nある。徳を失い、道を失う者が民衆の上にあれば、ついには命を失う事になる。"}}},"24":{"number":24,"name":"地雷復","reading":"ﾌｸ","overall":"復帰。人生の夜明けである。理にしたがい、太陽が昇り、あなたに吉運をもたら\\nす。また、周囲の人々にも幸福が訪れる。計画、立案に吉。周到な準備を忘れずに。\\n四季が移り変わり、春が帰ってくる。全ては復元され、やり直しの時である。一年\\nの大計を立てるとき。一人の男と五人の女の軽い交友関係。\\n地雷復は、下から”陽陰陰　陰陰陰”。これは、一度陰に覆われた運勢に再び陽\\nが戻り理に従って進む事を表す。五月に陰が生じ始めてから、七ヶ月目（七日目）\\nに陽が生じ始めた。何の障害もない。朋友が集まり、皆吉運を得るであろう。しか\\nし、生じた陽はまだ十分な力を持っているとは言いがたいので、安静にして育てる\\n必要がある。","yaos":{"0":{"name":"初九","text":"初九は主体となる爻で、物事の始まり。過失があってもまだ大きくはなく、改めれ\\nば修復する事が出きる。一刻も速く悔い改めるべきである。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、善人の美徳に感激した者が、正しい道に帰る事を表す。六二は、初九のす\\nぐ上にあり正を得ている（陰爻陰位）。そこで、初九の仁徳に感激してこの正しさ\\nに従う。この様に、善なる人に従えば吉。"},"2":{"name":"六三","text":"六三は不中不正で、度々失敗する。動くの極点にあり、態度が一定しない。しかし、\\n復の卦にあって、その度に改めるので、道義的に間違っていない。危ういけれども\\n災いを逃れる事はできる。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、群陰の中にあって一人義を重んじ、正道に帰る者を表す。六四は、陰爻の\\n中央にあるが、ひとり初九の陽に応じている。悪友と共に進む中で、ひとり正道に\\n帰る者である。これは義として当然の行いであるので吉凶を論ずべき問題ではない。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸と柔順の徳を持つ者が尊位にあって、善に帰る事を表す。六五は、上\\n卦の地の一部であり、更に陰爻で柔順の徳を持つ。また、中庸の徳を持ちながら尊\\n位にあって、この中庸の徳により自らを完成する者である。"},"5":{"name":"上六","text":"上六は、復卦の最後にあってついに迷いを捨てる事が出来ずに善に帰らない。凶。\\n軍を動かせば大敗し、十年かけても敵を破る事は出来ない。"}}},"46":{"number":46,"name":"地風升","reading":"ｼｮｳ","overall":"上昇。物事が順調に進み、願いが叶う。邪魔をするものもなく、不安はない。\\n南に進めば更に良く、その道の権威者に会うことは吉。あせらず、自信を持つこと\\nが肝要。地中に蒔かれた種。自分の実力を正しく認めてもらえる方向に進むべきで\\nある。芽を腐らせないように、確実な努力を重ねるべきである。\\n地風升は、下から”陰陽陽　陰陰陰”。これは、剛徳のある者が、優れた指導者\\nに巡り会い何の心配もなく登り進む事を表す。将来は、福の光に満ちている。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔順なる者が良き先輩に恵まれ、共に登り進む事が出きる事を表す。初六\\nは、陰爻で柔順。おとなしいので自分一人ではなかなか進み辛い。しかし、上の二\\n陽爻が登るときに引き上げてもらえる。大吉。良い先輩と志しを共にすることが福\\nを招く。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中庸の徳のある者が、誠意をもって事を為し、認められる事を表す。九二\\nは、剛爻で中庸の徳を持ち、上卦六五に正しく応じている。これは、神にその誠意\\nが伝わり、粗末な備えでも祭を行って良い事を表している。誠意があれば、福を招\\nく事が出きる。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を表す。\\nこれは、剛なる者が競争相手もなく悠々と登り進む事を表す。九三は、剛爻で下卦\\nの最上位。上には虚なる陰爻があるだけで邪魔をする者はいない。無人の村を行く\\nようなものである。従って、何の障害もなく昇進し得る。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、古代の王が山河を祭る際に、吉を得た事を表す。六四は柔順で正を得てい\\nる。王は天地を祭り、諸候は山河を祭る。祭によって人の誠意は神に届くであろう。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰柔な者が有能な強力者の力で容易に昇進する事を表す。六五は、陰爻で\\n力が弱く不正（陰爻陽位）であるが、下の九二と正しく応じており、君位の重責に\\nも良く耐える事が出きる。しかし、陰爻であるので正しさを最後まで守り通せるか\\nが問題である。正道を守れば良い強力者によって吉運を得る。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、自分が登る事に夢中で目の眩んでいる者を表す。上六は、陰爻で力不足に\\nもかかわらず地風升の極点にいる。登る欲に溺れる者である。しかし、気ばかり焦\\nって富む事が出来ない。この欲望を、義の道を貫く徳に変えられるならば吉を得る\\nであろう。"}}},"7":{"number":7,"name":"地水師","reading":"ｼ","overall":"戦争。農の中に兵あり。君子が老成した人物を将軍に任命して戦えば、吉。悪を\\n打つ正義の戦であれば、成功する。仕事では、腹心の部下として有能な参謀を育て\\nることが重要。指導者の苦労。他人から頼りにされる事が多い。\\n地水師は、下から”陰陽陰　陰陰陰”。これは、柔軟なる君子が、優れた将軍に\\n軍隊を委任し、天命に従って戦争を起こし勝つ事を表す。委任される将軍は大人で\\nなければならない。小人は目先の功名しか見えないので、失敗する。戦争は非常事\\n態であり、注意深くなければいけないが、戦うからには必ず勝たねばならない。\\n勝って初めて、正しいと言える。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、戦いに出陣する者が正しい規則で厳しく統制して吉を得る事を表す。初六\\nは、地水師の始め。出陣の時に当たる。戦いは出陣の時が重要な影響を持つ。規則\\nが良くなければ、軍隊を統制する事は出来ない。正しい規則で厳しく律してこそ、\\n戦いに勝つ事ができる。始めに慎んで方を守る事が重要。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、実力のある将軍が王から大切にされ、三回も褒美を受ける事を表す。九二\\nは、地水師の卦にあってただ一つの陽爻である。尊位の六五に正しく応じており、\\n信頼を一身に集めている。王が九二を大切にするのは、九二の力で万国を平定しよ\\nうと考えているからである。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を表す。\\nこれは、実力のない将軍によって指揮された戦いに破れる事を表す。六三は、陰爻\\n陽位で不中不正である。この様な柔弱な身で下卦の最高位にあるのは分不相応であ\\nる。戦っても破れ、将軍の屍を車に積んで運び戻る事になるであろう。凶。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、自分の力の限界を知る者が、退避場所を確保する事を表す。六四は険卦の\\n前方に位置する。戦いの布陣の定跡として、左前方を低地、右後方を高地にして構\\nえる。従って、六四は自分の弱さを知り後方に退避すべき場所を確保した事になる。\\nこの様であれば、猛進する事なく災いを避ける事ができる。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、戦いを行う際に、正しい言い分を通し、有能な人物に任せきる事で勝利を\\n得る事を表す。有能な人物に作戦を命じておきながら、小人にもものを言わせるの\\nではうまく行かない。長男が勝ち戦をしながら、次男以下が屍を持ち帰るようなも\\nのである。九二は、こちらから戦いを仕掛けるような人物ではないが、仕掛けられ\\nた戦いには老練なる参謀を用いて勝つ事ができる。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、戦いの功績を賞するのに、大人には国を与え、小人には金品を与えるべき\\nである事を表す。上六は戦いの終わり。褒美を賜る事になる。君子は家臣の功績を\\n賞するのに、小人に対しては金品を余計に与え、政治力は与えるべきでない。小人\\nが力を得れば、必ず国が乱れるからである。君子に付いては吉。小人であれば功績\\nがあっても昇進できない。"}}},"15":{"number":15,"name":"地山謙","reading":"ｹﾝ","overall":"謙遜。高い山が低い地に留まり、謙遜する。富める者は外に柔軟であり驕らない\\nことが大切である。多を減らし、少を増やす。女性問題には要注意。実った稲の穂。\\n徳の高い者が遜る事。才能があっても、自分だけ良い顔をするためにでしゃばって\\nはいけない時。\\n地山謙は、下から”陰陰陽　陰陰陰”。これは、内に止まり（山）、外に柔順\\n（地）である事を表す。鬼神は奢る者に災いを、謙虚なる者に吉運を与える。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔順で謙遜な君子が、冒険をしても成功する事を表す。初六は、陰爻で柔\\n順、しかも謙卦の最下位にある。謙虚な上にも謙虚な態度を取り、君子として大任\\nを全うする処世態度である。従って、大川を渡るような冒険をしても、災いはない。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、心中に徳のある者の名声が外にとどろく事を表す。六二は、下卦の中で謙\\nの徳を心中に持つ者である。この様な人は、どこにあってもその徳が外に聞こえる。\\n正しくて吉。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、苦労して功績を挙げながら誇らない人に、万民が服従する事を表す。九三\\nは、地山謙におけるただ一つの陽爻である。周囲から頼られる君子であり、しかも\\n自らの功績を誇らない。最後には報われて吉を得るであろう。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、上位にありながら謙遜の徳を有している者が、吉運を得る事を表す。六四\\nは、柔順にして上卦の正を得ている。上位にありながら謙遜する事を忘れない。\\nしかし、九三よりも功績はないのに位は上であり、謙遜の上にも謙遜を重ね、分に\\n過ぎた振る舞いをすべきではない。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、尊位にあっても謙虚である君子が、敵を討っても利のある事を表す。六五\\nは、君位にありながら陰爻で柔順の徳を持つ。これは、富がなくても隣人に親しま\\nれる人のような者である。もし、この様な君子に服従しない者があれば、武力で制\\n圧しても良い。この様な人は何事に付けても吉運を得るであろう。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、謙遜の徳が四方に響く者が、多くの味方を得て自国を守る事を表す。上六\\nは、謙遜の極点にあって、その徳は四方に響きわたっている。しかし、自身は陰柔\\nの弱い身であり、また上卦の五をはずれ明確な地位がない。従って、名声があると\\n言っても他国にはその勢力は及ばない。自国の乱れを制圧する程度である。"}}},"2":{"number":2,"name":"坤為地","reading":"ﾁ","overall":"従順。人の先に立つのではなく、いつも後から従順に従って行けば吉。西南の方\\n角に、友人、指導者を見いだす。家庭内の徳を高めるように。雌牛のようにおとな\\nしい者。善徳の積み重ねがある家には多幸があり、不徳の家系には災いがある。\\n坤為地は、下から”陰陰陰　陰陰陰”。全ての爻が陰である。これは、大地の気\\nが延びて柔順で健やかな者の願いが叶う事を表す。同類に従って西南に行けば友を\\n得る。至高の徳のある者は大地のように厚く、全てを受け入れる。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、始めは微細でも、悪の芽を放置すればやがては砕く事のできない厚い氷の\\nように固くなり、後悔する事を表す。初六は、陰（小人）の始まり。天地には陽と\\n同様に陰も必要であり、今の所その勢力も弱い。しかし、このまま成長するに任せ\\nていては後で必ず後悔する事になる。悪の芽は初期に押し止めるべきである。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、最も純粋に坤なる者が、習わずとも大善であり吉運を得る事を表す。六二\\nは、下卦の中でしかも正（陰爻陰位）。最も坤なる徳を有する者である。正しさを\\n固守する直の徳、天地の法則を内包する方の徳、乾の無限の徳に答える大の徳。こ\\nれらを持つ者は、生まれながらにして大善、吉運を得る。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、有能な者が時にその能力を発揮して君子の仕事に従事しながら、自分の功\\n績を隠す事を表す。六三は、陰爻陽位で、従うべき陰爻が積極的な能力を内包して\\nいる。いつまでも隠してはいられないので、王の命ずる仕事を行う事になるが、自\\n分の功績は隠して主張しない。最後までこの様であれば、吉運を得る。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰柔な者が正しさ故の危険な立場にあり、目立たぬようにする事で災いを\\n避ける事を表す。六四は、陰爻陰位で正を得ている。しかし、余りに陰柔であり、\\n正ではあっても同じ陰である君子とは引き合う事もない。従って、自分の正を主張\\nする事は危険である。ただ、目立たぬようにする事で、危険を回避できる。隠遁も\\n考えられる。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸柔順の徳を有する君子が、その内なる徳が外に現れ、最善の吉を得る\\n事を表す。六五は、尊位にあって柔順、中庸の徳を有する。これは、衣装の内側に\\n着る黄装の様に、内なる最高の徳を意味する。黄色は、木火土金水の中央の土の色。\\n東、南、中央、西、北の中央の色に当たる。これは大地の色であり、中央の色でも\\nある。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”様”に変わる可能性を示す。\\nこれは、陰の勢力が強くなり、ついには陽に匹敵するようになり、互いに戦い深手\\nを負う事を表す。上六は陰の極まった姿。既に陰を越える存在である。従って、柔\\n順に従う事なく陽と争う。これは、二匹の龍が争うように激しく、両者とも深い傷\\nを負わずにはいられない。凶。"}}}};

const HT=[[1,10,13,25,44,6,33,12],[43,58,49,17,28,47,31,45],[14,38,30,21,50,64,56,35],[34,54,55,51,32,40,62,16],[9,61,37,42,57,59,53,20],[5,60,63,3,48,29,39,8],[26,41,22,27,18,4,52,23],[11,19,36,24,46,7,15,2]];
const BM={0:8,1:4,2:6,3:2,4:7,5:3,6:5,7:1};
const TI={
  1:{n:'乾',e:'天',go:'金',ho:'北西',fa:'父',bo:'頭',an:'馬',co:'白',qi:'健',ti:'19〜23時',mo:'10・11月'},
  2:{n:'兌',e:'沢',go:'金',ho:'西',fa:'少女',bo:'口',an:'羊',co:'白',qi:'悦',ti:'17〜19時',mo:'9月'},
  3:{n:'離',e:'火',go:'火',ho:'南',fa:'中女',bo:'目',an:'雉',co:'赤',qi:'麗',ti:'11〜13時',mo:'6月'},
  4:{n:'震',e:'雷',go:'木',ho:'東',fa:'長男',bo:'足',an:'龍',co:'青',qi:'動',ti:'5〜7時',mo:'3月'},
  5:{n:'巽',e:'風',go:'木',ho:'東南',fa:'長女',bo:'股',an:'鶏',co:'白',qi:'入',ti:'7〜11時',mo:'4・5月'},
  6:{n:'坎',e:'水',go:'水',ho:'北',fa:'中男',bo:'耳',an:'豚',co:'黒',qi:'陥',ti:'23〜1時',mo:'12月'},
  7:{n:'艮',e:'山',go:'土',ho:'東北',fa:'少男',bo:'手',an:'狗',co:'黄',qi:'止',ti:'1〜5時',mo:'1・2月'},
  8:{n:'坤',e:'地',go:'土',ho:'南西',fa:'母',bo:'腹',an:'牛',co:'黄',qi:'順',ti:'13〜17時',mo:'7・8月'}
};
const TP={1:[1,1,1],2:[1,1,0],3:[1,0,1],4:[1,0,0],5:[0,1,1],6:[0,1,0],7:[0,0,1],8:[0,0,0]};

let state={screen:'welcome',question:'',throws:[],anim:false,currentRecordId:null,researchVals:[7,7,7,7,7,7],researchDetailOpen:false};

function getTrigram(y1,y2,y3){return BM[y3*4+y2*2+y1];}
function getHexNum(u,l){return HT[u-1][l-1];}
function isYang(v){return v===7||v===9;}
function isChanging(v){return v===6||v===9;}
function getLines(hexNum){
  for(let u=1;u<=8;u++)for(let l=1;l<=8;l++)if(HT[u-1][l-1]===hexNum){
    return [...TP[l],...TP[u]]; // [y1..y6]
  }
  return [1,1,1,1,1,1];
}
function getTrigramFromLines(y1,y2,y3){return getTrigram(y1,y2,y3);}
function computeResult(){
  const throws=state.throws;
  const vals=throws.map(t=>t.sum);
  const y=vals.map(v=>isYang(v)?1:0);
  const lower=getTrigram(y[0],y[1],y[2]);
  const upper=getTrigram(y[3],y[4],y[5]);
  const hexNum=getHexNum(upper,lower);
  const changing=vals.map((v,i)=>isChanging(v)?i:-1).filter(i=>i>=0);
  let zhiNum=null;
  if(changing.length>0){
    const zy=y.map((v,i)=>changing.includes(i)?1-v:v);
    const zl=getTrigram(zy[0],zy[1],zy[2]);
    const zu=getTrigram(zy[3],zy[4],zy[5]);
    zhiNum=getHexNum(zu,zl);
  }
  return{hexNum,vals,y,lower,upper,changing,zhiNum};
}

const YAO_VAL_NAMES={6:'━×━ 老陰(六)',7:'━━━ 少陽(七)',8:'━  ━ 少陰(八)',9:'━○━ 老陽(九)'};

function c(s,n){return Array(n).fill(s).join('');}

function buildHexSymbol(vals, size='md'){
  // vals: array of 6 values (爻1=bottom to 爻6=top)
  // display top to bottom (爻6, 爻5, ... 爻1)
  const posNames=['初爻','二爻','三爻','四爻','五爻','上爻'];
  let html='<div class="hex-symbol">';
  for(let i=5;i>=0;i--){

    html+=`<div style="flex:1;position:relative;display:flex;align-items:center">`;
    if(yang){
      html+=`<div style="height:11px;border-radius:2px;flex:1;background:${ch?'var(--red)':'var(--yang)'}"></div>`;
      if(ch) html+=`<span style="position:absolute;left:50%;transform:translateX(-50%);color:#fff8e0;font-size:.75rem">○</span>`;
    } else {
      html+=`<div style="flex:1;display:flex;gap:12%"><div style="height:11px;border-radius:2px;flex:1;background:${ch?'var(--red)':'var(--yin)'}"></div><div style="height:11px;border-radius:2px;flex:1;background:${ch?'var(--red)':'var(--yin)'}"></div></div>`;
      if(ch) html+=`<span style="position:absolute;left:50%;transform:translateX(-50%);color:#fff8e0;font-size:.75rem">×</span>`;
    }
    html+='</div></div>';
  }
  html+='</div>';
  return html;
}

function buildMiniSymbol(hexNum){
  const lines=getLines(hexNum);
  let html='<div class="zhi-symbol">';
  for(let i=5;i>=0;i--){
    const yang=lines[i]===1;
    html+=`<div class="zhi-sym-row">`;

    } else {
      html+=`<div class="zhi-yin-wrap"><div class="zhi-yin-half"></div><div class="zhi-yin-half"></div></div>`;
    }
    html+='</div>';
  }
  html+='</div>';
  return html;
}

// ── CSV History Storage ──
const CSV_KEY='iching_history';
const CSV_HDR='id,datetime,question,hexNum,hexName,zhiNum,zhiName,changing,memo';

function escapeCsv(s){
  s=String(s??'');
  if(/[,"\n\r]/.test(s))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}

function parseCsvLine(line){
  const f=[];let i=0;
  while(i<=line.length){
    if(i===line.length){f.push('');break;}
    if(line[i]==='"'){
      let v='';i++;
      while(i<line.length){
        if(line[i]==='"'&&line[i+1]==='"'){v+='"';i+=2;}
        else if(line[i]==='"'){i++;break;}
        else{v+=line[i++];}
      }
      f.push(v);if(line[i]===',')i++;
    }else{
      let j=line.indexOf(',',i);if(j<0)j=line.length;
      f.push(line.slice(i,j));i=j+1;
    }
  }
  return f;
}

function parseCsv(text){
  const lines=(text||'').trim().split('\n');
  if(lines.length<2)return[];
  return lines.slice(1).map(l=>{
    const f=parseCsvLine(l);
    return{id:f[0]||'',datetime:f[1]||'',question:f[2]||'',hexNum:f[3]||'',hexName:f[4]||'',zhiNum:f[5]||'',zhiName:f[6]||'',changing:f[7]||'',memo:f[8]||''};
  }).filter(r=>r.id);
}

function recordsToCsv(recs){
  const rows=[CSV_HDR,...recs.map(r=>[r.id,r.datetime,r.question,r.hexNum,r.hexName,r.zhiNum,r.zhiName,r.changing,r.memo].map(escapeCsv).join(','))];
  return rows.join('\n')+'\n';
}

function loadRecords(){
  return parseCsv(localStorage.getItem(CSV_KEY)||'');
}

function saveRecord(r){
  const h=HD[String(r.hexNum)];
  const hexName=h?h.name:'';
  const zhName=r.zhiNum&&HD[String(r.zhiNum)]?HD[String(r.zhiNum)].name:'';
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const dt=now.getFullYear()+'/'+pad(now.getMonth()+1)+'/'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  const id=String(Date.now());
  const rec={id,datetime:dt,question:state.question,hexNum:String(r.hexNum),hexName,zhiNum:String(r.zhiNum||''),zhiName:zhName,changing:r.changing.join('-'),memo:''};
  const recs=loadRecords();
  recs.push(rec);
  localStorage.setItem(CSV_KEY,recordsToCsv(recs));
  return id;
}

function updateMemo(id,memo){
  const recs=loadRecords();
  const rec=recs.find(r=>r.id===id);
  if(rec){rec.memo=memo;localStorage.setItem(CSV_KEY,recordsToCsv(recs));}
}

function exportCsv(){
  const csv=localStorage.getItem(CSV_KEY)||recordsToCsv([]);
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='易経占い履歴.csv';a.click();
  URL.revokeObjectURL(url);
}

function renderResearch(){
  const vals=state.researchVals;
  const y=vals.map(v=>isYang(v)?1:0);
  const lower=getTrigram(y[0],y[1],y[2]);
  const upper=getTrigram(y[3],y[4],y[5]);
  const hexNum=getHexNum(upper,lower);
  const changing=vals.map((v,i)=>isChanging(v)?i:-1).filter(i=>i>=0);
  let zhiNum=null;
  if(changing.length>0){
    const zy=y.map((v,i)=>changing.includes(i)?1-v:v);
    const zl=getTrigram(zy[0],zy[1],zy[2]);
    const zu=getTrigram(zy[3],zy[4],zy[5]);
    zhiNum=getHexNum(zu,zl);
  }
  const h=HD[String(hexNum)];
  if(!h){document.getElementById('screen').innerHTML='<p>データエラー</p>';return;}
  const lowerInfo=TI[lower];const upperInfo=TI[upper];

  // 爻セレクタ（上爻→初爻の順に表示）
  const YAO_SYM={7:'━━━',9:'━○━',8:'━\u3000━',6:'━×━'};
  const YAO_LBL={7:'少陽',9:'老陽',8:'少陰',6:'老陰'};
  let selectorHtml='';

    changingHtml='<div class="section-divider"></div><div class="card-title">◆ 変爻の解釈</div>';
    changing.forEach(pos=>{

    });
  }

  // 之卦
  let zhiHtml='';
  if(zhiNum&&zhiNum!==hexNum){
    const zh=HD[String(zhiNum)];
    if(zh){
      let zhiLower,zhiUpper;
      for(let u=1;u<=8;u++)for(let l=1;l<=8;l++)if(HT[u-1][l-1]===zhiNum){zhiLower=l;zhiUpper=u;}

        <div class="zhi-section">

          <div class="zhi-hex-row">${buildMiniSymbol(zhiNum)}<div class="zhi-name"><h3>${zh.name}</h3><p>第${zhiNum}卦　${zUI.n}/${zLI.n}</p></div></div>
          <div class="interpretation">${fmt(zh.overall)}</div>

    }

  // 詳細（八卦属性・全爻）
  const detOpen=state.researchDetailOpen;
  const detailHtml=`

      <tr><th></th><th>上卦：${upperInfo.n}（${upperInfo.e}）</th><th>下卦：${lowerInfo.n}（${lowerInfo.e}）</th></tr>

      <div class="card-title">◆ 擲銭法について</div>
      <p>３枚のコインを６回投げ、下から順に爻（こう）を積み重ねて卦（か）を立てます。</p>
      <p style="margin-top:8px">表＝陰（値２）／裏＝陽（値３）<br>合計 ９＝老陽 ━○━（変爻）<br>合計 ７＝少陽 ━━━<br>合計 ８＝少陰 ━　━<br>合計 ６＝老陰 ━×━（変爻）</p>
    </div>`;
}

function startThrow(){
  const q=document.getElementById('qInput').value.trim();
  state.question=q;
  state.throws=[];
  state.screen='throw';
  showThrow();
}

function showThrow(){
  const n=state.throws.length; // 0-5: 何番目を投げるか（0-indexed）
  const done=n>=6;
  const posLabel=['初爻（第１爻）','二爻（第２爻）','三爻（第３爻）','四爻（第４爻）','五爻（第５爻）','上爻（第６爻）'];

  // ビルダー（下から上）
  let builderHtml='<div class="hex-builder">';
  for(let i=5;i>=0;i--){
    const t=state.throws[i];
    builderHtml+=`<div class="hex-builder-row"><div class="hex-builder-pos">${['初','二','三','四','五','上'][i]}爻</div>`;
    if(t){
      const yang=isYang(t.sum);const ch=isChanging(t.sum);
      builderHtml+=`<div class="yao-display">`;
      if(yang){
        builderHtml+=`${ch?'<span class="yao-marker">○</span>':''}<div class="yao-yang"></div>`;
      } else {
        builderHtml+=`${ch?'<span class="yao-marker">×</span>':''}<div class="yao-yin-left"></div><div class="yao-yin-right"></div>`;
      }
      builderHtml+='</div>';
    } else {
      builderHtml+=`<div class="yao-display"><div class="yao-pending"></div></div>`;
    }
    builderHtml+='</div>';
  }
  builderHtml+='</div>';

  const coinsHtml=`
    <div class="coins-area" id="coinsArea">
      <div class="coin neutral" id="c0"><span>？</span></div>
      <div class="coin neutral" id="c1"><span>？</span></div>
      <div class="coin neutral" id="c2"><span>？</span></div>
    </div>`;

  document.getElementById('screen').innerHTML=`
    <div class="card">
      <div class="card-title">◆ 投銭　第 <span style="color:var(--gold2)">${done?6:n+1}</span> 爻</div>
      ${state.question?`<p style="font-size:.8rem;color:var(--text2);margin-bottom:12px">「${state.question}」</p>`:''}
      <div class="throw-progress">${done?'全爻完了':'下から '+posLabel[n]+' を立てます'}</div>
      ${coinsHtml}
      <div class="line-result" id="lineResult"></div>
      ${builderHtml}
      ${done
        ?`<button class="btn" onclick="showResult()">占い結果を見る →</button>`
        :`<button class="btn" id="throwBtn" onclick="doThrow()">コインを投げる</button>`
      }
    </div>`;
}

function doThrow(){
  if(state.anim) return;
  state.anim=true;
  document.getElementById('throwBtn').disabled=true;

  const c0=document.getElementById('c0');
  const c1=document.getElementById('c1');
  const c2=document.getElementById('c2');
  [c0,c1,c2].forEach(c=>{c.className='coin flipping';c.innerHTML='<span>？</span>';});

  setTimeout(()=>{
    // Generate result
    const coins=[
      Math.random()<0.5?2:3,
      Math.random()<0.5?2:3,
      Math.random()<0.5?2:3
    ];
    const sum=coins[0]+coins[1]+coins[2];
    state.throws.push({coins,sum});

    // Show coins
    [c0,c1,c2].forEach((el,i)=>{
      const val=coins[i];
      el.className='coin '+(val===2?'omote':'ura');
      el.innerHTML=`<span>${val===2?'表':'裏'}</span><div class="coin-label">${val===2?'陰(2)':'陽(3)'}</div>`;
    });

    // Show line result
    document.getElementById('lineResult').innerHTML=
      `<span class="line-name">${YAO_VAL_NAMES[sum]}</span>`;

    setTimeout(()=>{
      state.anim=false;
      showThrow();
    },1200);
  },520);
}

function fmt(t){return (t||'').replace(/\\n/g,'');}

function toggleDetail(btn){
  const sec=document.getElementById('detailSec');
  const open=sec.style.display==='none';
  sec.style.display=open?'block':'none';
  btn.textContent=open?'▲ 詳細考察を閉じる':'▼ 詳細考察（八卦属性・全爻の解釈）';
}

function showResult(){
  setNavActive('home');
  const r=computeResult();
  const h=HD[String(r.hexNum)];
  if(!h){document.getElementById('screen').innerHTML='<p>データエラー</p>';return;}
  state.currentRecordId=saveRecord(r);

  // 本卦の爻名を実データから取得
  function yaoName(hexData, pos){
    return hexData.yaos[String(pos)]?.name || ['初爻','二爻','三爻','四爻','五爻','上爻'][pos];
  }

  // 上卦・下卦名
  const lowerInfo=TI[r.lower];const upperInfo=TI[r.upper];
  const hexSymHtml=buildHexSymbol(r.vals);

  // 変爻セクション
  let changingHtml='';
  if(r.changing.length>0){
    changingHtml='<div class="section-divider"></div>';
    changingHtml+=`<div class="card-title">◆ 変爻の解釈</div>`;
    r.changing.forEach(pos=>{
      const yao=h.yaos[String(pos)];
      if(yao){
        changingHtml+=`<div class="yao-section">
          <div class="yao-section-title">▶ ${yao.name}</div>
          <div class="yao-section-text">${fmt(yao.text)}</div>
        </div>`;
      }
    });
  }

  // 之卦セクション
  let zhiHtml='';
  if(r.zhiNum && r.zhiNum!==r.hexNum){
    const zh=HD[String(r.zhiNum)];
    if(zh){
      let zhiLower,zhiUpper;
      for(let u=1;u<=8;u++)for(let l=1;l<=8;l++)if(HT[u-1][l-1]===r.zhiNum){zhiLower=l;zhiUpper=u;}
      const zLI=TI[zhiLower];const zUI=TI[zhiUpper];
      zhiHtml=`<div class="section-divider"></div>
        <div class="card-title">◆ 之卦（変化後の卦）</div>
        <div class="zhi-section">
          <div class="zhi-label">${h.name}（${r.hexNum}）→ ${zh.name}（${r.zhiNum}）</div>
          <div class="zhi-hex-row">
            ${buildMiniSymbol(r.zhiNum)}
            <div class="zhi-name">
              <h3>${zh.name}</h3>
              <p>第${r.zhiNum}卦　${zUI.n}/${zLI.n}</p>
            </div>
          </div>
          <div class="interpretation">${fmt(zh.overall)}</div>
        </div>`;
    }
  }

  document.getElementById('screen').innerHTML=`
    <div class="card">
      <div class="card-title">◆ 本卦</div>
      ${state.question?`<p style="font-size:.8rem;color:var(--text2);margin-bottom:12px">「${state.question}」</p>`:''}
      ${hexSymHtml}
      <div class="hex-name">
        <h2>${h.name}</h2>
        <div class="hex-num">第${r.hexNum}卦</div>
        <div class="hex-trinames">上卦 ${upperInfo.n}（${upperInfo.e}）／ 下卦 ${lowerInfo.n}（${lowerInfo.e}）</div>
      </div>
      <div class="section-divider"></div>
      <div class="card-title">◆ 卦辞</div>
      <div class="interpretation">${fmt(h.overall)}</div>
      ${changingHtml}
      ${zhiHtml}
      <div class="section-divider"></div>
      <button class="detail-toggle" onclick="toggleDetail(this)">▼ 詳細考察（八卦属性・全爻の解釈）</button>
      <div id="detailSec" style="display:none">
        <div class="card-title" style="margin-top:16px">◆ 八卦の属性</div>
        <table class="tri-table">
          <tr><th></th><th>上卦：${upperInfo.n}（${upperInfo.e}）</th><th>下卦：${lowerInfo.n}（${lowerInfo.e}）</th></tr>
          <tr><th>五行</th><td>${upperInfo.go}</td><td>${lowerInfo.go}</td></tr>
          <tr><th>方位</th><td>${upperInfo.ho}</td><td>${lowerInfo.ho}</td></tr>
          <tr><th>家族</th><td>${upperInfo.fa}</td><td>${lowerInfo.fa}</td></tr>
          <tr><th>身体</th><td>${upperInfo.bo}</td><td>${lowerInfo.bo}</td></tr>
          <tr><th>動物</th><td>${upperInfo.an}</td><td>${lowerInfo.an}</td></tr>
          <tr><th>色</th><td>${upperInfo.co}</td><td>${lowerInfo.co}</td></tr>
          <tr><th>性質</th><td>${upperInfo.qi}</td><td>${lowerInfo.qi}</td></tr>
          <tr><th>時間</th><td>${upperInfo.ti}</td><td>${lowerInfo.ti}</td></tr>
          <tr><th>月</th><td>${upperInfo.mo}</td><td>${lowerInfo.mo}</td></tr>
        </table>
        <div class="card-title" style="margin-top:16px">◆ 全爻の解釈</div>
        ${[5,4,3,2,1,0].map(pos=>{
          const yao=h.yaos[String(pos)];
          if(!yao) return '';
          const isChg=r.changing.includes(pos);
          return `<div class="all-yao-item${isChg?' changing':''}">
            <div class="all-yao-name">${yao.name}${isChg?'<span class="ch-mark">（変爻）</span>':''}</div>
            <div class="all-yao-text">${fmt(yao.text)}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="section-divider"></div>
      <div class="result-memo-area">
        <div class="result-memo-label">✏ この占いにメモを残す</div>
        <textarea class="memo-input" id="resultMemoInput" placeholder="気づいたこと、感想など…"></textarea>
        <button class="memo-save-btn" id="resultMemoBtn" onclick="saveMemoResult()">メモを保存</button>
      </div>
      <button class="btn restart-btn" onclick="restart()">◇ もう一度占う</button>
      <button class="btn" style="margin-top:8px;background:transparent;border:1px solid var(--border);color:var(--gold)" onclick="showHistory()">履歴を見る</button>
    </div>`;
}

function restart(){
  state={screen:'welcome',question:state.question,throws:[],anim:false,currentRecordId:null};
  setNavActive('home');
  showWelcome();
}

showWelcome();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
