<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易経 擲銭法占い</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4a017">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="易経占い">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0a02;
  --surface:#1e1508;
  --card:#2a1e0a;
  --border:#5a3e10;
  --text:#f0d898;
  --text2:#b89040;
  --gold:#d4a017;
  --gold2:#f0c040;
  --red:#e05010;
  --yang:#d4a017;
  --yin:#8a6010;
}
body{background:var(--bg);color:var(--text);font-family:"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px 0 60px}
#app{width:100%;max-width:560px;padding:0 16px}

/* Header */
.app-title{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border)}
.app-title h1{font-size:2.2rem;color:var(--gold2);letter-spacing:.15em;text-shadow:0 0 20px rgba(212,160,23,.4)}
.app-title p{color:var(--text2);font-size:.85rem;margin-top:8px;letter-spacing:.1em}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:20px;margin-top:20px}
.card-title{color:var(--gold);font-size:1rem;letter-spacing:.12em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Welcome */
.question-label{color:var(--text2);font-size:.85rem;margin-bottom:8px;letter-spacing:.08em}
.question-input{width:100%;background:#160e02;border:1px solid var(--border);border-radius:2px;color:var(--text);font-size:.95rem;padding:10px 12px;font-family:inherit;resize:vertical;min-height:72px;outline:none;transition:border-color .2s}
.question-input:focus{border-color:var(--gold)}
.question-input::placeholder{color:#5a4010}
.btn{display:block;width:100%;margin-top:16px;padding:14px;background:linear-gradient(to bottom,#c09020,#8a6010);border:1px solid #c09020;border-radius:3px;color:#fffbe0;font-size:1rem;font-family:inherit;letter-spacing:.15em;cursor:pointer;transition:all .15s}
.btn:hover{background:linear-gradient(to bottom,#d4a820,#a07018);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,168,32,.3)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}

/* Throw screen */
.throw-progress{text-align:center;color:var(--text2);font-size:.85rem;letter-spacing:.1em;margin-top:16px}
.throw-num{color:var(--gold2);font-size:1.8rem;font-weight:bold}

.coins-area{display:flex;justify-content:center;gap:20px;margin:24px 0}
.coin{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.1rem;letter-spacing:.05em;transition:all .2s;cursor:default;position:relative;border:2px solid var(--border)}
.coin.neutral{background:radial-gradient(circle at 35% 35%,#6a4820,#2a1a05);color:var(--text2)}
.coin.omote{background:radial-gradient(circle at 35% 35%,#786028,#3a2808);border-color:#a07820;color:#f0d060}
.coin.ura{background:radial-gradient(circle at 35% 35%,#b08030,#7a5010);border-color:#d4a020;color:#fff8e0}
.coin.flipping{animation:flip .5s ease-in-out}
.coin-label{font-size:.7rem;color:var(--text2);margin-top:2px}
@keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}

.line-result{text-align:center;margin:12px 0 20px;min-height:28px}
.line-result .line-name{font-size:.95rem;color:var(--text);letter-spacing:.1em}
.line-result .line-type{font-size:.8rem;color:var(--text2);margin-left:8px}

/* Hexagram builder */
.hex-builder{margin:0 auto;width:160px}
.hex-builder-row{display:flex;align-items:center;gap:8px;height:24px;margin:4px 0}
.hex-builder-pos{font-size:.65rem;color:var(--text2);width:28px;text-align:right}
.yao-display{flex:1;height:10px;position:relative;display:flex;align-items:center;gap:0}
.yao-yang{height:10px;background:var(--yang);border-radius:2px;flex:1}
.yao-yin-left{height:10px;background:var(--yin);border-radius:2px;width:44%}
.yao-yin-right{height:10px;background:var(--yin);border-radius:2px;width:44%;margin-left:12%}
.yao-pending{height:10px;background:var(--border);border-radius:2px;flex:1;opacity:.3}
.yao-marker{font-size:.7rem;position:absolute;left:50%;transform:translateX(-50%);color:var(--red);font-weight:bold;z-index:1;top:-1px}

/* Result screen */
.hex-symbol{margin:0 auto;width:180px;padding:16px 0}
.hex-symbol-row{display:flex;align-items:center;gap:10px;height:28px;margin:5px 0}
.hex-symbol-pos{font-size:.7rem;color:var(--text2);width:32px;text-align:right}
.yao-sym-yang{height:11px;background:var(--yang);border-radius:2px;flex:1}
.yao-sym-yin-wrap{flex:1;display:flex;gap:12%}
.yao-sym-yin-half{height:11px;background:var(--yin);border-radius:2px;flex:1}
.yao-sym-marker{font-size:.8rem;position:absolute;left:50%;transform:translateX(-50%);color:var(--red);font-weight:bold;z-index:1}
.yao-sym-changing .yao-sym-yang,.yao-sym-changing .yao-sym-yin-half{background:var(--red);opacity:.85}
.hex-name{text-align:center;margin:4px 0 0}
.hex-name h2{color:var(--gold2);font-size:1.5rem;letter-spacing:.12em}
.hex-name .hex-num{color:var(--text2);font-size:.8rem;margin-top:4px}
.hex-name .hex-trinames{color:var(--text2);font-size:.75rem;margin-top:2px;letter-spacing:.06em}

.interpretation{white-space:pre-wrap;line-height:1.8;font-size:.88rem;color:var(--text);padding:4px 0}
.yao-section{margin-top:16px;padding:14px;background:#160e02;border:1px solid var(--border);border-radius:3px}
.yao-section-title{color:var(--red);font-size:.82rem;letter-spacing:.1em;margin-bottom:8px}
.yao-section-text{white-space:pre-wrap;line-height:1.8;font-size:.85rem;color:var(--text)}

.zhi-section{margin-top:8px}
.zhi-label{color:var(--text2);font-size:.82rem;letter-spacing:.08em;margin-bottom:4px;text-align:center}
.zhi-hex-row{display:flex;align-items:center;gap:16px;justify-content:center;margin:8px 0}
.zhi-symbol{width:80px}
.zhi-sym-row{display:flex;align-items:center;height:16px;margin:3px 0}
.zhi-yang{height:8px;background:var(--yang);border-radius:1px;flex:1}
.zhi-yin-wrap{flex:1;display:flex;gap:12%}
.zhi-yin-half{height:8px;background:var(--yin);border-radius:1px;flex:1}
.zhi-name{text-align:left}
.zhi-name h3{color:var(--gold);font-size:1.1rem;letter-spacing:.1em}
.zhi-name p{color:var(--text2);font-size:.75rem;margin-top:2px}
.arrow{font-size:1.4rem;color:var(--text2)}

.section-divider{height:1px;background:var(--border);margin:16px 0}

.restart-btn{margin-top:24px}
.detail-toggle{display:block;width:100%;margin-top:12px;padding:10px 14px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--gold);font-size:.85rem;font-family:inherit;letter-spacing:.1em;cursor:pointer;text-align:left;transition:all .15s}
.detail-toggle:hover{background:#1e1408;border-color:var(--gold)}
.tri-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:10px}
.tri-table th,.tri-table td{padding:6px 8px;border:1px solid var(--border);text-align:center;line-height:1.5}
.tri-table th{color:var(--gold2);background:#180f00;font-weight:normal;letter-spacing:.08em}
.tri-table td{color:var(--text)}
.all-yao-item{padding:12px;border-left:2px solid var(--border);margin-top:10px}
.all-yao-item.changing{border-left-color:var(--red)}
.all-yao-name{color:var(--gold);font-size:.8rem;letter-spacing:.1em;margin-bottom:6px}
.ch-mark{color:var(--red);margin-left:6px;font-size:.75rem}
.all-yao-text{line-height:1.8;font-size:.85rem;color:var(--text)}

/* Nav bar */
.nav-bar{display:flex;gap:8px;margin-top:16px}
.nav-btn{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text2);font-size:.85rem;font-family:inherit;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.nav-btn:hover{background:#1e1408;border-color:var(--gold);color:var(--gold)}
.nav-btn.active{background:#2a1e0a;border-color:var(--gold2);color:var(--gold2)}

/* History */
.history-item{padding:14px;border:1px solid var(--border);border-radius:3px;margin-top:12px;background:#160e02}
.history-date{font-size:.72rem;color:var(--text2);margin-bottom:5px;letter-spacing:.05em}
.history-question{font-size:.88rem;color:var(--text);margin-bottom:5px}
.history-hex{color:var(--gold);font-size:.92rem;letter-spacing:.08em}
.history-memo-text{margin-top:6px;font-size:.82rem;color:var(--text2);white-space:pre-wrap;line-height:1.6;padding:6px 8px;background:#0f0a02;border-radius:2px;border-left:2px solid var(--border)}
.history-empty{text-align:center;color:var(--text2);font-size:.9rem;padding:32px 0;letter-spacing:.08em}
.export-btn{display:block;width:100%;margin-top:4px;padding:10px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--gold);font-size:.82rem;font-family:inherit;letter-spacing:.1em;cursor:pointer;text-align:center;transition:all .15s}
.export-btn:hover{background:#1e1408;border-color:var(--gold)}
.memo-details summary{color:var(--gold);font-size:.8rem;cursor:pointer;letter-spacing:.08em;outline:none;list-style:none;padding:4px 0}
.memo-details summary::-webkit-details-marker{display:none}
.memo-input{width:100%;background:#0f0a02;border:1px solid var(--border);border-radius:2px;color:var(--text);font-size:.85rem;padding:8px 10px;font-family:inherit;resize:vertical;min-height:60px;outline:none;margin-top:8px;transition:border-color .2s}
.memo-input:focus{border-color:var(--gold)}
.memo-save-btn{margin-top:6px;padding:6px 18px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--gold);font-size:.8rem;font-family:inherit;cursor:pointer;letter-spacing:.08em;transition:all .15s}
.memo-save-btn:hover{border-color:var(--gold);background:#1e1408}

/* Result memo */
.result-memo-area{margin-top:12px;padding:12px;background:#160e02;border:1px solid var(--border);border-radius:3px}
.result-memo-label{color:var(--gold);font-size:.82rem;letter-spacing:.1em;margin-bottom:6px}

/* Research mode */
.research-line-row{display:flex;align-items:center;gap:5px;margin:5px 0}
.research-line-label{width:32px;font-size:.75rem;color:var(--text2);text-align:right;flex-shrink:0;letter-spacing:.04em}
.line-type-btn{flex:1;padding:5px 2px;font-size:.7rem;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:2px;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:all .15s;line-height:1.4;text-align:center}
.line-type-btn:hover{border-color:var(--gold);color:var(--gold)}
.line-type-btn.sel{border-color:var(--gold2);color:var(--gold2);background:#1e1408}
.line-type-btn.sel-ch{border-color:var(--red);color:var(--red);background:#1e0808}
.research-hex-input{width:72px;background:#160e02;border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:2px;font-size:.9rem;outline:none;font-family:inherit;text-align:center}
.research-hex-input:focus{border-color:var(--gold)}
</style>
</head>
<body>
<div id="app">
  <div class="app-title">
    <h1>易経占い</h1>
    <p>擲銭法（三枚筮）</p>
  </div>
  <div class="nav-bar">
    <button class="nav-btn active" id="navHome" onclick="goHome()">占い</button>
    <button class="nav-btn" id="navHistory" onclick="showHistory()">履歴</button>
    <button class="nav-btn" id="navResearch" onclick="showResearch()">研究</button>
  </div>
  <div id="screen"></div>
</div>
<script>
const HD = {"1":{"number":1,"name":"乾為天","reading":"ﾃﾝ","overall":"天。正しさの持続。仕事が忙しく、責任も重い立場であるが、健康にも不安が無\\nく、大抵の願い事は叶う。入学試験や入社試験には、とても良い卦。しかし、登り\\nつめた壮年期を暗示しているので下り坂には要注意。\\n乾為天は、６爻全てが”陽”であり純粋な陽として最も大きな”天”を意味する。\\nこれは、最高に創造的かつ活動的である”健なるもの”を象徴している。あるいは、\\n乾は天がものを生み出す無自覚の衝動”生意”を表す。願い事は叶う。ただし、問\\nう人の動機が正しく、かつその正しさが持続されねばならない。また、登り詰めた\\n荘年期を暗示しているので、下り坂には注意を要する。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、地に潜む竜を意味する。活動的、陽動的な竜ではあるが、まだ活動できる\\n状態ではない。陽気が地下に萌え始めたばかりの準備の段階である。現在は積極的\\nな行動は自重し、時を待つ忍耐が肝要である。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、地上に現れた竜を意味する。第二爻は、内爻の中央の位。さらに乾為天の\\n場合、陽爻であってもそのまま五位の陽に応ずる。正に中庸の徳を備えた竜である。\\nこれは、まだ弱小ではあっても君子に通じる者か、あるいはその様な者に出会\\nうことを意味する。"},"2":{"name":"九三","text":"九三は、下から３番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽剛ではあるが、下卦の一番登り詰めた位であり、危険な地位を意味する。\\n有徳、剛健なるものとして、日々自己発展の努力を怠らず、深夜まで警戒を保ち過\\n失を防げば、この危険な地位も全うできる。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、惑える竜を意味する。底知れぬ深みと空との間にあって、飛ぶか止めるか\\nを迷っている竜の姿である。陽でありながら陰位にあり、安定感を欠く。進退いま\\nだ定まらず、時期を見極めることが肝要である。"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは竜が時とところを得て、天を飛ぶ姿を意味する。５位は中正、理想の位であ\\nる。この卦を得たものは、至高の地位にある君子に会うことができる。また、もし\\n真の君子を占った場合は、在野の聖人を見いだすことを約束するものである。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは上り詰めて降りることの出来ない竜を意味する。過大なエネルギー、過度の\\n満足、極度の高位、等を示しており、更なる行動は後悔を生む。今はバランスを考\\nえ自重し、周囲の気持ちを大切にして、行き過ぎを改めるべきである。"}}},"10":{"number":10,"name":"天沢履","reading":"ﾘ","overall":"人の踏むべき道。行動を慎重にして礼節を守れば吉。虎、剛強の人に対しても柔\\n順和悦の態度で接すれば、噛み付かれる心配はない。経験者の話を良く聞き、失敗\\nを繰り返さないように。\\n天沢履は、下から”陽陽陰　陽陽陽”。これは、人の踏むべき道を意味する。\\n”天”は最も剛強なるものを示し”沢”はそのすぐ後に続いて虎の尾を踏む形であ\\nる。しかし、”沢”には喜ぶ、和らぐ等の意味があり、この徳により虎に噛まれる\\nことが無い。全体としては危機感に満ちているが、和らいだ気持ちを持ち続け問題\\nに対処すれば、傷を負わずにすむ。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\n陽爻（能力のある者）でありながら、最下位に甘んじているもの。人の踏むべき道\\nの最初に当り、仕えたばかりの階級を意味する。まだ富貴の誘惑には惑わされず、\\nひたすら我が道を踏み行っている状態であり、凶運はない。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽爻であり、内卦の中を得ているが下位にあって外卦に応じていない。\\nつまり、中庸の徳のあるものが、野にあって、仕えるべき君主に親しんでいない状\\n態を意味する。在野の者がこの卦を得れば、坦々と我が道を行く有徳の隠者を表し\\nている。"},"2":{"name":"六三","text":"六三は、下から３番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰爻ではあるが、陽位にありしかも下卦の一番登り詰めた位であり、危険\\nな地位を意味する。体は虚弱（陰爻）でありながら気持ちだけ強く（陽位）、虎の\\n尾を踏もうとする者。当然、剛強な上位者に傷つけられ、大きな後悔を残す。武人\\nとしては、破れる前に不徳の一戦を試みる。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、虎の尾を踏み恐れる者を意味する。九四は陽爻でありながら陰位にあり不\\n中不正。この者が虎の尾を踏もうとする。しかし、自分は強い力を持つ”剛”であ\\nりながら、陰位にあって従順な態度を持ち続けている。従って十分に警戒すれば、\\n最後には願いが叶い吉を得ることができる。"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、才能のあるものが正しい地位にあり、断固とした態度で事を踏み行う姿を\\n意味する。下の者も喜んでこれに従うが、疑いを知らぬ者の行為は、それが正しく\\nても危険を伴う。自分の才能を過信してしまうからである。正しけれど危うし。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、”天沢履”卦の結論のあり様を示している。つまり、危険な状況にあって\\n最後までそつなく振舞えたかが問題となる。吉凶いずれの結果もその人の振舞いに\\nより決まるもので、終わりまで良く振舞うことが出来れば、大いなる吉。"}}},"13":{"number":13,"name":"天火同人","reading":"ﾄﾞｳｼﾞﾝ","overall":"共同事業。もし心に秘めた計画があるのなら、今こそ大事決行の時である。友人\\nを大切にして共に上昇する事ができる。ただし、近親者との共同は不可。\\n天火同人は、下から”陽陰陽　陽陽陽”。これは、野における大同の交わりを意\\n味する。行き詰まった世の中を、公正無私な人々の和が打開する。狭い身内のつな\\nがりではなく、聖人に於ける大同の道として、世界に広く行われる和合である。外\\n卦の”乾”は、たゆみない前進の性質を有し、大川を渡ることも可能となる。文明\\nで健剛、中正で応ずる君子の正道である。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\n陽爻（健剛の者）でありながら、最下位に甘んじているもの。上卦に応じるものが\\n無い。つまり、私的君子を持たない者を意味する。従って、この爻が意味するよう\\nに、門内の狭い人間関係を超越し公正無私な態度で人と広く交われば吉。"},"1":{"name":"六二","text":"六二は、下から２番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、君子の大同を理想として表す”天火同人”にあって、上卦に私的に応じる\\n九五”陽爻”を持つ爻である。従って、本人は中正であってもこの九五の存在によ\\nり本来の和合が困難な状態にある。あまり良い状態とは言えず、身内との付き合い\\nばかりではいつか恥をかくことになる。"},"2":{"name":"九三","text":"九三は、下から３番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中庸を得ていない陽爻が、上に応ずるものがなく強引に六二に接近を図る\\nことを意味する。しかし、六二には上卦の九五が強く応じており、九三はより戦力\\nの強い九五に対抗することはできない。従って、伏兵を置き形勢を見ても、戦いを\\n起こす事なく終わる。凶には至らない。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、中庸を得ていない陽爻が、下に応ずるものがなく強引に六二に接近を図る\\nことを意味する。しかし、六二には上卦の九五が強く応じており、更に六二との間\\nには九三が兵を伏している。この様な状況にあって、陰位の陽爻である九四は自分\\nの行為が正しくない事を自覚している。正道に復帰すれば吉。"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、健剛なるものが中正の地位にあり、六二に応じようとする姿を意味する。\\nしかし、六二との間には九三、九四の強引なるものが伏兵をし妨害をしている。こ\\nちらに正義があるだけに、九五の思いは悲憤に耐えぬものがある。最後には大軍を\\nもって妨害に勝ち、六二に会うことができる。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、”天火同人”の卦において最も外側に位置する。内卦に応ずるものがなく、\\n広大無私の野にあって会うべき相手が無い。孤立した状態ではあるが、上九は自分\\nから狭い世間を離れた者であり、悔いることはない。孤独なら、孤高のまま我が道\\nを行けば吉。しかし、逃避的な一面は否定できない。"}}},"25":{"number":25,"name":"天雷無妄","reading":"ﾑﾎﾞｳ","overall":"天雷無妄は、下から”陽陰陰　陽陽陽”。これは、大自然の偽りなき道理を意味\\nする。人知を越えた営み、望外の福。内卦は動（震）、外卦は健（乾）の徳があり、","yaos":{"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、健剛なるものが中正の地位にあり、六二に応じている姿を意味する。無妄\\nの卦の中で、最もめでたいものである。しかし、無妄の病に会う。優れた徳のある\\nものが予期せぬ病に会うが、これには原因がなく、従って作意的な治療はせずに自\\n然に治すのが良い。"},"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\n陽爻（健剛の者）であり、正位についている。つまり、内卦の真の主である。この\\n様な健剛の者が誠を貫けば、志しを遂げることは難しくない。従って、行動を起こ\\nすのに大いに吉。"},"1":{"name":"六二","text":"六二は、下から２番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、従順なる者（陰爻）が、中正（内卦の中、陰位）であり、時に逆らわず、\\n我執を捨てて天理に従い働くことを意味する。願望が叶えられるのではなく、天の\\n摂理により思わぬ収穫が得られる。耕さずに望外の実りを得るものである。"},"2":{"name":"六三","text":"六三は、下から３番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰爻である六三が、不中、不正（陽位）にあり、思わぬ災難にあうことを\\n意味する。例えば、他人の盗みの罪をかぶり、嫌疑を受ける様なものである。しか\\nし、天の運行によるものであるから、落胆してはならない。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、中庸を得ていない陽爻が、下に応ずるものがなくいよいよ剛健の性質を明\\nらかにすることを意味する。私的な交わりのない剛健なるものが、つまりは私心な\\nく道を守る。これは天理に叶うものであり、この無妄の道を固い気持ちで守り通す\\nべきである。あくまでも守りであり、新たなことを行う時ではない。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、”天雷無妄”の卦において最も上位に位置する。無妄ではあるが、行き詰\\nまりは否定できない。無理に進もうとすれば有妄となり、災難に会い、なんの利益\\nも得られないことになるであろう。"}}},"44":{"number":44,"name":"天風女后","reading":"ｺｳ","overall":"出会い。多くの男が一人の女に出会い、争う。しかし、それを機会に女と最も近\\nい関係にあった男が、重要な人物と知り合う事ができる。偶然の災害に注意。女の\\n客商売には吉。\\n天風爻は、下から”陰陽陽　陽陽陽”。これは、一人の女が５人の男に突然出会\\nうことを意味する。上卦は乾で質実剛健でありすべてが陽、下卦は巽で陰は一つだ\\nけ。つまり５陽に囲まれた１陰である。この１陰が、ある日突然男に会う。女は５\\n人の男を相手にするような不貞の者であり、盛んな精力の持ち主である。この様な\\n女と結ばれれば、男に害があることは明白である。しかし、出会いそのものの中に\\nは重要な意味がある。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陽爻の中に生じた最初の陰爻を意味する。従って、小人ではあるがまだ力\\n弱く、君子の働きを害することはできない。しかし、そのまま自由にさせておくと\\n次第に力を増し、悪事を働くようになる。このような小人はつなぎ止めておくのが\\n良い。小人は留まれば吉、進めば凶。君子は守りを固め警戒し、小人の入る隙を与\\nえなければ災いはない。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、九二が、九五に応ぜず（共に陽爻で応じない）下の初六に会うことを意味\\nする。九二はこの下位の陰爻を包み込み、更なる前進を阻んでいるので害はない。\\nしかし、この小人を他の陽爻に紹介してはならない。それは、小人の勢力を拡大さ\\nせることを意味し、災いを呼ぶ結果となるからである。"},"2":{"name":"九三","text":"九三は、下から３番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、不安な地位に付いている九三（下卦の最上位で不中不正）が、動きの取れ\\nない状態を意味する。上卦の上九とは応ぜず、初六とも九二が邪魔で会うことがで\\nきない。状態は不安定であるが、陰爻に会うことができないので、これに傷つけら\\nれることもない。従って、心配事はあるものの凶には至らない。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、本来初六（陰、小人）に応ずべき九四がこれから遠ざかり、身の安全を確\\n保している様子を意味する。初六には既に九二が応じており、九四は小人による災\\nいを受けることが無いが、治めるべき物から自ら身を引いた形であり、君子として\\nは包容性に欠ける。従って、留まればこの欠点を表面に出さずに済むが、動けば凶。"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、剛健中正の位で、現れたばかりの小人の力などを恐れない、包容性のある\\n君子を意味する。小人は媚びて取り入り、崩壊を招こうとする。小人の生ずるのは、\\n天の摂理である。しかし、九五はこの小人の勢力が拡大するのを防ごうとする。天\\nの摂理を曲げてまでも、正道を通そうとする君子の姿である。自らの徳を隠し、忍\\n耐の中で力を発揮すれば、大きな変化が起こり、福がもたらされる。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、天風爻の卦にあって、出会いを拒む無位の者を意味する。初六は遠く、九\\n二は応じない。自ら孤立を望むかたくなな態度であり、君子としての大きさは感じ\\nられない。しかし、この様な者でも悪に影響されないので凶運を招くことはなく、\\n自重すれば無事な道を歩む事が出来る。"}}},"6":{"number":6,"name":"天水訟","reading":"ｼｮｳ","overall":"訴訟。正しい道理が退けられ、止むを得ず争いを起こす。しかし、一人で起こす\\nのは、冒険過ぎる。公正な実力者に判断を委ねるのが良い。寛容の気持ちが重要。\\n一人で実力を発揮できる職業は吉。\\n天水訟は、下から”陰陽陰　陽陽陽”。これは、訴訟、論争を意味する。上卦は\\n乾で質実剛健であり押さえつける性質を表し、下卦は坎で知恵、ずるさ、盗賊であ\\nり隙を探る性質を表すので、この両者の間で争いが起こりやすい。あるいは、内心\\n（内卦）ずるがしこく、外に対しては（外卦）強硬な人物を意味する。いずれにし\\nても、中庸を得ることが難しい。正しいはずの争いも、力で押し切ろうとすれば凶。\\n公正な大人に出会って、自らも中正を求めれば難を逃れることができる。冒険は凶。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力弱き者（陰爻）を意味する。従って、争いを長引かせるだけの体力精神\\n力を持たない。知性には優れたところがあるから、自らの非力を悟り早期に解決を\\n計る。早い決着を見ることが出来れば、この者の言葉は明白で、その正しさはつい\\nには周囲の者を納得させることが出来る。従って、吉。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、九二（下の位にいる者）が、九五（高位にいる者）を訴えることを意味す\\nる。九二は剛なる者であるが陰位におり位も低い。それに対して、九五は陽爻が陽\\n位におり、しかも位は最も貴い。当然九二は破れるが、小さな村に落ち延び、ひっ\\nそりと暮らすために災いが及ばない。"},"2":{"name":"六三","text":"六三は、下から３番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、従順なもの（陰爻）が、祖先に与えられた畑を守り分に応じた生活を送る\\nことを意味する。六三はその柔らかい性質のため、自ら訴訟を起こす事はなく淡々\\nと生活を送るものであり、危うい地位（下卦の最上段）にありながら正しさを持続\\nすれば吉を得る。また、賢者に従えば吉。過ぎた権限を求めたり、使用したり、自\\n分から行動を起こせば凶。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、剛健ではあるが中正ではないものが、従順の徳（陰位）により正しさを取\\nり戻す意味である。地位が弱く中庸の徳には恵まれないものであるから、訴訟には\\n勝てない。しかし、正道に帰れば、ついには吉を得る。"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは中正、理想の位で、訴訟を裁くのに最も公正な人物を意味する。この卦を得\\nたものは、この様な人物の元で正しい裁きを受けることが出来るので、道理があれ\\nば訴訟に勝つ事ができる。自らを省みて、その正しさを見いだすことが肝要である。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは上り詰めた剛なる者の極点であり、強引な訴訟を意味する。最高位の強者で\\nあるから訴訟には勝つことができ、戦利品を得ることもできるが、この戦利品は遅\\nからず失うことになる。訴訟で得たものは、このようなものである。"}}},"33":{"number":33,"name":"天山遯","reading":"ﾄﾝ","overall":"退避。正しくても受け入れられず、衰運である。大事を起こすことは不可である\\nが、小事において努力すべきとき。時期が来れば、飛躍できる。本業では見切りが\\n大切。余剰金の運用で一事しのぐべき。\\n天山遯は、下から”陰陰陽　陽陽陽”。これは、勢力の増しつつある小人と、隠\\n遁すべき君子との両者を意味する。６月の卦。君子ならば小人の増勢を避けて、世\\n間から離れ、君子としての道を貫けば良い。願いは叶う。しかし、小人を憎んで避\\nけるのではなく、その厳しい生活態度に小人が近付けないのである。もし、小人の\\n側に立って見るならば、正しい道を守らなくてはならない。そうすれば、勢力の拡\\n大を背景に好運が訪れる。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、天山遯の卦にあって逃げ遅れた者を意味する。小人の増勢する世にあって\\n逃げ遅れた者は危うい。特に派手なことをしては小人の目につき、難を招く。\\n従って自重し、次の時期が来るのを静かに待てば凶運を避け、無事に過ごすことが\\nできる。"},"1":{"name":"六二","text":"六二は、下から２番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正の徳を持つ従順なる者を意味する。六二は下卦の中央しかも柔位で、\\n九五の君子（陽位陽爻）に従順に仕える者であり、かつ隠遁の意志が固い。この者\\nの意志の固さは他に比較出来ないほどのものであり、内に秘めた徳の清さも格別で\\nある。自らを固く守り続ければ吉。"},"2":{"name":"九三","text":"九三は、下から３番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、下卦の最上位にあって下の二つの陰爻に引かれ、隠遁し遅れた者を意味す\\nる。断ち切るべきものを断ち切れず、病に犯され疲労する。危うい状態になる。周\\n囲に雇うものを、いつでも関係を断ち切ることの出来るものに限れば吉。身軽であ\\nるべき時である。大事を行う時期ではなく、自重すべきである。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、初六に引かれながらも決然と隠遁する、剛健なる君子を意味する。九四は\\n本来初六に応ずるべき者であるが、克己心強くこれを断ち切る。君子を占った場合\\nは、この様に堂々とした隠遁を表すが、小人を占った場合は運勢は吉とはならない。"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、健剛なるものが剛健中正の徳を持ち、六二に応じて悠々自適の生活を送る\\nことを意味する。六二との関係は、六二が中正で従順なるものであるから、災いに\\n結び付く事はない。しかし、九五は地位として世を離れたものではないから、正し\\nい意志が持続しなくては隠遁生活を全うすることはできない。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、天山遯の卦において最も高位、世間の位を越えたところに位置する。内卦\\nに応ずるものがなく、まさに隠遁生活を楽しむことができることを意味する。性質\\nは質実剛健であり、自ら選んだ道を存分に楽しむことができ、俗世間からの影響も\\nないので心を煩わされることもない。めでたい卦である。"}}},"12":{"number":12,"name":"天地否","reading":"ﾋ","overall":"上下の対話の不足。正論も、意思の疎通を欠く状態では、通すことができない。\\n夫婦の間も諍いが絶えず、積極的な解決策が必要。控えめな行動で身を守り身辺を\\n整える。\\n天地否は、下から”陰陰陰　陽陽陽”。これは、君子の道理が塞がり、小人の世\\nになることを意味する。上卦に天、下卦に地があり、陰陽が交わらず自然の生意が\\n消滅した状態である。従って人の道にあるまじき状態であり、君子が正道を固守し\\nようとも、小人の世には受け入れられない。君子は自らの能力を隠し目立った地位\\nに付かず、ひたすら正道を守り続け、ときの来るのを待つ以外にない。今は、小人\\nによる災いを避けることが重要である。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\n天地否の下卦はすべて陰爻（小人）であるが、初六はその始めでありまだ改心の余\\n地が残されている。つまり、小人が下卦に集まり類を頼みに計る中で、内心は君子\\nに通じる心を失っていない。正道に復帰すれば、君子を大切にして凶であった運勢\\nも吉に変わる。"},"1":{"name":"六二","text":"六二は、下から２番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、小人でありながら柔位中正の徳を持つものを意味する。悪人（小人）では\\nあっても、君子（九五）の徳を理解し中庸をわきまえ、君子の言葉を聞き入れ、従\\n順の意を表すものは好運である（九五に応じている）。君子を占った場合はこの易\\n断は誤りであり、本卦の意味するところとなるので、平然と受け止めるべきである。\\n小人が取り巻き理解しても、これに流されてはならない。"},"2":{"name":"六三","text":"六三は、下から３番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰爻ではあるが、陽位にあり不中不正。陰謀を計るものを意味する。体は\\n虚弱（陰爻）でありながら野心だけ強く（陽位）、君子に近い地位を利用して、競\\n争相手を傷つけようと企んでいる。しかし、実行に移れない自らの弱さ、不正を働\\nこうとする恥ずかしさに足かせをはめられている姿。凶には至らない。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、志しがありながら陰位にあるために十分な力を発揮できない者を意味する。\\nしかし、位は高く剛なるものであるから、他の力添えがあれば前に進むことが出来\\nる。運命がもたらす勝敗である。"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、君子の徳の有るものが正しい位にあって、天地否の塞がった運勢の流れを\\n変えることを意味する。大人であれば吉。しかし、流れは変わっても安心すること\\nはできない。いつも危険、滅亡、乱世を念頭において泰平を守らなくてはならない。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、”天地否”卦の極まるところを意味する。何事も極まれば次の流れが始ま\\nる。まして、上九は質実剛健なるものである。従って、上九が力を尽くせば天地否\\n卦の塞がった運勢は、遅からず覆される。いま塞がっている”否”の運勢は、最後\\nには次の流れに変わり吉をもたらすであろう。"}}},"43":{"number":43,"name":"沢天夬","reading":"ｶｲ","overall":"決断。陽が強く伸びて、陰を押し切る形。争い事に望んで立場は強いが可能な限\\nり誠意を尽くし、周囲の同意を得、安全を期すべき。逆襲に備え、自らを正し、悪\\nを退治すべき時である。\\n沢天夬は、下から”陽陽陽　陽陽陰”。これは、決断あるいは意を決して悪を打\\nつ事を意味する。３月の卦。勢いを増した君子が、意を決して小人を処分すること。\\nしかし、これには十分の準備が必要であり、周囲の人々に事の正当性を理解しても\\nらわなければならない。単独の、武力による攻勢は危険である。小人は僅かに残る\\nのみであるが、万全の備えをした後に行動に移るべきである。そうすれば、願いは\\n叶う。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽爻（意欲のある者）が、小人を打とうとするが力及ばず敗走することを\\n意味する。初九は剛健ではあるが最も位の低いものであり、打つべき陰爻（上六）\\nからも遠く離れている。力の弱い初九が、遠路進軍し、弱体と言えども最上位の上\\n六を打つことは難しい。しかしながら、沢天夬は小人を打つべき時であり打たなく\\nてはならないとき（負けてはいけないとき）である。勝算のない戦いはしてはなら\\nない。戦うならばしっかりした計画を持ち、勝算を胸中に出陣すべきである。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛健で中庸の徳を持つものが柔位にあって警戒を怠らず、無事に小人を打\\nつことを意味する。九二は剛健ではあっても、柔位にあるため力を頼みに強引な作\\n戦を展開するような事はない。柔軟に事態に対処することが出来、警戒を怠らない\\nので不意打ちに対しても備えが十分である。従って、願い事はかなう。"},"2":{"name":"九三","text":"九三は、下から３番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、ともすれば強硬一途に走りがちな九三（陽爻、剛位）が、一時的に小人に\\n接近するかの様に見せて、ついには一挙にこれを打つことを意味する。九三は形の\\nうえからは上６に応じており、接近するかのように見えるが、本性は正に剛健。従\\nって、この剛健を表面に出し過ぎなければ願いを叶えることができる。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、剛なるものが不中、不正（柔位）にあって前進しがたく、後に続くべきと\\nの警告を無視して凶運を招くことを意味する。九四は剛健なるものであり意欲もあ\\nるので、人の前に立ち小人を打とうとする。しかし、柔位にあるため思うように進\\nむことが出来ない。貴重な他人の警告も耳に入らず、凶運を招くことになる。（警\\n告に従えば、凶運を避けることが出来る。）"},"4":{"name":"九五","text":"九五は、下から５番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、才能のあるものが正しい地位にあり、断固とした態度で事を踏み行う姿を\\n意味する。下の者も喜んでこれに従うが、疑いを知らぬ者の行為は、それが正しく\\nても危険を伴う。自分の才能を過信してしまうからである。正しけれど危うし。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、”沢天夬”卦の結論のあり様を示している。つまり、危険な状況にあって\\n最後までそつなく振舞えたかが問題となる。吉凶いずれの結果もその人の振舞いに\\nより決まるもので、終わりまで良く振舞うことが出来れば、大いなる吉。"}}},"58":{"number":58,"name":"兌為沢","reading":"ﾀｸ","overall":"悦び。悦びが外に溢れ出る。外面が柔和で願い事が叶うが、道理の通った事でな\\nければ、媚びへつらいになる。客商売に吉。中庸を守れば、悦びが重なる。\\n兌為沢は、下から”陽陽陰　陽陽陰”。これは、言説し、喜び笑う様。相手の心\\nに入り込み、喜ばせること。形は、沢が総てをうるおし、悦ばれる状態を示す。上\\n下卦とも剛爻が中を得、その外に柔爻があるので、外面が柔和でひとに悦ばれ、願\\nいが叶う。ただし、正しい道を守る必要があり、ひとにこびる態度にならないよう\\nに注意が必要である。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽爻（剛毅なる者）が、媚びへつらいに陥ることなく人を喜ばす様子を表\\nす。みだりに出世を求めず最下位に甘んじて、私的な上下関係を持たない。公明正\\n大な正しい態度で人と和し喜ばすことができるので、進んでも疑われることはない。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中（下卦の中位）を得ておりであり、心中に強い誠を持つ者を表している。\\nこのような誠を持ち誠心誠意をもって人を喜ばせれば、心配もなくなり吉運を呼ぶ\\nことが出きる。剛爻陰位は不正であるが、力ある者が従順にことに当たる姿であり、\\n誠意があれば志しを遂げることができる。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、不中（下卦の一番上）であり、かつ不正（陰爻陽位）である。上六も陰爻\\nであり六三に応じていないため、初九や九二の機嫌をとろうとする。下卦の一番上\\nは不安定であり、不正、媚びへつらいをもって人を喜ばせようとする者である。凶\\n運である。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、不正なる者（六三）に一時的に心引かれながらもこれを断ち切り、強く前\\n進する者の喜びを表している。六三に一時的に引かれたのは、心の迷いであり軽い\\n病のようなものである。九四は剛爻であり、強くこれを断ち切ることができるので、\\n病も快復する。最後に福が訪れることを示している。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中正（上爻の中であり、剛爻剛位）でありながら、媚びへつらう小人（上\\n六）と接近する君子を表している。九五は剛毅で中正の徳を有し尊位に位置する君\\n子であるので、自信をもって小人を近づけるが、上六は巧みにこの君子を喜ばせ、\\n剛健なる気力をはぎ取ろうとする。九五のもつ自信がかえって危険を呼ぶ結果にな\\nるであろう。危うい。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、兌卦の主たる爻であり、兌卦の極点にあってひたすら人を喜ばす陰爻を表\\nしている。正、不正を問わずあらゆる手段で人を喜ばすが、十分な徳を有している\\nわけではないので、相手（九四、九五の陽爻）が従うかは疑問である。すべては相\\n手の出方次第であり、自力だけでは前進できないので吉凶の区別はつかない。"}}},"49":{"number":49,"name":"沢火革","reading":"ｶｸ","overall":"改革。今が改革すべき、その時である。改革者に徳があり、動機が正しい場合の\\nみ悔いは残らない。周囲の変化は激しいが、運勢は強い。\\n沢火革は、下から”陽陰陽　陽陽陰”。これは革命、改革、変革を意味する。革\\n命はすべて天地の動きに沿ったものでなければならない。激しい変革には多少なり\\nとも後悔がつきものであるが、本卦においては正しいねらいによる改革は、すべて\\n成功する。改革を行うものに徳があれば、後悔することもない。また、動物の皮が\\nなめされる様に、本質が変化せずに、外面が一新されることも示す。さらに、季節\\nが変わる様に、避けられない変化の時期をも表す。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、変革の時にあって、まだ準備が整わない状態を表す。この様なときは、黄\\n色い（高貴な色）牛の革で身を包むように、中庸と従順の徳で身を固め、進んでこ\\nとを成そうとしてはいけない。大事の前の準備の段階であるから、十分慎重に構え\\nて身を固く保たねばならない。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正（下卦の中、陰爻陰位）の徳を有する革命の主体を表す。下卦は”火”\\nつまり明あるいは文明の徳をも表し、革命の正当なる担い手を示すものである。\\nしかし、革命はあくまでも非常な手段であるから、現支配者の盛りを過ぎた時点で\\nことを起こすべきである。急がず時期を誤らなければ、前進して吉。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛なる者が、性急にことを進める姿を表す。九三は剛爻剛位。慎重になら\\nなければいけない変革の時にあって、あまりにも剛直すぎるものである。従って、\\n前進すれば凶。しかし時は既に下卦の末端で、変革すべき時期である。吉凶にかか\\nわらず、また危うきを知りつつも時は待たない。周囲の者に幾度も問い確信がもて\\nれば、その時は皆が信じて従ってくれるので、前進する以外に道はないのである。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛なる者が柔軟にことに対処し、革命に適任であることを表す。九四は剛\\n爻陰位。自身は剛毅でありながら従順の徳を有し、剛柔兼ね備えているので、革命\\nを担う者としては適任である。従って、その志しを皆が信じてくれて、また革命を\\n必要とする時期であれば、予想される後悔もなく、革命は成功するであろう。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、革卦の主たる爻で、鮮やかに面目一新する変革の成功を表す。九五は中正\\n（上卦の中で、剛爻剛位）の徳を有する大人である。変革の時にあってまず自らを\\n改革し、周囲の人々を改め、ついには天下を変革する。ためらいながら、あるいは\\nこそこそと行うのではなく、虎の文様が秋に鮮やかに変わるように一新するのであ\\nる。九五が、以前から人々に信じられていたならば革命は成功する。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変化する可能性を示す。\\nこれは、革命の後の人心の改革が、豹の毛が抜け変わるように鮮やかに行われるこ\\nとを表す。九五の虎ほどではないが、君子豹変のたとえのように、鮮やかな変化で\\nある。一般庶民は、なかなか心底からの変革はできないが、顔つきだけ変えて、お\\nとなしく新しい君子に従う。それ以上のものを一般庶民に求めてはいけない。さら\\nに要求を強くすれば凶。革命の後は、ことを構えず、静かにしているのが一番良い。"}}},"17":{"number":17,"name":"沢雷随","reading":"ｽﾞｲ","overall":"他に従う。虚心に他に従えば、願いは叶う。ただし、正しい事でなければ、その\\n後咎を受ける。時代の変化、転居等、流れに従い次のチャンスを狙う。\\n沢雷随は、下から”陽陰陰　陽陽陰”。これは、己を捨てて人に従い、さらに人\\nを従わせること。お互いに従い、願いは叶う。ただし、願うことが正しい場合に限\\nる。もし、邪心のある願い事をした場合は、願いは叶うが、後でその報いを受ける\\nことになる。昼は働き、夜は休息を取る。賢人に耳を傾け、上司に忠誠を行う。\\nこの様に、時に従い、人に従えば前途は開ける。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、下卦の主たる爻で、動いて人に従うことを表す。これまで固持し続けてき\\nた主義思想を変えることも意味する。家族の言葉だけに従うのではなく、自分の城\\nから出て積極的に広く人と交われば吉運を呼ぶことができる。従って、官職、職掌\\nの変動があるが、正しい道を踏み外さなければ吉。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、本来の相手である九五が遠いため、すぐ近くの初九に従い、道を見失うこ\\nとを表す。六二（下卦の中出あり、陰爻）は本来上卦の九五（上卦の中であり、陽\\n爻）に応ずべきものである。しかし、九五が遠いため、すぐ下の初九に従いやすい。\\n両者を得ることはできないので、目先の小利に釣られて本来の自分の進むべき方向\\nを失うことになる。凶運に陥らないように注意すべきである。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、応ずべき相手のない六三が、権力の強い九四に従い利益を得ることを表す。\\n下卦の上端に位置する六三は、上に応ずべき相手がなく（上六は六三と同じ陰爻で、\\n応じない）しかたなく九四に応ずる。初九も陽爻であるが遠く、九四は重臣で力が\\nある。したがって、六三は九四に従うことで利益を得るが、不正な動機を持っては\\nいけない。実力者に会うことは吉。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、君子と同等の実力を持つ者が、分をわきまえて君子に従い、疑われながら\\nも忠誠を尽くす姿を表す。九四は剛爻で、君子のすぐ下に位置する者である。実力\\nは既に君子をしのいでいる可能性がある。この様な者が、おとなしく君子に従えば\\n得るところは大きい。しかし、実力のある者はとかく疑われやすい。よほど公正な\\n態度を堅持しなければ、疑いは解くことができなくなるであろう。しかし、もし誠\\n意を持ち続け忠誠を尽くすならば、いつか疑いも晴れ認められる。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中正（上卦の中であり、陽爻陽位）の徳を持つ九五が、良き友（六二）を\\n得て好運を得ることを表す。九五は君位であり、同じく中正（下卦の中であり、陰\\n爻陰位）の徳を持つ六二と応じている。中正なる者同志が応ずるのであるから、吉\\n運であることは明かである。良き友と結束すべきである。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、随卦の極まりに於いて、大なるものに離れがたく結びつき、ひたすら従う\\nことを表す。神、山、川等を祭る際、このように固い真心を持ってすれば吉である。\\n神にも通じる誠意であり、人にはもちろん感銘を与える。"}}},"28":{"number":28,"name":"沢風大過","reading":"ﾀｲｶ","overall":"大いに過ぎる。つまり、背負った責任が重すぎること。あるいは、持ちかけられ\\nる多くの仕事をつい背負ってしまい過労になりやすい人を表している。本人が望む\\n望まないに関係なく、因縁により過ぎた重荷を背負うことになる。恋人、結婚運も\\nこの様である。\\n沢風大過は、下から”陰陽陽　陽陽陰”。これは、大いに度を過ぎること。人を\\n養うには、手厚く度が過ぎても良い。しかし、中央はしっかりしているが、両端は\\n虚弱である。陽が多すぎて、両端の陰が弱点となるからである。常人ならば分不相\\n応であるが、有徳の君子であれば願いは叶う。大過は、人の人生で通らなければな\\nらない濃縮された偉大な時間である。君子の子がまだ幼く、国がまだ完全には治め\\nられていない状態で、過度に働かねばならない時である。下から２番目、５番目の\\n陽は内外卦の中を得ており、内卦の”陰陽陽”は従う徳を、外卦の”陽陽陰”は喜\\nぶ徳をそれぞれ示している。","yaos":{"0":{"name":"初６","text":"初６は、一番下の”陰”が”老陰”で、”陽”に変化する可能性を示す。\\nこれは、従順の徳を持つ下卦の最下位の爻であり、極端に慎み深い様子を示してい\\nる。これは、神を祭る際に御供えの下に綺麗な敷物を敷くようなものである。本卦\\nは大過であるが、徹底した慎みと慎重さがあるので、災いを避けることが出来る。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、枯れかけた古い根の脇から、若い新しい芽がのびることを意味する。九二\\nは上卦に応ずるものがなく（九五も陽であるから）下の初６に近付こうとする。歳\\n老いた男が若い嫁と結ばれ、もう一度力を盛り返す意味である。分を過ぎた協力者\\nを得ることができるので、独走せずに力を合わせれば吉。"},"2":{"name":"九三","text":"九三は、下から３番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、屋根の中心が重みに耐えかねて折れ、家が倒れることを意味する。九三は、\\n剛位剛爻で、強すぎる。他人の言葉を素直に聞かない。九三に応ずる上六も、助け\\nることができない。この卦は、自信過度で滅びる。凶。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛爻柔位でバランスのとれた九四が、立派に重任に耐えることを表す。\\n大過は剛に過ぎるときであるが、九四は剛爻柔位（自分は剛毅でありながら、柔軟\\nな態度をとることができる）で、高くそびえる棟木のように下にたわむことがない。\\n従って吉。しかし、下の初六と応じてしまうと柔にすぎて、恥ずべき結果になる。\\n安易に他人の誘いに乗ってはいけない。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、盛りを過ぎた九五（剛爻剛位）が、さらに年寄りの上六に近付き、一時的\\nに結びつくことを表す。九五は、剛爻の極点に位置するので、剛に過ぎる。下卦に\\n応がないので（九二も剛爻）しかたなく上六に近付くが、一刻のあだ花であり、子\\nのできない恥ずべき結合である。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、身のほどを知らぬ陰爻が、大きな使命に飛び込み身を滅ぼすことを表す。\\n分をわきまえぬ行動であるが、わが身を捨てて義を行うものであり、とがめること\\nはできない。志しある者は理想に殉じ、小人は暴走して災いを招く。凶運ではある。"}}},"47":{"number":47,"name":"沢水困","reading":"ｺﾝ","overall":"困窮。苦しい中に自分の理想とする道を貫き通す事が出来れば悦びがある。しか\\nし、小人にはできないことであり、凶運あるのみ。弁説も信ぜられないので、知恵\\nを隠し、寡黙が吉。\\n沢水困は、下から”陰陽陰　陽陽陰”。これは、”陽”（君子）が”陰”（小人）\\nに囲まれて、困窮する様。しかし、下卦が険を示しているにもかかわらず、上卦は\\n兌（喜び）を表しており、わが身は困窮の中にあって、道を貫き理想を通す君子の\\n有り様を暗示している。この様であれば吉。しかし、君子たらざればただひたすら\\n困窮し、苦しいのみ。従って凶。困窮した者の言葉は、誰も信じない。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、困卦の一番下、どん底の暗がりを意味する。初六は陰爻、小人の身で困窮\\nの奥底におりじっとしていられない。固い木の切り株に腰掛けているようなもの。\\nすぐにしりが痛んで立ち上がり、うろうろと歩き回る。あたりは幽谷で薄暗く、こ\\nこから出る事は容易ではない。三年間は日の目を見ないであろう。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、望まないほどの有り余るもの（飲食）で苦しむ様を表す。九二は”陰”に\\n囲まれる卦にあって九五と陽爻同志てを結ぶ。（小畜と困卦のみ）そこで、望まな\\nいまま高い身分を押し付けられ多くを飲み食いすることになる。剛の徳はあるが、\\n過ぎたる苦しみの時であり、前進すべきではない。進めば凶。道義的には不正はな\\nいので静かにしている方がよい。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、不中不正（陰爻陽位）の六三が、前には九四の大石が立ちふさがり、下に\\nは剛中の九二がおり、妻は上六で応ぜず、安んずるところを得ないことを表す。不\\n中不正のため身の置きどころがなく苦しむ。家の中に妻は見えない。凶。死期まさ\\nに至らんとす。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、初六を助けるべき九四が、不中不正であるために力弱く、ためらいがある\\n事を表す。九四は下の初六と応ずべき者である。しかし、不中不正であることと、\\n金属製の車（九二）の邪魔により素早く助けに向かう事はできない。おそるおそる\\n進むので恥をかく。しかし、正当に応じている者であるので、最後には仲間（初六）\\nに会う事ができ吉運をつかむ。"},"4":{"name":"九五","text":"九五は九二と共に誠意を尽くす者であり神に喜ばれ、神を祭るのには良い卦である。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、困卦の極限にある陰爻が、動くに動けない状態にあり、進めば凶運を呼ぶ\\nが、同時に困卦の外に出てしまう事を表す。すなわち、上六は自分が柔弱の身であ\\nりながら高みにいることを改めるならば、前進して吉。"}}},"31":{"number":31,"name":"沢山咸","reading":"ｶﾝ","overall":"感受性の大切なとき。理屈より気持ちの大切なとき。直感が働き、反対に考えす\\nぎると失敗する。男なら思いやりの深い親分肌。女なら夢のある良く気の付く人。\\n結婚等、まとめるべき話はできるだけ早くまとめるようにする。\\n沢山咸は、下から”陰陰陽　陽陽陰”。これは、感応、夫婦の道を示す。男（山）\\nが女性（沢）に対しへりくだり、正しい徳を示す。山は動かず、沢はこの真心を悦\\nぶ。願い事は叶う。ただし、願うことが正しい場合に限る。もし、邪心のある願い\\n事をした場合は、願いは叶わず、総てが凶運となる。陰陽のバランスが良く、互い\\nに感応しあっている。山は空虚で先入観がなく、広く他人を受け入れる。天地が交\\n感して万物を生じ、聖人が民心を感ぜしめて平和をもたらす。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、体で言えば足の親指に当たる。初六は九四に応じており、その方向に進も\\nうとするが足の親指だけでは力なく動く事はできない。実際の行動に結び付かない\\nので、吉凶は決めがたい。しかし、”沢山咸”全体を通じて、余り動かずじっと静\\nかに感応しているのが良い。あくまで、自然で無心が望ましい。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、体で言えばこむらはぎに当たる。こむらはぎは、人が動くときに初めに動\\nくが陰柔の爻であり自主性があるわけではない。妄動の危険がある。しかし、六二\\nは中正（下卦の中であり、陰爻陰位）その位置は正しく、安全である。即ち進んで\\n動けば凶。道に従えば危険はない。"},"2":{"name":"九三","text":"九三は下卦の頂点にあり陽爻であるから、これらと共に動くのは恥ずかしい事であ\\nる。いつも他人の後を自立心なく進むことは恥をまねく。志しが低い。独立心を養\\nうべきである。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、体で言えば心臓に当たる。心は体の中で最も感じ易く、本爻はカン卦の主\\n体である。心はとらえどころなく外界に感ずるが、その姿勢が正しくなければなら\\nない。淫心や媚びをもった不正な感応は凶運を招くものである。九四はその位置が\\n既に不正（陽爻陰位）であり正しさを持続する事が難しく、努力を要す。私欲に走\\nれば身内を感じさせる事はできても広い普遍性は望めない。私心のない、万物感通\\nの境地を目指すべきである。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、体で言えば背中の肉に当たる。感応の卦にあって、背中だけは他方を向い\\nており最も反応がなく感動もない。広い世間にあまり関心のない、孤立孤高、独立\\n無援の人間である。他から影響を受けないので安全であり、この様な態度を保つの\\nがよいが、反面、他人を感化をする事ができないので、志しとしては末梢的である。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、体で言えば口に当たる。しゃべりたくて上顎、頬、舌、等が感じ、じっと\\nしていられなくなる。人を喜ばせるのに、真心を大切にせず、言葉を巧みに用いよ\\nうとする者である。これは、婦女子のすることであり、男のなすべきことではない。\\n凶。"}}},"45":{"number":45,"name":"沢地萃","reading":"ｽｲ","overall":"集まる。大勢の人々が、喜んで集まる。民衆を治める立場に立つ良い時期である。\\n精神を集中して祖先の霊と一体になれる。動機が正しければ、大きな犠牲を払う事\\nにも前進して良い。\\n沢地萃は、下から”陰陰陰　陽陽陰”。これは、全てのものが集まることを意味\\nする。地上に沢があり、ここに水が集まる。上卦が喜ぶ意味であり、下卦が従う意\\n味であるので、喜び従って集まる意味となる。王は宗廟の中にあって、祖先の霊を\\n集める事が出きる。多くの者があつまった場合、それをうまく治めて行くには徳の\\n高い人物に会う事が望ましい。また、祖先の霊を集めて祭る場合、供え物の犠牲は\\n大きくて良い。このように、大きな犠牲を伴い祖先の霊を集める事が出きれば、当\\n然ことを起こすのにふさわしい。吉。\\nただし、多くが集まれば思わぬ災いも起こり易くなる。正しい道を持続し、不慮\\nの出来事への準備も怠るべきではない。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、集まる事を妨げられる者を意味する。初六は本来九四に応ずべき爻である。\\nしかし、二爻の間にあるふたつの陰爻がこれを妨げている。しかし、初六はこれに\\n惑わされてこれらの陰爻と集まるべきではない。泣き叫べば、九四がこれに気付い\\nて必ずや助けに来るであろう。正しい応に向かって進むべきである。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、小人の群れにはまりこんだ六二を、正しい応である九二が引き上げる事を\\n意味する。六二は正しく九五に応じているが、距離が遠くしかも陰爻の真ん中には\\nまりこんでいるので、自分から動く事ができない。しかし、六二（下卦の中、陰爻\\n陰位）も、九五（上卦の中、陽爻陽位）も中正であり、六二は虚心に九五に応じて\\nいる。人が虚心に神を祭り、神がこれに答えるようである。吉。わずかな供物でも、\\n神を祭って良い。\\nただし、陰爻の中にはまりこんでいるので、将来この色に染まる危険は暗示される。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、集まりたくても集まるべき相手のない者を表す。六三は不中不正（下卦の\\n中をはずれ、陰爻陽位）であり、応ずべき相手がいない。下の六二は九五に応じて\\nおり、上の九四は初六に応じている。また、応ずべき位に位置する上六は陰爻で、\\n応じない。ため息をつくばかりである。そこで、応じないとは言っても、喜ぶ卦\\n（兌）の主爻である上六に近付けば、受け入れられる。身近で不正な援助者（九四）\\nに惑わされる事なく、遠くても本来の相手である貧窮の友人に接近するべきである。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、不正なる者が、運の良い結果に恵まれ、凶から救われる事を示す。九四は\\n不中不正（上卦の中でなく、陽爻陰位）の身でありながら、上には九五の君子、下\\nには陰爻の民衆に親しく接している。この様であれば、自身は不正であろうとも良\\nい結果に恵まれ、救われる。つまり、良い結果の場合にのみ救われ、普通の結果で\\nは凶から逃れる事はできない。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中正の徳を持つ君子が、多くの民を集める事を表す。九五は萃の卦にあっ\\nて中正（上卦の中であり、陽爻陽位）の徳をもつ君子である。吉運は言うまでもな\\nい。もし、まだ信じない者があれば、自身の徳をさらに修める事により将来にわた\\nり遠方に及んで人心を得る事ができる。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、孤立無援の上六が、孤立を嘆く様を表す。上六は、萃（集まる）の卦にあ\\nって応ずる者がない。自身は柔弱（陰）で、位のない在野の者である。付いてくる\\n者もなく悲しみに暮れているが、この様に今の状態を反省すれば凶運は去る。この\\nままでは凶。"}}},"14":{"number":14,"name":"火天大有","reading":"ﾀｲﾕｳ","overall":"王者、天下を所有。太陽が万物を照らす形。願い事をする者に徳があれば、結果\\nは大善、大いに叶う。その様子は四季の移り変わりに整然と応ずる。積極的に行動\\nし、現在の盛運を維持するように努力する。\\n火天大有は、下から”陽陽陽　陽陰陽”。これは、天高く燃える太陽が、万物を\\n照らす姿を表している。ただ一つの陰爻が君位にあり、他の五つの陽爻がこれに従\\nっている。また、ただ一つの陰爻が尊位にあって、天に応じている。王者が謙虚に\\n賢人を養い、その徳を持って万民を支配する卦である。天は剛健を示し、火は文明\\nを示しているので文武備わった徳を有する。願い事大いに叶う。\\n結果は大善にして吉。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、大有の時にあってまだ大に至らない初めの段階を表している。初九は、能\\n力がありながら（剛爻）ことの初めにあって最下位に甘んじ、上位者との応もない。\\n従って、大有によって驕慢に陥ることはなく、災いを逃れる事ができる。しかし、\\n驕慢の心はいつでも起こりやすいものであるので、絶えず注意すべきである。"},"1":{"name":"九二","text":"九二は剛健なる者（陽爻）で、下卦の中を得ているので任された任務に良く耐える。\\nこの卦が出た場合、自分が大任に耐えるかどうか熟慮し、その後前進すれば心配は\\nない。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中堅の剛毅なる者が、上位者の要望に答えて力を発揮する事を表す。九三\\nは、剛爻（陽爻）で正（陽爻陽位）であり、下卦の最上位に位置する。側近とまで\\nはいかないが、中堅の実力者である。この九三が、君子（六五）の要望に答える。\\n剛と正の徳があれば、自分の能力を十分に発揮でき吉。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛なる側近が、富裕を極めようとせず、自ら自重して賢明なる道を歩む姿\\nを表す。九四は剛爻にして従順なる六五の君子に近接している。勢い盛んになるの\\nは自然であるが、剛爻柔位でバランスがとれている。自らを抑制する事ができ、災\\nいを避ける事ができる。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸の徳を持つ君子が、賢者にへりくだり真心を持って信頼を得る事を表\\nす。六五は従順で中庸の徳を持ち、下卦の九二に応じている。賢者にへりくだる君\\n子の態度に周囲が感動し、君臣信じ合う。しかし、従順なだけでは君子として不十\\n分であり、柔軟な中にも威厳が必要である。威厳あれば吉。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、大有の時にあって謙遜を忘れず、大いなる吉をつかむ者を表す。上九は、\\n大有の卦にあって最上位に位置している。しかも剛なる者であり、あまりに強く満\\nたされ過ぎているようであるが、上九は六五の君子を貴び、自制して謙遜の態度を\\n忘れない。従って、天道に叶う者であり、天の助けを得る事ができる。"}}},"38":{"number":38,"name":"火沢目癸","reading":"ｹｲ","overall":"反目。家の中、あるいは職場で人々が目をそむけ乖離し合う。しかし、その中に\\nも、隠れた繋がりがあり小事には吉。内乱、内紛がある。表面に出ない心の繋がり\\nを大切に。\\n火沢ケイは、下から”陽陽陰　陽陰陽”。これは、火と沢が性格相背くことを示\\nす。火は中女、沢は少女。二人の女性が同居し反目する様子。しかし、上卦は明知、\\n下卦は喜ぶの徳があり、小事においては願い事が叶う。この卦は、表面的には異な\\nるものの背く様子を表しているが、陰陽あるいは天地はまた一方で相求め合う者で\\nある。そこで、賢者は異なるものの中に共通点を見いだし、一見凶なる時をうまく\\n活用する。","yaos":{"0":{"name":"初九","text":"初九は他の場合ならば同じ陽爻である九四とは応ずる事ができないが、周囲が全て\\n反目するときにあってかえって応ずることができる。そこで、初めて初九は九四の\\n助けにより上に登って行く事が出きる。焦る必要はなく、自然にそうなるのである。\\nしかし、全体が反目するときであるから、交際に細心の注意を必要とする。いつも\\nは会いたくない悪人にも、一応会って相手をして置く方がよい。"},"1":{"name":"九二","text":"九二は陽爻で六五と応ずる関係にあるが、ケイの時にあってなかなか会う事ができ\\nない。町中捜しまわって路地で君子たる人を捜し当てる事ができる。運命により決\\nめられた人物を捜すのであるから、天の道に沿った事である。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、妨害に会い、誤解により刑罰を受けた六三が、ついには上九に会う事が出\\n来る事を表す。六三は陽爻に挟まれた弱い存在である。後ろから引き戻され、前は\\n九四に阻まれ、応ずべき上九になかなか会う事が出来ない。上九は、六三の遅れを\\n怪しみ、刑罰に処する。ひどい目に会うが、ついには誤解も解け六三は上九に会う\\n事が出来、吉運を招く事が出来る。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、普段は応じない関係の者同志が、同じ剛の徳により信じ合って協力する事\\nを表す。九四は剛爻で、同じ剛爻の初九には応じない関係であるが、皆が反目する\\nケイの時にあって、陽剛同志で信じ合う事が出来る。危険ではあるが、協力関係を\\n結ぶ事が出来、背き合う世の中を救うべく行動を起こす事が出来る。危険を自覚す\\nる必要がある。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、始め力不足の君子が、忠実なる応援を得て進む事を表す。六五は陰爻で力\\n弱い存在であるが九二と応じており、当初邪魔をした六三は、簡単に除く事が出来\\nる。従って、無事に忠実なる部下の応援を得る事が出来、心配はなくなる。"},"5":{"name":"上九","text":"上九は、ケイ卦の極点にある陽爻であり、反目によって孤立する。自分に会いたい\\nと思っている六三も、九二や九四の妨害により遅れる事から、強い猜疑心で見るよ\\nうになる。しかし、徐々にその疑いも解け、九二の本心を知るようになって、和合\\nする事が出来る。疑いを捨てて、和合すれば吉。"}}},"30":{"number":30,"name":"離為火","reading":"ｶ","overall":"付着。火はそれ自体空虚であるが、物に付着し周囲を明るくする。親しむ友人、\\n仕事、主義の選択を正しくする事が重要である。二つの太陽に象徴されるあなたと、\\nもう一方の人を大切に。\\n離為火は、下から”陽陰陽　陽陰陽”。これは、他の物に付着して存在する火の\\n様に、自分の存在する場所や立場によってその能力が発揮される事を表す。また、\\nこの様に他に付着して意味を成すわけであるから、自分自身は従順であることが望\\nましい。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、聡明なる者が最下位にあるために焦り、妄動前進しようとしている様子を\\n表す。初九は明の一部であり、明知の徳を有する。しかし、今最下位にあるために\\n焦りがある。まだ始まったばかりで急に前進する事は難しい時期であるのに、急い\\nで進もうとしている。この様な焦りを捨て、自重すれば凶運に陥る事はない。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正である上に、内に秘めた徳が最高のものである事を表す。六二は、\\n中正（下卦の中であり、陰爻陰為）で中の色（黄色あるいは土の色）を有する。\\nこれは、中に秘めた徳が気高い事を暗示している。まことにめでたい卦である。吉。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、人生の終わりを泰然として酒宴の中に楽しむ者を表す。九三は下卦の末端、\\n二つの太陽の間に位置する。つまり、一つの太陽が暮れかけており、まだ次の太陽\\nが登る前。生ある者は必ず没することを達観し、残光の時を楽しむべきである。嘆\\nいていては凶。酒宴にのぞむ境地が吉。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、君位の継承の時にあって、力で位を奪わんとする者を表す。九四は前の太\\n陽が没し、まだ次の太陽が登らない時。君位に迫る陽爻の九四は、突然対立し、君\\n位を奪おうとする姦臣である。その結果、人に憎まれ身の置きどころはなく、焼き、\\n殺され、捨てられる。凶。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、従弱なる君子が、強力な臣に位を狙われ、ため息を付く様を表す。六五は、\\n上卦の中であるが、陰爻陽位で不正なため、上下の陽爻に迫られ、位を狙われる。\\n日夜憂慮するが、この危険を自覚したことにより、凶運を遠ざける事が出来る。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、王が悪の成敗に出かけ、国を正す事を表す。上九は、聡明な徳が国中に及\\nぶ剛毅なる者（陽爻）である。従って、この徳により悪を滅ぼすべく、征伐に出か\\nける。みだりに罰するのではなく、正邪の区別を明確にして、しかるべき悪のみを\\n征伐すれば吉。"}}},"21":{"number":21,"name":"火雷噬ﾛ蓋","reading":"ｾﾞｲｺｳ","overall":"かみ砕く。上顎と下顎が噛み合わさる。邪魔物を切り捨て、事を成就する。徳の\\nある者が悪人を裁くのに良い。一時的な争いに妥協点を見いだし、和解への努力を。\\n火雷噬コウは、下から”陽陰陰　陽陰陽”。これは、上顎と下顎を噛み合わせる\\n事を表す。邪魔者（九三の陽爻）があるが、これを噛み砕き願いを通す事が出来る。\\n雷（下卦）の様な威嚇と火（上卦）の様な明知を備えているので、刑罰を行うのに\\n適している。ただし、この卦を得た者が、相応の徳を有する場合にのみ吉である。","yaos":{"0":{"name":"初九","text":"初九は刑を受ける者であるが、ことの始めであるのでその罪は軽い。足枷によりそ\\nれ以上の進展がくい止められる。小さな罰で大きく戒められることは凶運ではない。\\n傷ついたとしても、足首くらいである。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正の徳を有する者が、強情なる罪人を厳しく罰する事を表す。六二は中\\n正（下卦の中で陰爻陰位）の徳を有するので、人を裁くのにふさわしい人物である。\\n裁かれる立場の初九は裁くのに容易であるが、剛爻であり強情であるから厳しく裁\\nかねばならない。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、ふさわしくない人物が裁きを行い、意外な抵抗に会う事を表す。六三は陰\\n爻で柔弱、しかも陰爻陽位で不正。裁きを行っても相手は屈服しない。意外な抵抗\\nにあって恥をかく。しかし、今は刑罰の時であるから、全体としての落ち度はなく、\\n凶運に陥る事はない。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、強い抵抗の中にあっても正しい裁きを遂行し得る剛なる者を表す。九四は\\n刑罰の時にあって卦の半ばを過ぎ、重い罪を裁く事を暗示している。邪魔者も強く\\n困難があるが、本卦の中にあって最強の九四は、この任を全うできる。ただし、自\\n身の強さを過信する事なく、ことの困難さを良くわきまえ、正道を守り続ける事が\\n必要である。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、君子が剛なる臣を用いて、正しい裁きを行う事を表す。六五は上卦の中で\\nあり、君位に位置する。君子の裁きであるから、人は容易に屈服する。しかも、こ\\nの裁きに於いて君子は金を見いだす事が出来る。剛なる家臣の九四を用い、正道を\\n守り続ける事が必要である。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、重い罪に問われ、重刑に処せられる事を表す。凶。人の言う事に耳を貸さ\\nなかった事が、この罪につながっている。"}}},"50":{"number":50,"name":"火風鼎","reading":"ﾃｲ","overall":"賢者を養う器。徳のある人は、王者に養われ願いが叶う。内心の従順な賢者を示\\nし、王者からの信頼は端然として、揺るぎないものである。三人で行う仕事、相談\\n者のいる恋人同士は吉。\\n火風鼎は、下から”陰陽陽　陽陰陽”。これは、革命の後、王者が法律を作り、\\n賢者を養う事を表す。鼎とは王者の権威を表し、なま物や固い物を柔らかく煮るた\\nめの器であり、ここに法律を刻む事もある。王者が新しい時代に臨み、まず作るべ\\nき物である。\\n神を祭り、悪霊を鎮める物であり、願いは叶う。吉。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、始めの失策が、後の成功につながる事を表す。初六は、上の九四に応じて\\nいる。鼎の足が上に向かい器は転倒するが、初六は事の始めであり鼎の中にはまだ\\n食物は入っていない。底に旧悪が残っていたが、これが吐き出される。これはまた、\\n妾（卑しい者）を囲って、ここから後継者（貴い者）が得られる事を暗示している。\\nことの始めであり、位は低いが、後に出世する事が出来る。"},"1":{"name":"九二","text":"九二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、実力のある者が病を持った悪なる者の誘いを振り切り、正しい道を進む事\\nを表す。九二は下卦の中であり、陽爻であるので中身（実力）がある。また六五の\\n君位にも応じており、本来的に優れた存在である。しかし、初六の陰爻がこれを誘\\n惑しようとしている。初六は悪い病を持っているので、これの誘いに乗ってはいけ\\nない。正しく自らの進むべき方向を守りきる事が出来れば吉。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛に過ぎる者が君子から遠ざけられるが、後に相い和し、吉を得る事を表\\nす。九三は、剛爻陽位で剛に過ぎる者である。下卦の中を過ぎ、上卦との境にあっ\\nて変革の時に君子である六五に認められず道が塞がる。しかし、九三は正を得てい\\nるので、道を正しく進み続ければ、最後には恵みの雨が訪れるように吉を得る。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、力弱き者に仕事を委任し、失敗する事。信義が果たせない事を表す。九四\\nは初六に応じている。初六は柔弱の陰爻出あるので任に耐えず鼎を倒すように失敗\\nする。徳薄くして位尊く、知小にして謀り事大に、力なくして任重し。凶。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、本来空虚なる者が剛なる者の助けにより黄金を得る事を表す。六五は元々\\n陰柔であり、己を虚しくして九二に応ずる。剛爻の九二と一体となる事は、鼎の耳\\nに金の輪を通す事のようである。六五は空虚であるが、中に高貴な徳を有している。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛なる中に温かみを有する者が、玉のごとく吉運を得る事を表す。上九は、\\n鼎の吊り輪にあたり、陽爻陰位で調和が取れている。剛なる者の中に温かみがある\\nのは玉である。従って、剛毅の中に温かみがあれば吉。"}}},"64":{"number":64,"name":"火水未済","reading":"ﾋﾞｾｲ","overall":"未完成。小人の世界、衰運の世。しかし、今後の発展が期待できる。今直ちには、\\n事を起こしても成就せず、得る所はない。実力不足ではあるが、地道な努力により\\n希望が得られる。\\n火水未済は、下から”陰陽陰　陽陰陽”。これは、陰陽がそれぞれ応じており、\\nまた数の上からもバランスが取れているが、配置が全て正当なところの逆になって\\nいる。従って、立場を得ていない、不十分な準備、力不足、次期尚早、等の意味に\\nなる。焦らずに、自分の立場が得られる様に、こつこつと準備をし努力をしないと\\nいけない次期である。小狐が、川を渡ろうとして渡りきれない。最後に尾を濡らす\\nようなものである。つまり、もう少しで出来ると思われても、実は実力不足なのだ\\nから、一気に事を成し遂げようとせずに、一旦、我慢が必要である。完成された物\\n事は、それから後いつか崩壊が有るのみであるが、、未済は、これからの可能性を\\n秘めた卦として、めでたいのである。本来の配列では、未済の卦は、６４卦の最後\\nに位置する。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\n最も力の弱い最下位の陰爻である。丁度、小狐の尾に当たり、最後に濡れてしまう。\\n川を渡る事はできない。自分の力不足を知らぬまま盲進すれば、当然恥をかくこと\\nがあるだろうが、身の招いた災いである。"},"1":{"name":"九二","text":"九二は、下から２番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\n六五の君子は、陰爻で力が弱く、ひたすら自分に応じている九二の陽爻に頼ろうと\\nするが、この様な状況にあっても、君主を乗り越えるようなまねはしてはいけない。\\n未済の時には、自制心を働かせ、自分を引き留める努力が必要である。九二は、陽\\n爻陰位で不正であるが、下卦の中を得ているので、中庸の徳を持っており、吉。"},"2":{"name":"六三","text":"六三は、下から３番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\n下卦の一番上にある六三は、未だに川を渡っていない。下卦の水（険難）を脱して\\n進む事が、十分に可能であるはずだが、陰爻の弱さから動こうとしない。積極的に\\n動けば凶だが、その慎重さを旨く活用すれば、大きな仕事も成し遂げられる可能性\\nがある。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”陰陽”で、”陰”に変わる可能性を示す。\\nこれは、陽爻が不正・不中の位置にあって、本来凶運を暗示させるが、陽剛の気を\\n奮い立たせて努力すれば、３年後には吉をもたらす事を表す。本来が不正な身であ\\nるので、非常な努力を要するが、勇気を出して蛮族を打てば吉。"},"4":{"name":"六五","text":"六五は、下から５番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、一見不正の位置にある君だが、上卦の中にあり、しかも離（明るさ、文明\\nの輝き）の主である。陰の虚心さで九二の臣と正しく応じている。この様に、心を\\n空虚にして、臣の協力が得られれば、君子としての光輝を示す事もできる。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、未済の時が終わり、安定した既済の時が来ようとしている次期である。\\nしかし、上九は、既に君の位を離れた人間であるので、現実に対応して既済を招く\\n立場にはない。酒を飲み、平然と天の動きに従うのである。しかし、酒を飲み過ぎ\\nて、節度を失ってはいけない。"}}},"56":{"number":56,"name":"火山旅","reading":"ﾘｮ","overall":"先を急ぐ旅人。周囲に懇意な人もなく、大きな望みは叶えられない。しかし、旅\\n先にあっても正道をまもれば小事は吉。困難はあるが、今後の発展につながる、重\\n要な旅である。見聞を広めるのに良い機会である。\\n火山旅は、下から”陰陰陽　陽陰陽”。これは、従順の徳を有する者が、剛毅な\\nる者に従い国外に於いて中庸の態度をとり正道を守る事を表す。君子に応ずる者は\\n柔弱の者であるから、小さな望みが叶えられるのみである。国内で用いられない失\\n意の時であるが、上卦に明知、下卦に静かに止まる徳を有するので、正道を守る事\\nが出来る。正道と言っても旅の途中であるからいろいろの変化があるので、その時\\nにかなった考え方をする必要がある。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰柔のものが旅先にあって心弱く、そのためにますます災いを招く事を表\\nす。初六は最下位にある陰爻で、身分が卑しく、心貧しい者である。この様な者が\\n旅先にあれば一層こせこせして惨めになる。この様な状態は、ますます凶運を招く\\n元となり易いので、少しでも泰然とした境地に近付くように努力すべきである。"},"1":{"name":"６２","text":"６２は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正の徳を有する者が、旅先の宿でゆっくりとくつろぐ事を表す。六二は\\n中正（下卦の中を得ており、陰爻陰位）なる者で、留まる卦の中央。宿屋に立ち止\\nまる事を暗示している。旅先で最もくつろげる時であり、しかも徳のある人物であ\\nるから、周囲の親切も受けられる。"},"2":{"name":"九三","text":"九三は下卦の一番上で不安定なうえに中庸の徳がない。また剛爻剛位で人にたかぶ\\nるので旅先で受け入れられない。この様であれば、旅先にあっても火事に焼け出さ\\nれるような目にも会い、人にも逃げられる。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛柔の中庸を得ている者が旅先で優遇されるが、居心地が良くない事を表\\nす。九四は剛爻陰位で剛柔のバランスが取れている。上卦の最下位で、へりくだる\\n態度をとる事もでき、旅人にふさわしい振る舞いが出来る。受け入れられ、また不\\n自由はしない。しかし、剛爻陰位というのは、やはり正しく納まるべき所ではない。\\n優遇されても居心地は良くないのである。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔順中庸、文明の徳を持った旅人が、始めは少しの失費があるが、最後に\\nは認められ、名誉を得る事を表す。六五は、柔順で明知の徳を持つ者である。始め\\nは狩で雉を射ち損ね、矢を失うが、ついには見事に雉を得て、君子に引き出物とし\\nて献上する。六五は君位であるが、旅の時であるから本卦では、旅人を示す。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、驕り高ぶる旅人が安んずるところを失い、牛（柔順の徳）おも失い、火に\\n焼かれる事を表す。凶。上九は剛爻で上卦の一番上に位置する。驕り高ぶるので人\\nから憎まれ、泣きわめく結果になる。そのうえ牛も失い、そのことに気付かない。\\n危険この上ない。凶である。"}}},"35":{"number":35,"name":"火地晋","reading":"ｼﾝ","overall":"前進。自分の仕事に忠実な人間は、上役の寵愛を受け出世する。地上に太陽が輝\\nき、それに従うものを手厚く遇する。運気盛大。抜擢。商売繁盛。ただし、嫉妬に\\n注意。\\n火地晋は、下から”陰陰陰　陽陰陽”。これは、自国を良く治めた諸候が、功績\\nを認められ王の寵愛を受ける事を表す。地上に輝く太陽が、あまねく世界を照らし、\\nその徳を浸透させる。下の者が柔順に王に従属する。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、打ち砕かれ引き下がりながらも、自分の正しさを守り、泰然と運命に処す\\nることを表す。初六は陰爻で力弱く、応ずる九四は不正である。最下位で力弱く昇\\n進する事ができない。しかし、自分の正しさを固く守り通せば、災いはない。初六\\nは庶民の地位にあるので、悠々自適の生活を送る事が出来る。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正の徳を有しながら孤立無援で困難に会う者が、最後には認められ祖先\\nの妻から大いなる福を授かる事を表す。六二は中正（下卦の中であり、陰爻陰位）\\nの徳を有するが、上卦に応がなく（六二も陰爻）孤立無援である。最初は孤立して\\nいるが、自分の正しさを守り通せばついにはその徳が認められ、祖先の妻（王母）\\nから福を授かる。祭を占うめでたい卦である。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、不相応な地位にあるものが、大衆に信ぜられる事によって凶運を避ける事\\nを表す。六三は不中（下卦の中を外れている）かつ不正（陰爻陽位）で、当然凶運\\nであるはずであるが、共に明（上卦）に向かって進もうとする下二爻の仲間がある。\\nつまり、大衆に信ぜられ、共感を持たれているので凶運を未然に防ぐ事が出来る。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、徳のない者が、どん欲に昇進し、いつもびくびくしている様を表す。九四\\nは、不中（上卦の中をはずれている）で不正（陽爻陰位）でもあるのに高い位につ\\nいている。どん欲に昇進した者は、いつもびくびくしていなければならない。大き\\nなネズミの様な者である。この様であれば、たとえ行いは正しくても危うい。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、公正なる者に、下々の者がみなすなおに従う事を表す。六五は、不正（陰\\n爻陽位）でありながら明卦の主たる爻で、大明の徳を有し君位に位置する。下々が\\n従うので、凶運も避ける事が出来、またどちらに行っても利益を得る。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛強なる者が、小さな村の反乱を征伐することを表す。上九は、剛爻が最\\n上段まで登ったもので動物の角のように固く強い者である。したがって、自領の村\\nで反乱  があればこれを征伐しても危ういながらうまく行く。吉である。しかし、\\nこのように強い者が小さな村を攻める事はそれ自体恥ずべき事である。普段から良\\nく治めているべきであり、それが出来ないのは道が十分広くはないからである。"}}},"34":{"number":34,"name":"雷天大壮","reading":"ﾀｲｿｳ","overall":"隆盛。君子の勢いが盛んな様子。正しさを固守する事により、強引さによる弊害\\nを補わなければいけない。己に勝つ事が肝要。全てのことについて、暴走を注意す\\nるように。\\n雷天大壮は、下から”陽陽陽　陽陰陰”。これは、最も剛なる者が、強い力で動\\nくこと、大いに盛んなることを表す。君子にとって、盛んで強いという事は、自分\\nに勝つ事である。正しさを持続する事が出来れば願いは叶い、吉。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、身分の低い者が、意欲のみ盛んで分不相応に進もうとする事を表す。初九\\nは、大壮の卦の最下位にあって、剛爻であるから意欲は盛んである。しかし、一番\\n下の足が、いたずらに進もうとするのは分不相応である。したがって、動けば凶。\\n前進すれば必ず困窮する。"},"1":{"name":"九二","text":"九二は、陽爻陰位で不正である。しかし、下卦の中を得ており、剛柔のバランスが\\n取れている。とかく剛に過ぎる傾向のある大壮の卦にあっては、中庸の徳が最も大\\n切であるから、九二のもつ中庸の徳は不正な立場を補うに十分である。今は自分を\\n守るときであり、進んでは凶。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、過度に剛なる者が、暴走して危うい状態に陥る事を表す。九三は剛爻剛位\\nでしかも下卦の中を外れた最上位にあり、大壮の時にさらに剛に過ぎる者である。\\nこれは、強情な雄牛が暴走して生け垣に頭を突っ込み、茨に角をひっかけて難渋す\\nるのに似ている。相手を無視した態度は、自らを困難の中に陥れるので危うい。"},"3":{"name":"九四","text":"九四は、大壮の卦にあって既に半ばを過ぎている。剛に過ぎ、不中不正（上卦の中\\nを得ず、陽爻陰位）であるのでこのままでは危うい。しかし、剛爻が柔位にあるの\\nでいくらか柔順であるし、前方は陰爻ばかりでさえぎる者はない。したがって、正\\nしさを守り通せば道は開け、吉運を得る。"},"4":{"name":"六五","text":"六五は、上卦の中を得でおり、中庸の徳を有する。陰爻陽位で、陽爻のあるべき所\\nに陰爻があるので、すでに剛なる勢いは失われている。したがって、大壮の卦に見\\nられた危うさはない。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力不足の者が意気盛んに暴走して、抜き差しならぬ不吉な運命に陥る事を\\n表す。上六は、大壮の卦の極点に位置して、その勢いは雄牛のようであるが、陰爻\\nであるから力不足である。生け垣に角をからませ、垣を破る事もできない。動きの\\n取れない状態に陥り、凶。しかし、柔爻であるから、この様な困難な運命にも柔軟\\nに対処し、堪え忍べば道は開ける。"}}},"54":{"number":54,"name":"雷沢帰妹","reading":"ｷﾏｲ","overall":"結婚。王に仕えるハレムの女。一時的な情事。一時的な感情で大切な事を決めれ\\nば凶。\\n雷沢帰妹は、下から”陽陽陰　陽陰陰”。これは、長男に少女が嫁ぐ事を表す。\\n下卦は喜ぶ、上卦は動く。正しくない関係にあって自分から喜ぶ女であり、進めば\\n凶。二から五までが不正。水商売等では、良いパトロンに巡り会う。アルバイト等、\\n一時的な職業には吉。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、正妻の妹がわきぞえ（介婦）として嫁ぐ事を表す。初九は、身分の低いも\\nのであり正妻にはなれない。君子の身の回りの世話をする程度である。しかし、初\\n九は剛爻であり恒常的で貞節の徳がある。無理に正妻になろうとせずに、へりくだ\\nってわきぞえとしての分を尽くすには吉である。前進するのに吉。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、不正な相手に嫁ぎながら、なおその正しさを失わずにいる中庸の徳を持っ\\nた賢女を表す。九二は剛爻であり、中庸で貞節の徳を有する女である。六五には正\\n当な（陰爻）配偶者もいる。しかし、六五は不正（陽爻陰位）陰柔、小人で、九二\\nの徳を受けとめる事はできない。そこで、九二は孤高の隠者（幽人）として理解さ\\nれぬままその正義を貫く事になる。"},"2":{"name":"六三","text":"六三は下卦の主たる爻で、喜ぶ意味をもつ淫乱なる爻である。正妻としては嫁ぐ事\\nはできない。わきぞえ、妾としてのみ嫁ぐ事が出来る。貞節のとくに欠ける傾向が\\nあるので、正義を貫く事は難しい。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、貞節なる徳を有する賢女が適齢期を過ぎた事を表す。軽々しくは許さない\\n女である。下卦に応がなく、適切な相手に恵まれない事を暗示している。しかし、\\n適齢期を過ぎたのは、賢女でありながら適当な相手がいなかったからであり、遅く\\n嫁ぐには吉運が約束される。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸の徳を持つ君子の娘が、臣に嫁ぐ事を表す。尊い位の女（君子の末娘）\\nには、満月の様な徳があり、着飾る必要はない。介婦よりも質素な着物に身を包ん\\nでいても、徳の輝きにより吉運を約束される。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、婚姻が成立しない事を表す。上六は、雷沢帰妹の卦の行き詰まりにあって\\n下卦に応がない。つまり婚姻の正当な相手がいない。嫁ぐ花嫁の荷物には中身がな\\nく、花婿が羊を裂いても血が出ない。嫁いでもすぐに離縁する事になる。凶。"}}},"55":{"number":55,"name":"雷火豊","reading":"ﾎｳ","overall":"豊満、豊麗、豊潤。中天の太陽。現在が盛んで豊かなときであり、今後の衰運に\\n備えるべき時であることを示す。派手になり易い。結婚では妊娠、作物では実りを\\n表す。派手な職業には吉。また、即決即断が求められる。\\n雷火豊は、下から”陽陰陽　陽陰陰”。これは、君子のみが到達する事のできる\\n盛大な時を表す。天下で最も豊かで大きい状態。しかし、多くの富と人民を抱え、\\n負担も大きい。これを支え、維持して行く事は君子のみに可能な事である。天中の\\n太陽の様に世界の隅々まで照らす徳をもってはじめて可能になる事であるので、願\\nい事は叶うが、危険な卦でもある。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、配偶の主人に会い、大切にされる事を表す。九四は上卦の主たる爻で、初\\n九の主人に当たる。初九は自分から動いてこの主人に会う。十日がひとつの区切り\\nであるが、あまり気にする事はない。過度な期待をしなければ、九四は初九を大切\\nにするので、安心して従う事が出来る。"},"1":{"name":"六二","text":"六二は、下卦”離”の主たる爻であり、最も明智なる者である。しかし、これに応\\nずる六五は陰柔なる暗君で、その暗さは真昼に北斗七星が見えるほどである。した\\nがって、この暗君に仕えれば不当な疑いを持たれるが、明智をもってこれを啓発す\\nれば吉。"},"2":{"name":"九三","text":"九三は下卦の中を過ぎ、日が傾きつつある状態である。また、これに応ずる上六は\\n陰柔なる暗愚のもので、その暗さは真昼にごく小さな星が見えるほどである。さら\\nに上六には官位がない。この様な者に仕えれば、九三と言えども力を奮う事は出来\\nない。義を貫くべきであるが、大事には凶。"},"3":{"name":"九四","text":"九四は剛陽の徳を有する位の高い大臣であるが、仕える六五は暗君である。そこで\\n下へ行き、自分と同じ陽剛の徳を持つ初九に会い、共に働く。志しを共にする者に\\n会い、吉。"},"4":{"name":"六五","text":"六五は陰柔の暗君であるので、それ自体は凶運を暗示するが、六二の様な明智なる\\n賢者を近くに招き寄せれば好運と名誉を得る事が出来る。本来は不吉なる卦である\\nが、賢者により吉となり得る。"},"5":{"name":"上六","text":"上六は豊の極点であるが、徳のない者が驕り高ぶり孤立している。屋根ばかり大き\\nく、人気もない暗い屋敷である。この小人が孤立したのは、人が見捨てたからでは\\nなく自分で隠れたためである。付いてくる者はいない。大凶。"}}},"51":{"number":51,"name":"震為雷","reading":"ﾗｲ","overall":"恐れの後の幸福。地震、雷等が一時的に恐怖心を起こさせ、通り過ぎて行く様子。\\n日ごろより心掛けている人は、いざと言うときに慌てず、幸福を得る事ができる。\\n震為雷は、下から”陽陰陰　陽陰陰”。これは、地震、雷、あるいは恐れ慎むこ\\nとを意味する。雷は天の怒りであり、一時的に人々に脅威を与えるが、過ぎてしま\\nえばまた元の静かなときが始まる。従って、この時期は君子は取り乱さず自らの行\\nいを反省し、慎んで時の過ぎるのを待つべきである。そうすれば、この後幸運が訪\\nれ願い事は叶い、さらに後の行動の指針が見いだされるであろう。またこの卦は、\\n長男と祭りを暗示している。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、震の主たる爻（剛健な陽爻）であり、”震為雷”の卦全体を意味する。\\n従って、身を慎み恐れ、時の過ぎるのを待てば福が訪れる。"},"1":{"name":"六二","text":"六二は、下から２番目の”陰”が”老陰”で、”陽”に変化する可能性を示す。\\nこれは、陰（小人）でありながら君子（初九、陽爻）の上にあり、最も大きな危険\\nを負う者を意味する。地震（天災、大きな災い）により、多くを失うであろう。\\nしかし、六二は従順（陰爻）の徳を持ち、中正（陰位）にあるので、失ったものは\\n時を経ずして取り戻すことができる。"},"2":{"name":"六三","text":"六三は、下から３番目の”陰”が”老陰”で、”陽”に変化する可能性を示す。\\nこれは、下卦の最上位（不中、不正）にあるものが、天の怒りに会い恐れおののき、\\n取り乱す様を意味する。しかし、この機会を無駄にせず、自らの過ちを改めれば災\\nいに会わずに済むであろう。"},"3":{"name":"九四","text":"九四は、下から４番目の”陽”が”老陽”で、”陰”に変化する可能性を示す。\\nこれは、不中不正（陰位）にある陽（健剛なるもの）が、上下の陰（小人）に活動\\n力を奪われ、衰えることを意味する。従って、雷は鳴らず、地震は起こらない。\\n意欲はあっても力が不十分であり、事を起こすことができずに、時が過ぎて行く。\\n願い事は叶わず。"},"4":{"name":"六五","text":"六五は、下から５番目の”陰”が”老陰”で、”陽”に変化する可能性を示す。\\nこれは、不正（陽位）にある陰爻が、上を目指せば最上位に突き当り、下を見れば\\n震の主たる陽爻に脅かされる、危うい状態を意味する。しかしながら、この六五は、\\n従順（陰爻）と中庸の徳を有しているので、危ういながらも凶運を避けることがで\\nきる。"},"5":{"name":"上六","text":"上六は人々を先導する役も有り、計画を自ら思いとどまれば周囲のひんしゅくを買\\nうこともある。"}}},"32":{"number":32,"name":"雷風恒","reading":"ｺｳ","overall":"恒常。恒産。恒心。現状維持を心掛ければ平穏無事、着実な日々を送る事が出来\\nる。\\n雷風恒は、下から”陰陽陽　陽陰陰”。これは、夫婦の関係が恒久的である事を\\n表す。下卦は巽、長女の意味があり、上卦は震、長男の意味がある。正しい相手に\\n対し、女が男にへりくだり、夫婦の常理を示している。従って自分の道を持続し常\\nを守るならば、願い事は叶い、前進して吉。ただし、動機が正しくその正しさを持\\n続する事が条件である。天の動きは留まる事のない中にこそ恒常性がある。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、ことの始まりにあって相手に過度の恒常性を要求する事を表す。初六は九\\n四と応じている様であるが、九四は陽剛で上昇する事のみを考えている。一方、初\\n六は事の始まりの段階であるり、適切に二爻が応じる事が出来ない。しかし、初六\\nは状況  を正しく理解する事ができないので九四に対して過度の恒常性、正義を要\\n求する。このようであれば、動機、意図が正しくても凶。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、不正な地位にありながら中庸の態度を取る事を表す。九二は陽爻陰位で本\\n来ならば後悔するような結果を招き易い。しかし、下卦の中央に位置する事から中\\n庸の徳を有し、良い方向に事態を導く事が出来る。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛なる者が恒常性に欠ける事から、恥をかくことを表す。九三は陽爻陽位\\nで正を得ているが、中を外れしかも下卦の最上位にあって自分の位置に満足できず\\n上六に近付こうとしている。その徳に恒常正のないために、人に受け入れられる事\\nができない。この様であれば意図、動機が正しくても恥をかく。"},"3":{"name":"九四","text":"九四は陽爻陰位で位置が不正である。したがって、いくらその場所に居座っても元\\n々が不正である以上何も得る事はできない。狩をしても獲物はなく、願い事をして\\nも叶う事はない。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔順の徳を有する者が、ひたすら人に従う事を表す。六五は陰爻（柔）で\\nあり上卦の中を得ている。しかも下卦の九二（剛）に忠実に応じている。占う者が\\n妻であれば、その正しい道を常に守る事で吉。夫であれば、本来自分で方針を定め\\n命令する立場のものが、ひたすら他人に従っているので凶。同じ従う時にあっても、\\nそれぞれの立場を考えるべきである。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、常の道が極点に行き詰まり、不安に振動している状態を表す。上六は、雷\\n風恒の極点で、上卦の”震”（動く）の最上位に位置する。既に常なる性質は行き\\n詰まり、常ならざるものになっている。速い振動の中にあって、動く事を常として\\nいる。地位は余りにも高く不安定である。そこで上六はいつもふらふらと定まらな\\nい。この様であれば何も得るところはなく凶であること疑いない。"}}},"40":{"number":40,"name":"雷水解","reading":"ｶｲ","overall":"解決、解放、解散。冬の寒さから解放され、暖かい春がやってくる。足止めされ\\nていたことから解放され動き始めるとき。不健康な状態からの解放。タイミングの\\n重要なとき。　雷水解は、下から”陰陽陰　陽陰陰”。困難がとけ、解放される事、\\n天地が解けて草木が育成する事を表す。地風升の地（西南）へ九三が入り吉運とな\\nる。（西南が吉方）内卦は水（険）、外卦は雷（動く）であるので、険の外へ動い\\nて吉運となる。ただし、不必要に動く事は良くない。可能な限り安静にして、行く\\nべきところがあればできるだけ早く行き、問題を解決して早く帰るべきである。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、事の始めに於いて目立たぬ所におり安全である事を表す。初六は雷水解の\\n卦の始めであり、最下位の目立たぬ所にいる。しかも上卦の九四に正しく応じてい\\nる。したがって、安全であり凶運はまぬがれる。しかし、積極的な大吉ではない。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、君子に信用され、悪人を退治して正義を行う事が出来る事を表す。九二は\\n六二の君子に応じており、信用されている。邪なる小人を退治し、尊い中庸な道を\\n得る事が出来る。正しい道を固守する事が出来れば吉。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、分不相応な高位に付いた小人が、その地位を盗まれる事を表す。六三は小\\n人（陰爻）であり不正（陰爻陽位）であるにもかかわらず下卦の最上位に位置する。\\n卑しいものが高貴なものの車に乗れば、盗賊はこれを奪おうとする。目的が正しく\\nても、分不相応な高位につくことは自ら災いを招くようなものである。力にあまる\\n事は避けなければならない。そうすれば、災いは裂ける事が出来る。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、不正なる人間関係を断ち切る事で、君子の朋友を得る事を表す。九四は初\\n六に応じているがこの両者とも不正である。九四が君子（陽爻）であるのに対し初\\n六は小人（陰爻）であり、最終的には正しく応じている同志とは言いがたい。君子\\nはこの悪縁を断ち切り、真の友人との関係を温めるべきである。良くない相手との\\n関係をなくせば、周囲の信用を得る事が出来る。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、君子が小人との交わりを絶ち、吉運を招く事を表す。六五は四つの陰爻の\\n中にあってただ一つの君子である。しかし、周囲に他の陰爻がいるために問題が起\\nこり易い。小人との交わりを絶つ事により彼らを退かせる事が出来れば、周囲の人\\n望を集める事が出来て吉運を招く事が出来る。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔軟な姿勢をもつ上六が、雷水解の卦の最後に当たり、全ての乱を解決す\\nる事を表す。上六は柔（陰爻）であるが、柔らかい物腰の中に弓矢を隠し持つ。\\n下卦の最上位にあって乱を企む小人（六三）が飛び上がるのを待ってこれを討ち取\\nる。敵を退治するのに問題はない。時を待って実行に移すべきである。"}}},"62":{"number":62,"name":"雷山小過","reading":"ｼｮｳｶ","overall":"小人の過度。小さな願いは叶うが、大きな望みは不可である。飛ぶ鳥が後に音を\\n残す様。昇に凶、降りるに吉。自重して、几帳面な態度を守るように。\\n雷山小過は、下から”陰陰陽　陽陰陰”。小事における行き過ぎ。小なるものの\\n行き過ぎにより、願い事が通ることを表す。雷山小過は四陰二陽で、陰が過度であ\\nる。したがって、通るの徳があり願いは叶うが小事に於いてのみ叶う。鳥が飛び過\\nぎつつ鳴き声を残すのを聞けば”昇るによろしからず、下るによろし”。つまり、\\n上に昇れば止まるところもなく、下に降りれば安らかなる住処がある。下に降りれ\\nば大吉。消極的に少し過ぎるのがよい。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰柔の小人が、九四に応じて過度に高く飛び上がろうとする様を表す。\\n小過の時に過度に高く上がろうとするのは救いがたい凶である。昇る事のみ考え、\\n降りる事を知らない者である。"},"1":{"name":"六二","text":"六二は、下から二番目 の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸の徳を持つ六二が昇り進んでも、君子には会えず援助者が得られない\\nことを表す。六二に応ずべき位置は上卦の六五であるが、これは陰爻であるので応\\nじられない。六二は、陽爻の君子に会えずに陰爻の臣に出会う。援助者には会う事\\nが出来ないが、中庸の徳を持ち続ければ災いには会わない。"},"2":{"name":"九三","text":"九三は下卦の最上位にあって陽爻かつ正を得ている。（陽爻陽位で極めて剛直、自\\n分の力を過信するものである。）小過は小人の勢力が過度であるときであり、この\\n時に突進する事は危険である。上六は、九三に応ずるようであるがかえって敵意を\\n持っている。危険この上無い。殺害される事も有り得る。凶。"},"3":{"name":"九四","text":"九四は、陽爻陰位で剛直に過ぎる事はない。これに応ずる初六は小人である。九四\\nは初六に出会いこれをやり過ごす事が出来ない。本来ならば打つべきであるが、小\\n人の勢力が過度なときであるから、臨機応変な対応が必要である。積極的に打ち進\\nむ事は危険であるので、是非とも思いとどまるべきである。静かにしていれば凶で\\nはない。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、意欲があっても力弱く、実行に移せない様を表す。六五は上の中を得て君\\n位にあるが、陰爻で力が不十分である。下卦で応ずべき六二を捕らえ補佐させるが、\\n共に陰爻で力は弱い。上には応ずべき者もいない。意欲はあっても、まだ実行の段\\n階ではない。"},"5":{"name":"上六","text":"上六は小人（陰爻）の身でありながら、遮る者がなく高く飛びすぎた。身を安んず\\nる所もない。分を越えて高く飛べば、飛ぶ鳥が射落とされるようなことになる。\\nこの凶運は、自ら招いた事と言える。"}}},"16":{"number":16,"name":"雷地豫","reading":"ﾖ","overall":"楽しみ。天の摂理が隅々にまで行き渡り、全てが整然と行われる。音楽を楽しみ、\\n祭りが行われる。宇宙の中の偉大なとき。新たな出発の時であるが、用心が必要で\\nある。準備の整った城。予感、予期、予言、予知。下積みで苦労した人が、世に認\\nめられるとき。調子に乗って油断しないことが肝要。\\n雷地豫は、下から”陰陰陰　陽陰陰”。これは、一つの陽爻に民が和合し従う事\\nを表す。豫は、和合して楽しむ意味。四爻のみが陽爻であり、この君子を立てて軍\\n隊を動かすのに吉。天地は理に従って動くので、軍隊を動かすときもこれに従わね\\nばならない。父祖の霊を音楽を奏でながら祭る。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰柔の小人が、力強い九四に応じて志しを遂げ、驕慢になるために凶運を\\n招く事を表す。初六は力の強い君子と応じており、思いのままに振る舞う事が出来\\nる。得意になり、声高らかに喜びを歌う。この様な態度を続ければ、凶運を招く事\\nは間違いない。初六の喜びは、自分一人のものでしかないからである。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸の徳を持つ六二が楽しみに溺れず、聡明なる思慮を働かせ、身を正し\\nく保つことを表す。六二は中正（下卦の中を得、陽爻陽位）で、中庸の徳を持つ。\\n皆が喜び楽しみに溺れがちである中で、一人強く正しさを守っている。その徳は安\\nらかで堅固、したがって思慮深く聡明である。このように、石のように正しさを守\\nれば吉。"},"2":{"name":"六三","text":"六三は下卦の最上位で、上ばかりを気にするものである。九四は、この卦の主たる\\n陽爻であり、六三はこれに媚びへつらう。このようであれば、近い内に後悔する事\\nは必然であり、直ちに悔い改めるべきである。さもなければ大きな後悔につながる\\nであろう。"},"3":{"name":"九四","text":"九四は、下から四番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽剛なる臣が六五の君子の信頼を得て、皆を楽しませる事を表す。九四は\\nこの卦ただ一つの陽爻であり、喜びの主体である。しかし、力弱い（陰爻）君子の\\n側近が、全てを取り仕切ると周囲に疑いを持たれる。これは、九四が周囲を疑い、\\nその意見を用いない事による。誠意を尽くして人を信じれば、志しを同じくする同\\n志があつまり援助してくれて吉運を得る。"},"4":{"name":"六五","text":"六五は、下から五番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力の弱い君子が、陽剛なる臣の力で祭事を行う事を表す。六五は、君位に\\nありながら柔弱の身であり、重病人のように心許ない状態である。しかし、上卦の\\n中を得、君位にあるためにすぐには滅びない。君子としては恥ずべき状態であり、\\n中庸の徳を失わないように、心しずかに謹むべきである。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔弱の身でありながら楽しみの極点にあって、溺れ、めまいのする様子を\\n表す。上六は、喜びの卦にあって最上位に位置する。柔弱の身で楽しみに溺れ、わ\\nが身を忘れている。しかし、上卦は雷で動くの意味があり、この様な状態も変化し\\n得ることを暗示する。直ちに心を改め、身を正しく保てば災いを避ける事が出来る。"}}},"9":{"number":9,"name":"風天小畜","reading":"ｼｮｳﾁｸ","overall":"貯蓄。少し留める。まだ力不足であり、大きく働くことはできない。雲がたれ込\\nめ未だ雨の降らない様。暫くは、足止めがあるが、焦らずに待てば、願いは叶う。\\n風天小畜は、下から”陽陽陽　陰陽陽”。これは、小さな停止、小さな蓄積を表\\nす。六四以外は全て陽爻であり、一陰が五陽を押し止めている。したがって少しだ\\nけ止める事が出来るのである。二及び五の位がいずれも陽であり、剛中。また上卦\\nは入る、下卦は進むであり、進んで入る意味がある。したがって、願い事は叶う。\\nしかし、十分な力を蓄えてはいないので、少し叶う。徳の施行がまだ不十分である。","yaos":{"0":{"name":"初九","text":"初九は下卦天の最下位にあって上卦の六四と正しく応じている。天は本来上にある\\nもので、上昇しようとする。六四は陰爻であるが、正しく応じているので邪魔はし\\nない。正道を守り、本来の自分の姿に戻るので、吉運を得る事が出来る。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中庸の徳を持つものが、正しい仲間を得て、自分のあるべき姿に帰る事を\\n表す。九二は六四にやや近く、六四は九二を止めようとする。しかし、九二は下卦\\nの中を得ており、その志しは変わらない。初九と手を結び、本来の自分に帰る事が\\nできる。正しい仲間を選べば結果は吉である。"},"2":{"name":"九三","text":"九三は、下卦の最上位にあって六四と接している。九三の正しい相手は上爻である\\nが、六四と道ならぬ関係になり止められ、上昇できなくなる。しかし本来剛爻の九\\n三は自分の責任を省みず、これを不満として六四と争う。自分の家庭を正しく保て\\nなかったのは九三自身の責任である。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力弱きものが上位者の応援を得て、役目を果たす事を表す。六四は風天小\\n畜の卦にあってただ一つの陰爻である。下卦の三陽爻の前進を阻もうとするが、相\\n手は剛爻、こちらは柔爻であって傷つき易い。しかし、誠意を持って事に当たれば\\n上の二つの陽爻が助けてくれる。したがって、誠意があれば吉。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中正の徳を有するものが、隣人の助けを得て役目を果たす事を表す。九五\\nは中正（上卦の中で、陽爻陽位）の徳を有し、下卦三陽爻の前進を阻もうとする。\\n働くに当たり、九五は自分だけ富もうとはせずに隣人と手をつなぎ助け合う。した\\nがって、周囲もこれを大切にしてくれるので吉運を得る事ができる。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、婦人が君子をしのぐ力でこれを止める事を表す。上九は小畜の卦の極点に\\nあって、陽は陰により止められる。六四は上九と和合する事によりこれを止めるの\\nであり、その力は君子をしのぐ勢いがある。この様であれば、たとえ六四の意図が\\n正しくても、警戒しなければならない。陰が陽に勝るとは、満月の輝きが太陽のよ\\nうであり、小人の力が君子を圧迫する様なものである。この様なときは、君子はじ\\nっと静かにしているのが良い。"}}},"61":{"number":61,"name":"風沢中孚","reading":"ﾁｭｳﾌ","overall":"心中の誠。鳥が卵を温める意味。中心が空虚、虚心を表すことから船の意味もあ\\nり、大川を渡ることも可である。礼儀正しく誠あれば吉。共同事業に吉。恋愛は実\\nる。\\n風沢中孚は、下から”陽陽陰　陰陽陽”。これは、心中に誠のあるものが神を祭\\nれば、供えものが少なくてもその願いは聞き入れられ困難もわたりきる事が出来る\\nことを表す。九二、九五いずれも下卦上卦の中を得ており、心中の真心を表してい\\nる。この様であれば、身分の低いものの貧しいお供えでも神は満足して願いを叶え\\nる。また、上卦は木、下卦は沢の意味があり、大川を舟でわたる事が出来る。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、真心を信じる卦の中にあって、事の始まりでは慎重な態度が望まれる事を\\n表す。初九は上卦の六四と正しく応じている。風沢中孚の卦であるから真心を持っ\\nて信じるべきであると思われるが、初六はことの始めであり軽々しくあってはなら\\nない。信ずべき相手である事を良く確かめた後、固く誠意を持って対応するべきで\\nある。一旦信じたならば、他人に心を惑わされる事があってはならない。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中庸の徳を持つものが、遠くに離れていても相い応じ合う事を表す。九二\\nは下卦の中を得て君子たる九五と心を通わせている。離れてはいても、志しを同じ\\nくするもの同志、心引かれ共感し合うものである。この様であれば、誠のある人は\\n求めなくても上位者からの応援を得る事が出来て吉運を得る事が出来る。"},"2":{"name":"六三","text":"六三は六四を攻めたいが、力弱く後退する。これを悲しみ、時に和睦して喜んだり\\nする。なかなか静かに時を過ごす事はできない。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、責任の重い臣が、つまらぬ交友を絶ち君子に信用される事を表す。六四は\\n陰爻陰位で正を得ている。初九と応じているが、これはとるに足りない仲間である。\\n君子に最も近い重臣であるから、詰まらぬ仲間とは縁を絶ち、満月に近いその力を\\n発揮すべきである。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中正の徳を有するものが、志しを同じくするものの助けを得て役目を果た\\nす事を表す。九五は中正（上卦の中で、陽爻陽位）の徳を有し剛健。下卦九二と同\\nじ志しを持ち、心を通わせる事が出来る。風沢中孚の卦の主体である。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、誠意はあるとしても自信過剰なものが、君子の言葉を無視して自分かって\\nに舞い上がりいつか地に落ちる事を表す。上九は風沢中孚の卦の極点であり、過度\\nに信じる傾向がある。自信過剰となり、独りよがりの信念に燃えて世間と交流を絶\\nつ。飛ぶ力のない鶏が、あたかも天を目指して舞い上がるようなものである。いつ\\nか地に落ちて、その報いを受けるであろう。凶。"}}},"37":{"number":37,"name":"風火家人","reading":"ｶｼﾞﾝ","overall":"正しい家庭。家庭において、各々が自分の分担を正しく行う姿。外に男、内に女\\nがいて徳のある家庭を治める。自らを厳しく律する必要有り。外の問題よりも、内\\n部の統制をはかり、足場を固める時である。\\n風火家人は、下から”陽陽陰　陽陰陽”。これは、主婦が家庭をしっかりと守る\\n事により、外で働く主人の応援をする事を表す。風火家人では、外で働く主人（九\\n五）と、内を守る主婦（六二）と双方が中正を得ている。特に内なる正しさは、外\\nの正しさを導く鍵となる。天の理にあった家庭の状態であり、この様な家庭が集ま\\nれば天下もしっかりと治まる事が出来る。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、家を治める卦の始めにあって、初心の大切さを守る事を表す。家の中の秩\\n序を守るためには、ことの始めが大切である。乱れを生じる前に、未然に厳しく取\\nり仕切る事が必要である。初九は陽剛の者であり、この任を良く果たす。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、主婦が柔弱でありながらも、家の中にあってその勤めを良く果たす事を表\\nす。六二は陰爻陰位でひたすら他に従う陰柔の爻である。自分から積極的にことを\\n起こす事はできない。しかし、主婦として家を守り勤めを果たすには吉。"},"2":{"name":"九三","text":"九三は剛爻剛位で過度に厳しい。家人はその厳しさに不平をもらす事もある。しか\\nし、この様な状態で多少の不備があろうとも、厳しい事はついには吉である。反対\\nに緩すぎて乱れを生じては、家は治まらずに凶。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、主婦が正しい位置にいて勤勉に家事を行い家を富ます事を表す。六四は陰\\n爻陰位で正を得ている。九五の主人にぴったりと付いてこれに従う。この様であれ\\nば結果は大吉。家は、良く治まり、また富むことができる。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中正の徳を有する君子が、夫人の元で安心して好運を得る事を表す。九五\\nは中正（上卦の中を得、陽爻陽位）で、下卦の六二と正しく応じている。しかも六\\n二も中正（下卦の中で、陰爻陰位）である。この様に正しい交わりで心は安らかで\\nあり、徳のある者同志の交わりは楽しくして淫ならぬものである。大いに吉。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、家長たる者に誠と威厳があり、家の者が良く感化を受ける事を表す。上九\\nは風火家人の卦にあってその最上位に位置する。家長たる者、威厳がなくては家の\\n中が乱れる。しかし、この威厳は、単に偉そうにするのではなく心中の誠がそうさ\\nせるのである。自分の身を良く治め、言行に真実があれば家の者は自然に感化され\\nついには吉を得る。"}}},"42":{"number":42,"name":"風雷益","reading":"ｴｷ","overall":"公益。積極的な活動による困難の克服と成功。公の結婚、就職、昇進、収穫等の\\n喜び。\\n風雷益は、下から”陽陰陰　陰陽陽”これは天地否（陰陰陰　陽陽陽）の上卦の\\n一陽爻を減らして下卦に増した形であり、支配者の富を民に分かち与えたことを示\\nしている。上を減らして下を増すのであるから、民衆の大いなる喜びを得る事が出\\n来る。六二と九五が中正で相応じているから、行くところに利あり。また、木の舟\\nが動く意味があり、大川を渡ることができる。積極的に行動すれば、富が増す。\\nまた、他人の徳を風のように素早く認め、自分の不徳を雷のように果断に改める意\\n味でもある。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、最下位の者が上位者からの恩恵に答えるために重大な仕事を引き受ける事\\nを表す。初九は下卦の増された陽爻で、最下位にありながら上からの恩恵を受ける。\\n本来重大な仕事を行う立場にはないが、受けた恩恵に答えるために大きな仕事を背\\n負う事になる。仕事が正しいものであれば大吉で、成功する事が出来る。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正の徳を持つ者が、上の者から大いに与えられる事を表す。六二は下卦\\nの中を得、陰爻陰位で中正の徳を持つ。ただし、陰柔で強さに欠けるため正しさを\\n持続する事がやや弱いので注意が必要である。正しさを長く保つ事が出来れば、予\\n想しない恩恵を受ける事が出来て大吉。君子が神を祭るのに、吉運を約束する卦で\\nある。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、凶事に際して他人に援助を求める事を表す。六三は、下卦にあって自分か\\nら益を求める者である。これは、君子としては恥ずべき行為であるが、自国が凶運\\nに会ったときはやむを得ない。援助を受ける事が出来る。ただし、これは凶運に会\\nったときだけであり、かつ中庸の徳を有し、真心が込められているときのみ吉であ\\nる。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸の徳を持つ者が、有力な援助者から助けられる事を表す。六四は上卦\\nの中で、初九に陽を与えた者である。有力な援助者を表す。国を移した場合に、隣\\n国の助けが得られる事も示しており、大きな移動に吉。ただし、六四に不足してい\\nる中の徳を忘れなければと言う条件が付く。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中正の君子が下に恵み、大いに民衆の心を得る事を表す。九五は上卦の中\\nで陽爻陽位であり中正の徳を持つ。この様な君子が、下に厚く与えようとしている\\nのであるから、民衆の支持を受けられる事は当然である。人に与える事を心掛けれ\\nば大いに吉。"},"5":{"name":"上九","text":"上九は、益の卦にあって最上位。強引に利益を求める者である。しかし、この様な\\n者にはだれも与えてはくれない。その上、自分かってな言い分を繰り返す上九を憎\\nみもする。意外なところから打撃を被り凶であることは疑いない。"}}},"57":{"number":57,"name":"巽為風","reading":"ﾌｳ","overall":"風に舞う植物の種子。風のように従う者。出入り。迷い。肩から力を抜き、人に\\n従い、周囲に合わせ、周囲を利用する事により身を立てる事が出来る。商隊のよう\\nにものを遠くに運ぶ事により利益を得る事が出来る。盗難に注意。\\n巽為風は、下から”陰陽陽　陰陽陽”。これは、柔順なるものが偉大な人物に会\\nい、小さな願い事が叶う事を表す。巽為風は、陰爻が主たる卦であり小さな願い事\\nは叶うが、これは従う相手の陽爻が正しい事が条件になる。上下の中にある爻はい\\nずれも陽爻で陽剛の徳をもつので、願いは叶えられる。またこの卦は、君子の命令\\nが風のように隅々まで行き渡る事を示している。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、最下位の者が余りに柔順で自分を卑下し過ぎており、決断力に欠ける事を\\n表す。元々巽為風は柔順の卦であるのに、初六はその最下位にあって余りに柔順に\\n過ぎて主体性がない。この様では、叶うはずの願い事も周囲に押し流され、優柔不\\n断の中に埋没してしまう。自信を持って進む事が出来れば吉。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、中庸の徳を持つものが、厚く謙遜の態度を守りそれを言葉に表し、吉運を\\n得る事を表す。九二は陽爻陰位で、謙遜に過ぎる。しかし、陽爻であるので優柔不\\n断ではない。上位者に対する謙遜の態度を言葉に表して柔順の態度を貫けば吉であ\\nる。これは、君子が神主や巫を多く用いて神に祈る事も示している。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、本来へりくだる事の不得意なものが無理に人のまねをしてへりくだり、う\\nまく行かずに恥をかく事を表す。九三は陽爻陽位でしかも下卦の最上位。剛に過ぎ\\nる。この様なものは、人にへりくだるのは不得意である。しかし、へりくだる事を\\n意味する巽為風の卦にあって無理にへりくだるまねをし、うまく行かずに人前で恥\\nをかく事になる。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、本来弱い立場のものが、積極的に動いて吉運を得る事を表す。六四は陰柔\\n（陰爻）で、下卦に応ずるものがない。（初六も陰爻）上卦の最下位で上にはふた\\nつの陽爻が控えており陰爻の身で下の二陽爻の上に乗っている。弱者が不安定な位\\n置にあり、危うい。しかし、陰爻陰位で正を得ており、心配した災難は避ける事が\\n出来る。狩をすれば獲物があって、功績を得る事ができる。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽剛なるものが、始めに懸念された凶運を逃れ、大いなる利益を得る事を\\n表す。九五は陽爻であるが、巽卦にあっては不正（柔順の卦にあって自身は陽剛）。\\n災いがある事が懸念される。しかし、九五は中正（上卦の中で、陽爻陽位）であり、\\n始めの心配も消え何事にも利益がある。物事を変更する場合には、慎重であればう\\nまく行く。"},"5":{"name":"上九","text":"上九は、元は陽剛（陽爻）であったが、巽為風の卦の最上位で謙遜に極まり、その\\n性質をまったく失ってしまっている。本来、君子として陽なる性質を現さなければ\\nならないものが、まったく決断力を失っては凶にならざるを得ない。鋭い斧が、そ\\nの輝きを失うようなものである。"}}},"59":{"number":59,"name":"風水渙","reading":"ｶﾝ","overall":"氷解。風で波が散る様。又は水の上を船で渡る意味。王が廟に至る。離散した祖\\n先の霊が廟に集まり、祭りを成功させる。希望をもって船出をすれば、大きな成功\\nがある。\\n風水渙は下から”陰陽陰　陰陽陽”。これは、一度離散したものを集める事を表\\nす。九二が陽で中を得、六三と六四が力を合わせるので、吉。王が祖先の霊を祭り、\\n離散した霊を呼び戻し、結集する。祭で、人心を集める事ができる。上卦”風”は\\n木を意味し、下卦”水”は川を表すので、大川を舟で渡る事ができる。正道を固守\\nすれば、願い事は叶う。吉。","yaos":{"0":{"name":"初六","text":"初六は風水渙の卦にあって、事の始まり。まだ、それほど離散していないので勢い\\nの良い馬（九二）の助けを得れば集める事はそれほど困難ではない。初六自体には\\n力はないが、力の強い協力者の助けを得られれば吉運を得る。"},"1":{"name":"九二","text":"九二は陽爻陰位で不正であり災いにあう心配があるが、離散の卦にあって下卦の中\\nにあり、安定した場所を得た。従って、心配された災いは消える。"},"2":{"name":"六三","text":"六三は陰爻陽位で不中不正。本来利己心の強いものである。しかし、渙卦にあって\\nはこの利己心は離散され、かえって天下の離散を救うために働く。\\nこの様であれば吉。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、私的な集まりを捨て、公に尽くすものが吉を得る事を表す。六四は君子\\n（九五）のすぐ下にあって大任を担うものである。下卦の初六は同じ陰爻で応じな\\nい。これは、私的な子分を持たない事。六四は私的な狭い朋党を離散して、滅私大\\n同の道を行くものである。大善であり大吉である。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽剛なる君子が、私財を散じて天下の離散を救う事を表す。君子の命令は\\n流れ出る汗のように元には戻らない。天下の離散するときにあって、中正（上卦の\\n中で、陽爻陽位）の徳を持つ君子が、私財を散じ、的確な命令を下す。この様であ\\nれば、小を散じ大を得る事が出来る。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、危険から遠くにあって、災いから逃れられる事を表す。上九は下卦の険\\n（水）から最も遠くに離れている。風水渙の極まったところ、危険の外に位置する。\\n従って、災いに会う事はない。このように危険の外に身を置けば凶運を避ける事が\\n出来る。"}}},"53":{"number":53,"name":"風山漸","reading":"ｾﾞﾝ","overall":"漸進。渡り鳥が飛び立つ様。正しい手続きを踏んだ結婚に吉。正しい道を進めば、\\n利益を上げることが出来る。順序、礼儀を守る事が大切。男性は浮気に注意。\\n風山漸は下から”陰陰陽　陰陽陽”。これは、水が徐々に周囲のものを浸す様に、\\n順序をもって進む事を表す。内卦が止まる外卦が従うで、止まりながら徐々に進む\\n意味になる。妄進しないので、行き詰まることはない。女子が正式の手続きを順序\\nよく踏んで嫁ぐに吉。山の上の木が成長する様に、君子が徳を徐々に蓄える事。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、水鳥が水際まで泳いで来て、上陸をためらっている事を表す。初六は漸進\\nの卦の最初にあって、進む力が弱い。上卦の六四は、同じ陰でこれも力弱く応じな\\nい。水鳥が岸の近くで泳ぎながら上陸をためらうようなものである。仲間から遅れ、\\n上位者から叱咤されるかも知れないが、漸進の卦であるからためらう事は間違って\\nいない。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中庸の徳を持つものが、君子に用いられ楽しく飲食する事を表す。六二は\\n中正（下卦の中で、陰爻陰位）で、九五の君子に正しく応じている。水鳥が岸の安\\n定した岩場に登った様なものである。正しい地位を得て楽しく食卓を囲む事が出来\\nるが、これは君子を正しい徳で補佐しているからである。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、男が家に帰らず、不正な相手と結ばれる事を表す。陸に進んだ水鳥。九三\\nは上卦に応がないので、道ならぬ相手の六四と結ばれる。不正なる結び付きである\\nので、子供を宿しても生もうとしない。凶。ただし、九三は陽剛なるもの（陽爻陽\\n位）であるから、外敵の侵入を防ぐには頼もしい人物である。"},"3":{"name":"六四","text":"六四は、更に進んで木の枝に止まった水鳥である。水鳥の足は、木枝に止まるには\\nふさわしくなく、不安定である。しかし、九三は六四の下にあってこれを安定させ\\nる角材となる。一般に陰が陽にのるのは好ましくないが、この場合は九三の方から\\n親しむので吉である。六四は従爻であり、人に従えば良い協力者を得る事が出来る。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、有徳の君子が妻と結ばれる事を三年間妨げられるが、ついに吉を得る事を\\n表す。九五は丘に進んだ水鳥。君位に位置する。九五と六二は正しく応じているが、\\n九三と六二が間に入って邪魔をしている。そこで、六二（妻）は、三年はらむ事が\\nない。しかし、この夫婦は共に中正で正しく応じているから、ついには結ばれて吉。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、君子の位を越えた孤高の隠者が、一見世間と離れているように見えても、\\nその徳が身なの手本となる事を表す。上九は雲の流れの中に飛ぶ鳥。鳥は飛び去り\\n帰っては来ないが、その落とした羽は儀式に用いる事が出来る。この様に、孤高の\\n隠者と言えども、その行い徳は、世間の規範となり得る。この様であれば吉。"}}},"20":{"number":20,"name":"風地観","reading":"ｶﾝ","overall":"手本を示す。王が正しい礼儀をもって祭りを行い、これを民衆に示す。精神的理\\n想を大切にして、清い心を持つ様。学問、信仰に吉。他人を当てにせず、一人で進\\nむことに吉。大地を吹き抜ける風のように虚しく感じるときなので、気持ちを落ち\\n着ける事が大切。\\n風地観は下から”陰陰陰　陰陽陽”。これは、君子が道義を掲げて人に示し、仰\\nぎ見られる事を表す。丁寧に手を洗い、軽々しく供物を捧げない。そのような様子\\nを民衆が仰ぎ見れば、これを信じ、仰ぎ見ることになる。八月の卦。天の神秘な道\\nを仰ぎ見て、聖人は天の法則に合わせた政教を設ける。","yaos":{"0":{"name":"初六","text":"初六は、一番下の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、仰ぎ見る者が遠すぎて良く見えない事を表す。童観と言う。占う者が庶民\\nならば当然の事であるが、君子（地位のある者）の場合には恥ずかしい事であり、\\n恥をかくであろう。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、門の隙間から輝かしい君子をのぞき見る事を表す。六二は陰従の爻で、暗\\nいところから輝かしい外の世界を見る。門の隙間からみるような事は女としては正\\nしいとしても、有徳の君子の成すべき事ではない。女子は吉。男は凶。"},"2":{"name":"六三","text":"六三は下卦の最上位にあって進退が自由である。そこで、君子を仰ぎ見る事はせず\\nに、自分の周囲の状況だけを見て進退を決めている。処世術としては道を外れたも\\nのではないので災いはないが、すべて自分で決めなければならない。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、徳のある者が君子に仕え、その国の輝く光を間近にみる事を表す。六四は\\n九五の君臣に最も近い者。これは、徳のある者が朝廷に賓客として迎えられたこと\\nを意味する。君子の徳はその国の風俗の美しさに現れており、これを見る事を観光\\nと言う。在野の人は朝廷に仕えるのに吉。"},"4":{"name":"九五","text":"九五は中正（上卦の中で、陽爻陽位）の徳を持つ君子である。風地観の卦に於いて\\nは、自分の日頃の行いを今一度見直す必要がある。そのためには、民衆の風俗の善\\nし悪しを見れば参考になる。これらは、すべて支配者の徳によるからである。"},"5":{"name":"上九","text":"上九は、一番上の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、君子の位を越えた孤高の者が、一見世間と離れているように見えても、そ\\nの振る舞いの全てを民衆に見られている事を表す。したがって、平素の振る舞いに\\nは気を付けなくてはいけない。身を謹むべきである。"}}},"5":{"number":5,"name":"水天需","reading":"ｼﾞｭ","overall":"希望。時期を待てば大川を渡ることができる。待つことは無駄にはならず前方の\\n障害が取り除かれる好機を捕らえることができる。自分の実力を発揮するために休\\n養を取るべき時である。実力のある者が、ゆったりとした気持ちで渡し船を待ち、\\n次の機会を捕らえて行動する事。\\n水天需は、下から”陽陽陽　陰陽陰”。これは、中正の徳を持つ者が誠を押し進\\nめるためにゆっくりと時期を待つ事を表す。９５の君位が中正であり、中に誠を持\\nつ事を示している。前方の大川は軽々しく歩いて渡る事は出来ないが、じっくりと\\n待って正しさを固守すれば大善にして願いは叶う。じっくり待つので、険に陥る事\\nはない。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、陽剛なるものが、険から遠く離れたところで時を待つ事を表す。初九は、\\n剛なる者で正（陽爻陽位）を得ている。この様な者が、自分の立場を守り、常を通\\nすならば危険はない。都の危険が去るのを、遠く郊外で待つようなものである。"},"1":{"name":"九二","text":"九二は、下から二番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、やや危険に近付いた者が言葉によってとがめられるが、ゆったりとして急\\n進せず最後には吉を得る事を表す。九二は初九と比べるとやや上卦の険（水）に近\\nい。そこでこごとを受ける。しかし、剛なる者でかつ中を得ているので悠々と中に\\nいて時を待ち、せっかちな動きはしない。そこで最後には吉運を得て前進する事が\\n出来る。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、危険のすぐそばにいる者が、自らの行動を慎みつつ進めば失敗しない事を\\n表す。九三は、下卦の最上位で陽爻、さらに不中であるので剛に過ぎる。しかも上\\n卦の険（水）に接していて泥のような場所である。剛に過ぎる事から招いた危険の\\nすぐそばで踏みとどまっている様な者である。したがって外敵が攻めてくるであろ\\nう。しかし、剛に過ぎた事を改め、用心するのならば破れる事はなく、失敗しない。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\n険に陥りながらも柔順にじっと血溜まりのなかで待つ者が、やがて険から抜け出す\\n事を表す。六四は既に上卦（険）の一部である。殺傷の場に足を踏み入れた者であ\\nるが、自身は陰爻で柔順の徳を持ち正（陰爻陰位）を得ている。\\n従って、じっと時を待ちそれ以上深みにはまる事はない。そこで、最後には険から\\n這い出す事ができる。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、尊位にいる君子が、ゆったりと時を待つ事を表す。九五は尊位でしかも中\\n正（上卦の中を得、陽爻陽位）である。安泰な場所でゆっくりと時を待ち、飲食す\\nる。この様に正道を固守すれば吉。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、陰従の者が招かざる客を迎え、これを敬意を持って迎える事により災いか\\nら逃れる事を表す。上六は、水天需の極点にあって待つ事を知らない。下卦の三人\\nの陽爻が共に登り進んでくる。上六は力の弱い陰爻であるから、これを押し止める\\n事はできないので、丁重に迎える。この様であれば三人の陽爻も災いをもたらさな\\nい。不本意な運勢の到来も、誠意を持って乗り切るべきである。"}}},"60":{"number":60,"name":"水沢節","reading":"ｾﾂ","overall":"節約。人生の節目であるので、しばらくの間立ち止まり先のことを考え姿勢を正\\nすときである。しかし過ぎた節約、我慢は禁物である。誘惑に負けないように、自\\n重すること。限界、限度。留まる事が、生活の安定につながる。誘惑の多い時期な\\nので、事業やその他の行動は慎重に考えてから行うように。結婚には男女とも貞節\\nを保ち良い卦である。\\n水沢節は、下から”陽陽陰　陰陽陰”。これは、沢の流れに水量の節度があるよ\\nうに、節度を守れば願いが叶う事を表す。節度と言っても、過ぎた節約や窮屈にな\\nるような節操は本人が苦しむばかりであるので、固執すべきではない。君子は、天\\n地の節度を元に、天下の制度を決めるので、民衆はこれに従い浪費、欲望を適度に\\n抑える事が出来る。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、有徳の君子が、ことの始めにあって世に出る時期を慎重に計っている事を\\n表す。初九は、陽爻であり正（陽爻陽位）を得ている。実力は十分あるが、事の始\\nめであるので運気が熟しているかを慎重に確かめている。この様に慎重であれば願\\nいは叶う。"},"1":{"name":"九二","text":"九二は陽爻で初九より一歩進んだ位置にいる。従って、いつでも門外へ出て行かれ\\nるはずである。しかし、九二には上卦に応がなく不正（陽爻陰位）であるために思\\nいとどまってしまい、時期を失することになる。凶。"},"2":{"name":"六三","text":"六三は、下から三番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、力のない者が節度を越えて自ら災いを招き嘆く事を表す。六三は陰爻で柔\\n弱の身でありながら不正で下卦の最上位にある。節度を守れずに災いを招くが、こ\\nれは誰の責任でもなく自ら招いた事である。"},"3":{"name":"六四","text":"六四は、下から四番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、柔順なる者が、君子の感化を受けて心安らかに節度を守る事を表す。六四\\nは柔順の徳を持ち正（陰爻陰位）を得ている。すぐ上には有徳の君子があり、その\\n正しい感化を受けているので自然に節度を守る事が出来る。この様であれば、願い\\nは叶う。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、有徳の君子が、自ら甘んじて節制し、周囲もこれに習う事を表す。九五は\\n上卦の尊位にあって中正（上卦の中で、陽爻陽位）の徳で万民を治めるものである。\\n自ら節制につとめれば、これを万民が認めてる。君子が他を節制しても、喜んでこ\\nれに従う事になる。この様であれば、積極的に進んでも成功し、吉。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、過ぎた節制で苦しみ、凶を招く事を表す。上六は、水沢節の最上位にあっ\\nて行き詰まりである。苦々しい節制は、本来の節度を越えている。この様であれば\\n凶運を招く事になるが、悔い改めれば災いを逃れる事が出来る。"}}},"63":{"number":63,"name":"水火既済","reading":"ｷｾｲ","overall":"完成。小さい願い事は叶う。はじめ吉であるが、後半はよほど気を引きしめない\\nと、乱れる。大きな発展は望めない。結婚話はまとまる。既に成功し名を遂げた人。\\n水火既済は、下から”陽陰陽　陰陽陰”。これは、全ての事が整然と整い既に完\\n成している事を表す。陰陽の全ての爻が正を得ており、これ以上の発展は望めない\\n事から、小さい願い事のみ叶うとする。全てが整った後には、乱れる以外にはない。\\n警戒すべきである。始めは吉であるが、後に乱れる。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、川を渡ろうとする者が、慎重に構えて軽々しく渡らずに災いを逃れる事を\\n表す。初九は、水を渡る卦にあって事の始めである。川を渡りかけた車を引き戻さ\\nれること、あるいは渡りかけた狐がその尾を濡らして渡れない事。この様に、事の\\n始めに慎重であれば災いもない。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、中正の徳を持つ賢者が、世に出るのに少し待たされる事を表す。六二は中\\n正（下卦の中を得、陰爻陰位）で上卦の九五の君子に正しく応じている。しかし、\\n水火既済の卦は、事既に完成しているので、君子は心ゆるみ賢者を捜す努力を忘れ\\nている。七日間の間、世に出る事を待たされるであろう。大切なものをなくした場\\n合にも、捜す必要はなく七日立てば自然に出てくる。"},"2":{"name":"九三","text":"九三は、下から三番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、剛なるものが兵を動かせば勝利は得られるが、三年もの期間がかかる事を\\n表す。九三は、陽爻陽位でしかも下卦の最上位にいる。まことに剛なるものである\\nが、それでも敵を討つには三年はかかる。軽々しく兵を動かすべきではない。また、\\n勝利の後にも、小人には金品を与え地位を与えてはならない。"},"3":{"name":"六四","text":"六四は柔爻陰位で外面的な力は弱いが縁の下の力持ちであり、絶えず危険に備えて\\nいる。舟の水漏れに備えて、ぼろ布を用意して於くようなものである。この様であ\\nれば、大きな事を為すには至らないが、危険を迎え討たねばならないときには十分\\nな働きが出来る。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、国を完成した君子が尊位にあって驕り高ぶり、贅沢な暮らしをする事を表\\nす。九五は陽爻で尊位にある。水火既済の時、すでに事はなり盛りは過ぎた。九五\\nは下卦にあって初めて世に出た緊張と充実のある六二に及ばない。これは、殷の紂\\n王が奢りに耽っているときに周の文王が民衆の心を得ていたことに例えられる。\\n高位に奢らず、初心に帰るならば吉。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を表す。\\nこれは、力ないものが冒険をして危うい立場に立つ事を表す。上六は、狐の頭に例\\nえられる。陰爻でありながら水火既済の最上位にあって進む事しか考えない。この\\n様なものが冒険をすれば、狐が川を渡ろうとしてその頭まで水に浸かるようなもの\\nである。凶。"}}},"3":{"number":3,"name":"水雷屯","reading":"ﾁｭﾝ","overall":"誕生の苦しみ。正しい願い事は大いに叶う。しかし、急いで前進してはいけない。\\n君主を新たに立てるのに吉。実力者の力を借りるのに吉。結婚は少し待てば決まる。\\n希望を捨てないこと。悩みの中にあって希望を捨てずに時を待つ、雪の中の若芽。\\n水雷屯は、下から”陽陰陰　陰陽陰”。これは、天地の交わりによって初めて物\\n事が生じる事を表す。動いて険の中にはいるので、四大難卦の一つであるが、生み\\nの困難であるから正しさを持続すれば願い事は大いに叶う。やがて雨が降り、のび\\nのびと草木が生きる時期がくるであろう徳のある卦である。","yaos":{"0":{"name":"初九","text":"初九は、一番下の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、実力がありながら困難な時代に社会の下層にいる人を表す。初九は、上卦\\nの六四に応じているが六四は険卦の一部である。進んで行くには危険でありためら\\nわざるを得ないが、初九は陽爻陽位で正を得ているので正しさを持続すれば吉。\\n有徳の君子が、困難な時代に陰の下に甘んじている。この様な人は民衆に支持され\\n君子となるにふさわしい。"},"1":{"name":"六二","text":"六二は、下から二番目の”陰”が”老陰”で、”陽”に変わる可能性を示す。\\nこれは、君子と結ばれるべき人が、他のものに好かれてこれが邪魔となり十年後に\\nようやく正しい相手と結ばれる事を表す。六二は中正（下卦の中を得、陰爻陰位）\\nで上卦の九五に正しく応じている。従って、九五に向かって進もうとするが、下の\\n初九がこれの邪魔になる。初九は十年間頑張るがついにあきらめ、六二と九五は結\\nばれる。この様に、正しさを固く守るならば吉。"},"2":{"name":"六三","text":"六三は陰爻でありながら下卦の最上位にあって陰なることに満足できず猛進する。\\nもともと力のない陰であるので、すぐに困難に陥る。鹿を追いかけて深い森の中に\\n迷い込むようなものである。賢明な君子であれば、獲物に固執せず、捨て去るであ\\nろう。"},"3":{"name":"六四","text":"六四は君位に近く、取り入る事もできる立場にある。しかし、本来の相手はあくま\\nでも自分に応じている初九である。従って、六四は自分よりも下位の相手である初\\n九とともにこの難局を乗り切り結ばれるべきである。"},"4":{"name":"九五","text":"九五は、下から五番目の”陽”が”老陽”で、”陰”に変わる可能性を示す。\\nこれは、困難の中にある君子が、民衆の困難を救う事が出来ずに凶を免れない事を\\n表す。九五は中正の君子であるが、険の中央にあり穴から出る事が出来ない。民衆\\nの心は初九に向かっており、その流れを変える事は出来ない。中正の君子であるか\\nら、正しさを守れば小事には吉であるが、大きな事には凶。"},"5":{"name":"上六","text":"上六は、一番上の”陰”が”老陰”で、”陽”に変わる可能性を表す。\\nこれは、力のないものが険の極点にあって、血の涙を流す事を表す。上六は、陰柔\\nな性質で水雷屯の険の極点に位置する。下には応はなく、だれも助けには来ない。\\nこの様な状態に耐えられるはずもなく、血の涙を流すばかりである。"}}},"48":{"number":48,"name":"水風井","reading":"ｾｲ","overall":"賢人を養う。井戸の水で人々を潤す。変わった事をしないで、昔のままのやり方\\nがよい。皆に喜ばれ、自分も吉となる。せっかく井戸があるのに、つるべを切った\\nりしないように。\\n水風井は、下から”陰陽陽　陰陽陰”。これは、集落の中央にある井戸を意味す\\nる。生活において大変重要なもの、常に変わらない姿で人々をうるおす大きな存在\\nを暗示している。しかし、これはつるべが最後まで使用に耐えた場合の事である。\\n途中で切れてしまえば何の役にも立たない。最後までの努力と、以前と変わらない\\n方法を要求するものである。","
